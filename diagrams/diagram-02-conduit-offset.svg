<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520" font-family="Arial, Helvetica, sans-serif">
<title>Conduit offset at the sill</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Conduit relocation — section at back wall (fence at right)</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">Offset fittings jog the stub off the fence line below sill level; conduit rises inside the stud bay</text>

<!-- Pavers -->
<rect x="60" y="400" width="560" height="50" fill="#C9C7BE" stroke="#5F5E5A" stroke-width="0.75"/>
<line x1="200" y1="400" x2="200" y2="450" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="420" y1="400" x2="420" y2="450" stroke="#5F5E5A" stroke-width="0.5"/>

<!-- Fence -->
<rect x="588" y="70" width="14" height="330" fill="#F4F2EC" stroke="#5F5E5A" stroke-width="1"/>
<text x="608" y="88" font-size="11" fill="#5F5E5A">vinyl</text>
<text x="608" y="102" font-size="11" fill="#5F5E5A">fence</text>

<!-- Back wall: PT sill with drilled hole, sill seal, track, stud depth -->
<rect x="452" y="358" width="30" height="39" fill="#B9D48B" stroke="#3B6D11" stroke-width="1"/>
<rect x="516" y="358" width="27" height="39" fill="#B9D48B" stroke="#3B6D11" stroke-width="1"/>
<rect x="452" y="352" width="91" height="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.75"/>
<rect x="452" y="348" width="91" height="4" fill="#ECEAE4" stroke="#444441" stroke-width="1"/>
<rect x="452" y="90" width="91" height="258" fill="#F4F2EC" stroke="#444441" stroke-width="1"/>
<line x1="452" y1="90" x2="452" y2="348" stroke="#444441" stroke-width="1.5"/>

<!-- Hardware cloth back face -->
<line x1="543" y1="90" x2="543" y2="348" stroke="#444441" stroke-width="1" stroke-dasharray="4 3"/>

<!-- Shims -->
<polygon points="460,410 478,410 478,401 460,398" fill="#FAC775" stroke="#854F0B" stroke-width="0.75"/>
<polygon points="520,410 538,410 538,398 520,401" fill="#FAC775" stroke="#854F0B" stroke-width="0.75"/>

<!-- Existing stub near fence, cut short, coupling -->
<rect x="562" y="404" width="14" height="16" fill="#E8E6E0" stroke="#55534E" stroke-width="1"/>
<rect x="560" y="396" width="18" height="8" fill="#DDDACF" stroke="#55534E" stroke-width="1"/>

<!-- Offset: diagonal from stub to bay, below sill -->
<path d="M 569 396 L 569 388 L 500 372 L 500 90" fill="none" stroke="#55534E" stroke-width="9" stroke-linejoin="round"/>
<path d="M 569 396 L 569 388 L 500 372 L 500 90" fill="none" stroke="#E8E6E0" stroke-width="6" stroke-linejoin="round"/>

<!-- Drilled hole in PT (gap shown between the two PT blocks at x 482-516) -->
<line x1="482" y1="378" x2="516" y2="378" stroke="#3B6D11" stroke-width="0.75" stroke-dasharray="2 2"/>

<!-- Weatherproof box on riser -->
<rect x="478" y="150" width="26" height="34" rx="2" fill="#ECEAE4" stroke="#444441" stroke-width="1.25"/>
<circle cx="491" cy="162" r="3" fill="none" stroke="#444441" stroke-width="1"/>
<circle cx="491" cy="173" r="3" fill="none" stroke="#444441" stroke-width="1"/>

<!-- Air gap dimension -->
<line x1="543" y1="120" x2="588" y2="120" stroke="#A32D2D" stroke-width="1"/>
<line x1="543" y1="114" x2="543" y2="126" stroke="#A32D2D" stroke-width="1"/>
<line x1="588" y1="114" x2="588" y2="126" stroke="#A32D2D" stroke-width="1"/>
<text x="566" y="108" font-size="11" fill="#A32D2D" text-anchor="middle">1.5–2"</text>

<!-- Labels, left side -->
<line x1="500" y1="230" x2="380" y2="200" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="374" y="184" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="end">Riser inside stud bay</text>
<text x="374" y="200" font-size="11" fill="#5F5E5A" text-anchor="end">PVC conduit, THWN-2 inside;</text>
<text x="374" y="214" font-size="11" fill="#5F5E5A" text-anchor="end">lands between studs, never under track</text>

<line x1="478" y1="167" x2="380" y2="130" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="374" y="120" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="end">Weatherproof box, in-use cover</text>
<text x="374" y="136" font-size="11" fill="#5F5E5A" text-anchor="end">set before cement board closes the face</text>

<line x1="520" y1="380" x2="380" y2="300" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="374" y="284" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="end">Sill drilled ~1/4" oversize</text>
<text x="374" y="300" font-size="11" fill="#5F5E5A" text-anchor="end">hole mid-board beats an open notch;</text>
<text x="374" y="314" font-size="11" fill="#5F5E5A" text-anchor="end">PVC needs slack for thermal movement</text>

<line x1="535" y1="380" x2="440" y2="352" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

<line x1="569" y1="392" x2="380" y2="360" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="374" y="348" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="end">PVC offset fittings at the base</text>
<text x="374" y="364" font-size="11" fill="#5F5E5A" text-anchor="end">below track level — never notch the</text>
<text x="374" y="378" font-size="11" fill="#5F5E5A" text-anchor="end">cement board at grade</text>

<line x1="569" y1="415" x2="330" y2="468" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="90" y="474" font-size="13" font-weight="bold" fill="#2C2C2A">Existing stub, cut short + coupling</text>
<text x="90" y="490" font-size="11" fill="#5F5E5A">circuits OFF at panel, verified dead, FIRST</text>

<line x1="543" y1="250" x2="620" y2="250" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="624" y="240" font-size="12" font-weight="bold" fill="#2C2C2A" writing-mode="lr">Open</text>
<text x="624" y="256" font-size="11" fill="#5F5E5A">back:</text>
<text x="624" y="270" font-size="11" fill="#5F5E5A">1/4"</text>
<text x="624" y="284" font-size="11" fill="#5F5E5A">cloth</text>

<text x="90" y="510" font-size="11" fill="#5F5E5A">Lay out so each stub lands between studs. Dead-on the track line? Notch the track flange around the pipe — not the pipe.</text>
</svg>
