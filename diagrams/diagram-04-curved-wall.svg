<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540" font-family="Arial, Helvetica, sans-serif">
<title>Curved wall buildup, plan view</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Curved kamado wall — plan view of the layer buildup</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">Faceted board carries the fireproofing; lath + mortar create the true radius. Kamado side is concave (lower left).</text>

<!-- Arc center at (150,470). Wall band r 250..310 (outer structure). -->
<!-- Outer arc r=310 -->
<path d="M 150 160 A 310 310 0 0 1 460 470" fill="none" stroke="#444441" stroke-width="1.5"/>
<!-- Inner structural arc r=250 (stud line) -->
<path d="M 150 220 A 250 250 0 0 1 400 470" fill="none" stroke="#444441" stroke-width="0.75" stroke-dasharray="6 4"/>

<!-- Curved track band fill between: draw as thick translucent band along mid r=280 -->
<path d="M 150 190 A 280 280 0 0 1 430 470" fill="none" stroke="#F4F2EC" stroke-width="56"/>
<path d="M 150 160 A 310 310 0 0 1 460 470" fill="none" stroke="#444441" stroke-width="1.5"/>
<path d="M 150 220 A 250 250 0 0 1 400 470" fill="none" stroke="#444441" stroke-width="1"/>

<!-- Studs every 15 deg on r=280, drawn as small squares. angle from vertical at center (150,470) -->
<rect x="141" y="181" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1"/>
<rect x="205" y="190" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(15 214 199)"/>
<rect x="271" y="215" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(30 280 224)"/>
<rect x="329" y="264" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(45 338 273)"/>
<rect x="376" y="322" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(60 385 331)"/>
<rect x="404" y="386" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(75 413 395)"/>
<rect x="412" y="452" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1"/>

<!-- Faceted 1/4in board strips: chords on inner face r=250, points every 15deg from (150,470):
 0:(150,220) 15:(215,229) 30:(275,254) 45:(327,293) 60:(367,345) 75:(392,406) 90:(400,470) -->
<polyline points="150,220 215,229 275,254 327,293 367,345 392,406 400,470" fill="none" stroke="#4A5A61" stroke-width="7"/>

<!-- Lath: dashed smooth arc r=243 -->
<path d="M 150 227 A 243 243 0 0 1 393 470" fill="none" stroke="#5F5E5A" stroke-width="2" stroke-dasharray="6 4"/>

<!-- Mortar band: r 233..241 -->
<path d="M 150 233 A 237 237 0 0 1 387 470" fill="none" stroke="#D9CDB8" stroke-width="10"/>
<!-- True radius finish line r=232 -->
<path d="M 150 238 A 232 232 0 0 1 382 470" fill="none" stroke="#8A5F2A" stroke-width="1.75"/>

<!-- Kamado -->
<circle cx="205" cy="415" r="52" fill="#E24B4A" stroke="#A32D2D" stroke-width="1.5"/>
<text x="205" y="412" font-size="12" font-weight="bold" fill="#FCEBEB" text-anchor="middle">Big Joe</text>
<text x="205" y="428" font-size="10" fill="#FCEBEB" text-anchor="middle">(concave side)</text>

<!-- Screed template -->
<path d="M 262 330 A 232 232 0 0 1 300 362" fill="none" stroke="#0F6E56" stroke-width="5" stroke-linecap="round"/>
<line x1="285" y1="342" x2="330" y2="300" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

<!-- Labels: right column -->
<line x1="223" y1="199" x2="480" y2="120" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="108" font-size="13" font-weight="bold" fill="#2C2C2A">Studs ~6" o.c. on the arc</text>
<text x="486" y="124" font-size="11" fill="#5F5E5A">set in curved track: snip both track</text>
<text x="486" y="138" font-size="11" fill="#5F5E5A">flanges every 1–2", bend web to arc;</text>
<text x="486" y="152" font-size="11" fill="#5F5E5A">matching curved track top + bottom</text>

<line x1="300" y1="268" x2="480" y2="200" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="188" font-size="13" font-weight="bold" fill="#4A5A61">1/4" board strips — flat facets</text>
<text x="486" y="204" font-size="11" fill="#5F5E5A">one strip per stud bay, zero bending;</text>
<text x="486" y="218" font-size="11" fill="#5F5E5A">thinset + mesh tape every joint</text>

<line x1="360" y1="352" x2="480" y2="268" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="256" font-size="13" font-weight="bold" fill="#5F5E5A">Galvanized expanded lath</text>
<text x="486" y="272" font-size="11" fill="#5F5E5A">wraps the facets continuously —</text>
<text x="486" y="286" font-size="11" fill="#5F5E5A">bends to any radius; overlap 2"+,</text>
<text x="486" y="300" font-size="11" fill="#5F5E5A">fasten into every stud</text>

<line x1="378" y1="410" x2="480" y2="340" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="328" font-size="13" font-weight="bold" fill="#8A5F2A">Mortar base coat to true radius</text>
<text x="486" y="344" font-size="11" fill="#5F5E5A">two thin passes; smooth stucco finish</text>
<text x="486" y="358" font-size="11" fill="#5F5E5A">or mosaic — planks stop at a trim line</text>

<text x="486" y="386" font-size="13" font-weight="bold" fill="#0F6E56">Screed template</text>
<text x="486" y="402" font-size="11" fill="#5F5E5A">plywood band-sawed to the arc from</text>
<text x="486" y="416" font-size="11" fill="#5F5E5A">the SketchUp profile; drag it around</text>
<text x="486" y="430" font-size="11" fill="#5F5E5A">the wall to shave mortar perfect</text>
<line x1="300" y1="362" x2="480" y2="390" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

<text x="70" y="500" font-size="11" fill="#5F5E5A">Everything in this stack is non-combustible: cement board, steel lath, mortar. At 6" stud spacing the facets vanish under the mortar.</text>
<text x="70" y="518" font-size="11" fill="#5F5E5A">PT sill below chords the arc in short segments — it only needs bearing under the snipped track web every few inches.</text>
</svg>
