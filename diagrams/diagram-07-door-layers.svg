<svg xmlns="http://www.w3.org/2000/svg" width="680" height="500" viewBox="0 0 680 500" font-family="Arial, Helvetica, sans-serif">
<title>Door construction layers</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Door build — three layers, bolt-and-bond, no welding</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">Frame + backer + tile face. Size = opening minus an even 1/8–3/16" reveal all around.</text>

<!-- Layer 1: aluminum frame -->
<text x="145" y="86" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="middle">1 — Aluminum frame</text>
<rect x="70" y="100" width="150" height="230" fill="none" stroke="#888780" stroke-width="10"/>
<line x1="75" y1="215" x2="215" y2="215" stroke="#888780" stroke-width="8"/>
<polygon points="75,105 110,105 75,140" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<polygon points="215,105 180,105 215,140" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<polygon points="75,325 110,325 75,290" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<polygon points="215,325 180,325 215,290" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<circle cx="92" cy="120" r="3" fill="#534AB7"/>
<circle cx="198" cy="120" r="3" fill="#534AB7"/>
<circle cx="92" cy="310" r="3" fill="#534AB7"/>
<circle cx="198" cy="310" r="3" fill="#534AB7"/>
<text x="145" y="352" font-size="11" fill="#5F5E5A" text-anchor="middle">1"x1" tube/angle, miter cut,</text>
<text x="145" y="366" font-size="11" fill="#5F5E5A" text-anchor="middle">gussets + SS machine screws</text>
<text x="145" y="380" font-size="11" fill="#5F5E5A" text-anchor="middle">+ structural adhesive (DP420);</text>
<text x="145" y="394" font-size="11" fill="#5F5E5A" text-anchor="middle">center rail on doors over 24"</text>

<!-- plus -->
<text x="248" y="225" font-size="26" fill="#5F5E5A" text-anchor="middle">+</text>

<!-- Layer 2: GoBoard -->
<text x="345" y="86" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="middle">2 — GoBoard backer</text>
<rect x="270" y="100" width="150" height="230" fill="#9FE1CB" stroke="#085041" stroke-width="1.25"/>
<circle cx="290" cy="120" r="3" fill="#0F6E56"/>
<circle cx="400" cy="120" r="3" fill="#0F6E56"/>
<circle cx="290" cy="215" r="3" fill="#0F6E56"/>
<circle cx="400" cy="215" r="3" fill="#0F6E56"/>
<circle cx="290" cy="310" r="3" fill="#0F6E56"/>
<circle cx="400" cy="310" r="3" fill="#0F6E56"/>
<text x="345" y="352" font-size="11" fill="#5F5E5A" text-anchor="middle">waterproof foam board, a fraction</text>
<text x="345" y="366" font-size="11" fill="#5F5E5A" text-anchor="middle">of cement board's weight (weight</text>
<text x="345" y="380" font-size="11" fill="#5F5E5A" text-anchor="middle">kills hinges); bonded AND screwed</text>
<text x="345" y="394" font-size="11" fill="#5F5E5A" text-anchor="middle">to frame — seal edges + seams</text>

<!-- plus -->
<text x="448" y="225" font-size="26" fill="#5F5E5A" text-anchor="middle">+</text>

<!-- Layer 3: tile face -->
<text x="545" y="86" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="middle">3 — Porcelain plank face</text>
<rect x="470" y="100" width="150" height="230" fill="none" stroke="#8A5F2A" stroke-width="4"/>
<rect x="476" y="106" width="66" height="218" fill="#EBD9B8" stroke="#8A5F2A" stroke-width="0.75"/>
<rect x="548" y="106" width="66" height="218" fill="#E3CFA8" stroke="#8A5F2A" stroke-width="0.75"/>
<circle cx="590" cy="215" r="5" fill="none" stroke="#2C2C2A" stroke-width="1.5"/>
<text x="545" y="352" font-size="11" fill="#5F5E5A" text-anchor="middle">door EDGES land on grout joints;</text>
<text x="545" y="366" font-size="11" fill="#5F5E5A" text-anchor="middle">metal edge trim perimeter, epoxy</text>
<text x="545" y="380" font-size="11" fill="#5F5E5A" text-anchor="middle">grout; handle holes diamond-drilled,</text>
<text x="545" y="394" font-size="11" fill="#5F5E5A" text-anchor="middle">siliconed, through-bolted to frame</text>

<!-- Hinge note strip -->
<rect x="70" y="418" width="540" height="2" fill="#D3D1C7"/>
<text x="70" y="444" font-size="13" font-weight="bold" fill="#2C2C2A">Hinges — install prep BEFORE tiling:</text>
<text x="70" y="462" font-size="11" fill="#5F5E5A">European-look opening: clamp-on concealed hinges made for aluminum-frame doors (3-way adjustable, no 35mm bore). Fallback: stainless piano hinge.</text>
<text x="70" y="478" font-size="11" fill="#5F5E5A">Either way: machine screws + lock nuts into the frame (never self-tappers), landing on the aluminum-angle hinge backing bolted into the studs in Phase 1.</text>
</svg>
