ks measure (~4) sticks Base perimeter of all clad faces, ~½" above pavers (D17 — no raw wood at grade). Measure clad perimeter LF.`},{route:"#/phase/3",anchor:"preflight",title:'Buy · ¼" galvanized hardware cloth (Phase 3)',kind:"materials",text:`¼" galvanized hardware cloth ¼" mesh galvanized hardware cloth, 36" × 25' roll 1 (measure) roll Entire back EXCEPT the grill bay; kamado corner stays cloth (D14). Cavity height ~33" fits 36" width; measure back LF minus grill bay. Curved corner gets stapled progressively during Phase 1 framing — buy before framing if you want it on hand then.`},{route:"#/phase/3",anchor:"preflight",title:"Buy · Stainless screws + fender washers (cloth attachment) (Phase 3)",kind:"materials",text:"Stainless screws + fender washers (cloth attachment) #8 stainless pan-heads + stainless fender washers, small box each 1 set Cloth 'staples/screws on from the front through the bays'."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Rockwool ComfortBatt R-15 (Phase 3)",kind:"materials",text:"Rockwool ComfortBatt R-15 R-15 mineral wool batt pack 1 pack Guide's Phase 3 list: '1 pack does grill bay + fridge bay + sink back.' Note Step 3.4 separately demotes the grill-bay-adjacent cavity batt to a buy-it-later retrofit — flagged for review; reconcile before checkout."},{route:"#/phase/3",anchor:"preflight",title:'Buy · ¼" cement board (curved wall) (Phase 3)',kind:"materials",text:`¼" cement board (curved wall) ¼" × 3'×5' sheets 2 sheets Cut into vertical strips ~6" wide, one per arc stud bay — flat facets, zero bending stress. Two backer screws per strip per stud.`},{route:"#/phase/3",anchor:"preflight",title:"Buy · Expanded-metal lath (Phase 3)",kind:"materials",text:'Expanded-metal lath Galvanized expanded-metal lath, 2.5 lb, 27"×96" sheets 2 sheets Wrap the arc continuously, laps 2"+, fasten into every stud — this is the true curve former.'},{route:"#/phase/3",anchor:"preflight",title:"Buy · Base-coat mortar (Phase 3)",kind:"materials",text:"Base-coat mortar Polymer-modified stucco base coat (or sanded thinset), 50 lb bag 1 bag Screed to the true radius with a plywood template band-sawed from the SketchUp arc; two thin passes beat one thick."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Stucco finish coat (Phase 3)",kind:"materials",text:"Stucco finish coat Smooth stucco finish coat, 1 bag/pail 1 bag If the curve finishes as the smooth accent band (the guide's lean); narrow mosaic/picket tile is the named alternative — skip this if tile wins."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Louvered stainless vents (Phase 3)",kind:"materials",text:"Louvered stainless vents Stainless louvered island vents — SIZE TO THE COYOTE MANUAL'S SQUARE-INCH NUMBERS (LP compartments have explicit low-vent requirements) ~4 (measure) each Toe-kick under the grill (LOW — propane sinks) + island ends. The manual is law — buy after the cutout/vent sheet is in hand."},{route:"#/phase/3",anchor:"preflight",title:"Buy · LP leak detector (Phase 3)",kind:"materials",text:"LP leak detector Plug-in or battery propane (LP) gas detector 1 each Mounts LOW in the propane bay. If the grill ever converts to NG, add detection HIGH — detection flips at conversion."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Exterior silicone sealant (Phase 3)",kind:"materials",text:"Exterior silicone sealant 100% silicone, exterior-rated, 10 oz tubes 3 tubes Seal every penetration cut BEFORE hanging: conduit, PEX, the drain-riser hole in the cabinet floor board, vent sleeves."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Fence standoff heat shield (conditional) (Phase 3)",kind:"materials",text:`Fence standoff heat shield (conditional) ½" cement board offcut + non-combustible standoffs 0–1 each Only if the Coyote manual's rear clearance number is tight against the boarded back + 2" fence gap — the guide's named cheap fix. Check the manual first; likely free from sheet offcuts.`},{route:"#/phase/4",anchor:"preflight",title:"Buy · Wood-look porcelain plank (Phase 4)",kind:"materials",text:'Wood-look porcelain plank RECTIFIED porcelain plank, light driftwood tone, ~48" length class ~135 sq ft + 10–15% waste + 1 extra box sq ft ~135 sq ft faces is the guide figure — re-measure faces before ordering. Extra box = attic stock; dye lots disappear. Dry-lay the entire face first; door edges land on grout joints. ⚠ If you want one combined tile order, the backsplash pick (Phase 7) practically decides now.'},{route:"#/phase/4",anchor:"preflight",title:"Buy · Tile leveling clip system (Phase 4)",kind:"materials",text:'Tile leveling clip system Tuscan/Raimondi/MLT clips (1/16" or match plank joint) + wedges ~400 clips + 100 wedges kit Non-negotiable on planks. Wedges reuse; clips are consumable — count from the dry-lay if you want it tighter.'},{route:"#/phase/4",anchor:"preflight",title:"Buy · Exterior thinset (cladding) (Phase 4)",kind:"materials",text:"Exterior thinset (cladding) Polymer-modified exterior-rated thinset, 50 lb bags, white 5 bags Back-butter EVERY plank + combed wall = double coverage, ~30 sq ft/bag effective over ~135 sq ft. Same pass beds the Schluter trim legs."},{route:"#/phase/4",anchor:"preflight",title:"Buy · Epoxy grout (cladding) (Phase 4)",kind:"materials",text:"Epoxy grout (cladding) 100% epoxy grout (SpectraLOCK Pro class), color dead-matched to plank 2 full units Joints read as reveals. Clean haze aggressively as you go — epoxy haze is forever. Rectified tight joints keep consumption low; confirm coverage chart against joint width."},{route:"#/phase/4",anchor:"preflight",title:"Buy · Metal edge trim (Phase 4)",kind:"materials",text:`Metal edge trim Schluter Quadec or Rondec, height matched to plank thickness (~3/8"), 8' 2½" lengths, finish of your pick measure (~5) lengths EVERY outside corner — never miter porcelain. Also the plank-stop trim line where the field meets the curved wall (D22). Measure vertical corner LF + curve termination.`},{route:"#/phase/4",anchor:"preflight",title:"Buy · Color-matched silicone (Phase 4)",kind:"materials",text:"Color-matched silicone 100% silicone matched to grout color (Latasil class), 10 oz 3 tubes Movement joints: every change of plane, cladding-to-counter/appliance/trim. Silicone, not grout — law."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Aluminum door frame stock (Phase 5)",kind:"materials",text:`Aluminum door frame stock 1"×1" aluminum angle or 1" thin-wall square tube, 8' lengths measure (~4–6) lengths Frame = opening minus an even 1/8–3/16" reveal; center rail on anything over ~24". Take perimeter LF from actual door openings. Cut with the non-ferrous blade.`},{route:"#/phase/5",anchor:"preflight",title:"Buy · Aluminum gusset plates / corner brackets (Phase 5)",kind:"materials",text:'Aluminum gusset plates / corner brackets Flat aluminum gussets or 90° corner brackets to suit 1" stock 4 per door each Corners joined with gussets + stainless machine screws + nylock nuts PLUS structural adhesive — bolt-and-bond, no welding.'},{route:"#/phase/5",anchor:"preflight",title:"Buy · Stainless machine screws + nylock nuts (Phase 5)",kind:"materials",text:"Stainless machine screws + nylock nuts #10-24 stainless machine screws assorted lengths + nylock nuts, small boxes 1 set Frame corners AND hinge mounting — machine screws + lock nuts into the frame, NEVER self-tappers, for connections carrying the door's whole life."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Structural adhesive (Phase 5)",kind:"materials",text:"Structural adhesive 3M 5200 (cartridge) or 3M DP420 (dual cartridge + mixing nozzles) 1–2 cartridges Guide names both products. The bond + bolts make the torsion box."},{route:"#/phase/5",anchor:"preflight",title:"Buy · GoBoard backer (Phase 5)",kind:"materials",text:`GoBoard backer GoBoard/Wedi foam backer, ½" × 3'×5' sheets measure (~2) sheets NOT cement board — door weight kills hinges; foam bonds porcelain equally well. Count from door areas. Bond with thinset/adhesive AND screw with stainless self-tappers.`},{route:"#/phase/5",anchor:"preflight",title:"Buy · GoBoard sealant (Phase 5)",kind:"materials",text:"GoBoard sealant Waterproof board sealant (GoBoard Pro Sealant class), 1 tube 1 tube Waterproof the backer edges/seams per the JM install guide in the reference library."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Stainless self-tapping screws (Phase 5)",kind:"materials",text:'Stainless self-tapping screws #8 stainless self-tappers, ~¾", small box 1 box Backer to frame, alongside the adhesive bond.'},{route:"#/phase/5",anchor:"preflight",title:"Buy · Concealed clamp-on hinges (⚠ open decision) (Phase 5)",kind:"materials",text:"Concealed clamp-on hinges (⚠ open decision) Concealed hinges made for aluminum-frame cabinet doors — clamp-on type, NO 35mm cup bore, 3-way adjustable (search 'aluminum frame door concealed hinge' / glass-cabinet hardware) 2 per door each ⚠ Decide BEFORE tiling door faces. Stainless piano hinge (cut to door height) is the sag-proof fallback if clamp-ons don't suit the frame profile. Phase 1 backing supports either."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Stainless handles (Phase 5)",kind:"materials",text:"Stainless handles Stainless bar/pull handles, through-bolted 1 per door + drawer each Diamond-drill through tile into the frame, sleeve holes with silicone, through-bolt."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Outdoor door catches (Phase 5)",kind:"materials",text:"Outdoor door catches Outdoor-rated magnetic or roller catch 1 per door each Hang after cladding; dial reveals even."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Drawer box panel stock (Phase 5)",kind:"materials",text:'Drawer box panel stock .050–.063" aluminum sheet OR 3–4mm ACP/Dibond panels measure sq ft From the drawer cut list: each box = opening − slide clearance (usually ½" per side). Build the tallest drawer first as the pattern.'},{route:"#/phase/5",anchor:"preflight",title:"Buy · Aluminum angle + flat bar (drawers) (Phase 5)",kind:"materials",text:`Aluminum angle + flat bar (drawers) 1"×1" aluminum angle (corners) + aluminum flat bar (slide-height rails), 8' lengths measure lengths Angle is the frame, panel is the skin; flat-bar rails give solid bite for slide screws and stiffen the wall in one move.`},{route:"#/phase/5",anchor:"preflight",title:"Buy · Stainless pop rivets (Phase 5)",kind:"materials",text:'Stainless pop rivets 1/8" stainless pop rivets, 250-count 1 box Every corner joint. $25 rivet gun is on the tool list. Stainless (not aluminum) stays the rule near the firebox surround.'},{route:"#/phase/5",anchor:"preflight",title:"Buy · Perforated aluminum sheet (Phase 5)",kind:"materials",text:'Perforated aluminum sheet Perforated aluminum, ~.050", cut to drawer bottoms measure sq ft Bottoms drain instead of pooling.'},{route:"#/phase/5",anchor:"preflight",title:"Buy · Aluminum U-channel edge cap (Phase 5)",kind:"materials",text:"Aluminum U-channel edge cap U-channel sized to panel thickness (.050–4mm) measure lengths Top rim of each box — no razor edges, looks finished."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Stainless full-extension drawer slides (Phase 5)",kind:"materials",text:`Stainless full-extension drawer slides Stainless full-extension ball-bearing slides, length to bay depth (typ. 20–22") 1 pair per drawer pairs Boxes land under 10 lb empty — standard slides carry them. Mount to flat-bar rails and to Phase 1 blocking/angle on the cabinet side; size box to the slide spec's clearance.`},{route:"#/phase/5",anchor:"preflight",title:"Buy · Stainless through-bolts + fender washers (drawer faces) (Phase 5)",kind:"materials",text:'Stainless through-bolts + fender washers (drawer faces) ¼" stainless bolts + fender washers + nylocks, assorted 1 set Faces are tiled ½" cement-board panels (Phase 3 offcuts) through-bolted from inside with SLOTTED holes for alignment.'},{route:"#/phase/5",anchor:"preflight",title:"Buy · Cabinet interior paint (Phase 5)",kind:"materials",text:"Cabinet interior paint Light-colored elastomeric/masonry paint (guide-specified type), 1 gal 1 gal Over interior cement board so you can see into the bays. Quantity is my estimate."},{route:"#/phase/5",anchor:"preflight",title:"Buy · Shelf material (Phase 5)",kind:"materials",text:"Shelf material Stainless wire shelving or marine HDPE sheet, cut to bays measure sq ft Sits on the Phase 1 blocking/ledgers. Both picks drain — that's why they won."},{route:"#/phase/6",anchor:"preflight",title:"Buy · Granite countertop (remnant, fabricated) (Phase 6)",kind:"materials",text:'Granite countertop (remnant, fabricated) LIGHT granite (Alaska White / Kashmir White / Colonial White / Bianco Antico class), 3cm (1¼" nominal / 1-3/16" actual), LEATHERED — two pieces, seam at the corner ~40 sq ft Remnants $10–18/sq ft + $600–1,000 fabrication → $1,000–1,800 all-in. Dark stone hits 150–170°F — off the table. Seam away from the sink; match 3cm across both pieces; cutouts need meat — constrains which remnants work. Give fabricator: sink template, grill cutout (SL30 25½×20½ / SL36 32½×20½ — decided by now), Big Joe A–R chart opening, seam location. ⚠ Backsplash tile must be chosen before templating (rear-overhang detail).'},{route:"#/phase/6",anchor:"preflight",title:"Buy · Granite sealer (Phase 6)",kind:"materials",text:"Granite sealer Penetrating stone sealer, ~$25 bottle 1 bottle Seal at install, then twice a year, 20 minutes — calendar it."},{route:"#/phase/6",anchor:"preflight",title:"Buy · Silicone (setting beds) (Phase 6)",kind:"materials",text:"Silicone (setting beds) 100% silicone, clear or color-matched, 10 oz 2 tubes Counters set in silicone beds; fabricator epoxies + color-matches the seam and often supplies setting silicone — confirm before buying."},{route:"#/phase/6",anchor:"preflight",title:"Buy · Thinset/mortar for kamado bearing (Phase 6)",kind:"materials",text:"Thinset/mortar for kamado bearing Polymer-modified thinset (Phase 4 leftover works) leftover or 1 bag Mortar-bed the kamado feet zone and the throat-band 'little shelf' so the stone is fully bedded and never spans air (Step 6.3)."},{route:"#/phase/7",anchor:"preflight",title:"Buy · Smooth large-format porcelain (heat zone) (Phase 7)",kind:"materials",text:`Smooth large-format porcelain (heat zone) Smooth light porcelain, 24"+ faces, minimal grout lines ~17 sq ft + waste (~12 grill + ~5 kamado) sq ft Grill zone ~4' + kamado corner ~3' of the 18" band. Grout behind a grill is a grease trap — big smooth tile is the wipeable substitute for the stainless panel that was ruled out. Kamado corner may alternatively take the feature tile (soot-on-grout tradeoff, guide's words).`},{route:"#/phase/7",anchor:"preflight",title:"Buy · Feature tile (⚠ open decision) (Phase 7)",kind:"materials",text:`Feature tile (⚠ open decision) Your pick of the four comps — Sea Glass Sage is the standing recommendation; porcelain or glass ONLY behind cook surfaces ~20 sq ft (incl. the guide's +20% picket waste) + 1 extra box sq ft Sink wall + runs, ~11' of the 18" band. Picket shapes waste more. Extra box = attic stock. ⚠ Deadline was Phase 6 templating — must be locked by now.`},{route:"#/phase/7",anchor:"preflight",title:"Buy · Epoxy grout (backsplash) (Phase 7)",kind:"materials",text:"Epoxy grout (backsplash) 100% epoxy grout, ONE SHADE DARKER than instinct 1 full unit Pale grout behind a grill grays in a season anyway — guide's rule."},{route:"#/phase/7",anchor:"preflight",title:"Buy · Metal edge trim (transitions) (Phase 7)",kind:"materials",text:`Metal edge trim (transitions) Schluter-type profile matched to tile thickness, 8' 2½" lengths measure (~2–3) lengths Smooth-to-feature transitions and any change of plane/material — metal trim + silicone, never a grouted butt joint. Measure transition LF.`},{route:"#/phase/7",anchor:"preflight",title:"Buy · Thinset (backsplash) (Phase 7)",kind:"materials",text:"Thinset (backsplash) Polymer-modified exterior thinset (Phase 4 leftover works) leftover or 1 bag Same one-material-discipline system as the cladding."},{route:"#/phase/7",anchor:"preflight",title:"Buy · Color-matched silicone (counter joint) (Phase 7)",kind:"materials",text:"Color-matched silicone (counter joint) 100% silicone matched to grout, 10 oz 2 tubes Counter-to-backsplash joint gets silicone, NEVER grout — it's a movement joint."},{route:"#/phase/8",anchor:"preflight",title:"Buy · Coyote SL grill (⚠ open decision ×2) (Phase 8)",kind:"materials",text:'Coyote SL grill (⚠ open decision ×2) C3SL30 (cutout 25½"W × 20½"D × 10¼"H, ~$3,100 LP) or C3SL36 (32½"W × 20½"D × 10¼"H, ~$3,500–3,700) — LP or NG, ships fuel-specific 1 each Size was decided back at Phase 1 framing; fuel: tie-in a year+ out → order LP, cook on the tank, budget the Coyote LP→NG conversion kit + orifice/regulator swap (~$60–100) for tie-in day. Order early enough that the manual is in hand for Phase 3 vent sizing — the manual is law. Flange bears on counter, sealed per instructions.'},{route:"#/phase/8",anchor:"preflight",title:"Buy · Kamado Joe Big Joe III (standalone) (Phase 8)",kind:"materials",text:"Kamado Joe Big Joe III (standalone) Big Joe Series III grill head, no cart 1 each ~$2,200–2,700. Assemble IN PLACE — it does not fit through openings after the fact; 400+ lb ceramic, two-strong-people minimum, rent/borrow a shoulder or appliance dolly."},{route:"#/phase/8",anchor:"preflight",title:"Buy · Kamado Joe ceramic feet (Phase 8)",kind:"materials",text:"Kamado Joe ceramic feet KJ ceramic feet for built-in installs 4 each 2 front, 2 back, spaced so it can't rock when the dome swings. Required in built-ins — they create the under-grill airflow; never set the ceramic base flat on the deck. kamadojoe.com parts."},{route:"#/phase/8",anchor:"preflight",title:"Buy · SMOBOT — Kamado Joe version (Phase 8)",kind:"materials",text:"SMOBOT — Kamado Joe version SMOBOT KJ version, $349, micro-USB powered 1 each KJ version ONLY — the standard BGE daisy-wheel kit does NOT fit the cast-aluminum Kontrol Tower. Routes to the cradle outlet."},{route:"#/phase/8",anchor:"preflight",title:"Buy · Looftlighter (Phase 8)",kind:"materials",text:"Looftlighter Looftlighter electric fire starter, ~$80 1 each Covers the manual-ignition gap; stages at the cradle outlet with the SMOBOT."},{route:"#/phase/8",anchor:"preflight",title:"Buy · Fridge (Phase 8)",kind:"materials",text:'Fridge Velieta 24" front-venting built-in/freestanding, compressor, adjustable feet, ~$300–450 1 each ORDER EARLY — the Phase 1 bay gets framed to its actual cut sheet on arrival. Front grille completely unobstructed at install; cord through the grommeted pass-through to the adjacent-bay outlet.'},{route:"#/phase/8",anchor:"preflight",title:"Buy · Sink + faucet + cover (Phase 8)",kind:"materials",text:"Sink + faucet + cover Stainless bar sink + cold-only faucet + permanently attachable sink cover 1 set $120–250 class. Buy early enough to hand the fabricator the sink template at Phase 6. The cover satisfies the sewered-outdoor-sink rain rule for tie-in day. Set in silicone per template."},{route:"#/phase/8",anchor:"preflight",title:"Buy · GFCI receptacles (Phase 8)",kind:"materials",text:"GFCI receptacles 20A, weather-resistant (WR) + tamper-resistant, self-testing GFCI 2 each Head of each circuit per the guide's 'GFCI everything — at the head of each circuit or breaker-level.' If you go breaker-level GFCI instead, swap these for 2 WR duplexes and 2 GFCI breakers. Test every GFCI."},{route:"#/phase/8",anchor:"preflight",title:"Buy · WR receptacles (downstream) (Phase 8)",kind:"materials",text:"WR receptacles (downstream) 20A WR/TR duplex receptacles 2 each Downstream outlets on circuit 2 (kamado + sink convenience), protected by the head GFCI."},{route:"#/phase/8",anchor:"preflight",title:"Buy · In-use covers (Phase 8)",kind:"materials",text:"In-use covers Weatherproof in-use ('bubble') covers, single-gang, sized to box + plug 4 each Guide requires in-use covers on everything; count matches the four outlet locations. Covers stay closed over cords at the grill outlet."},{route:"#/phase/8",anchor:"preflight",title:"Buy · Circuit labels (Phase 8)",kind:"materials",text:"Circuit labels Preprinted circuit label kit or label-maker tape 1 kit Label the circuits at trim-out — guide's electrical-trim step."},{route:"#/phase/8",anchor:"preflight",title:"Buy · Propane tank (Phase 8)",kind:"materials",text:"Propane tank 20 lb LP cylinder, filled 1 each Sits on the pavers in the open, unfinished under-grill bay. Skip if you already own one. (Only if the grill ordered LP.)"},{route:"#/phase/8",anchor:"preflight",title:"Buy · Leak-test solution (Phase 8)",kind:"materials",text:"Leak-test solution Spray bottle + dish soap, or commercial gas leak detector solution 1 bottle Leak-test EVERY propane fitting with soapy water — guide's safety language, verbatim requirement."},{route:"#/phase/8",anchor:"preflight",title:"Buy · Air admittance valve (conditional) (Phase 8)",kind:"materials",text:`Air admittance valve (conditional) 1½" AAV + adapter to the trap arm 0–1 each Guide: 'AAV under the counter if that's your vent plan' — conditional on the venting approach at drain trim/tie-in.`},{route:"#/phase/8",anchor:"preflight",title:"Buy · Faucet supply connection (Phase 8)",kind:"materials",text:'Faucet supply connection ½" PEX × faucet thread adapter or ½" quarter-turn stop + braided connector 1 set Hooks the cold faucet to the Phase −1 PEX run; match your PEX connection system.'},{route:"#/phase/8",anchor:"preflight",title:"Buy · Steel wool + exterior sealant (Phase 8)",kind:"materials",text:"Steel wool + exterior sealant Coarse steel wool pad + exterior sealant tube 1 set Seal the fridge cord pass-through — 'pest highway otherwise.' Silicone leftovers cover the rest of the punch-list change-of-plane joints."},{route:"#/phase/-1",anchor:"preflight",title:'Buy · 2" ABS DWV pipe (Phase -1)',kind:"materials",text:`2" ABS DWV pipe 2" × 10' stick, ABS DWV (cellular-core fine for drain) 1 stick Covers the under-paver run + riser stub capped 6–8" proud (Step 1). ABS chosen per guide: 'San Diego is traditionally ABS territory' — match it (or transition cement) at tie-in day.`},{route:"#/phase/-1",anchor:"preflight",title:'Buy · 2" ABS long-sweep 90 (Phase -1)',kind:"materials",text:`2" ABS long-sweep 90 2" DWV long-sweep quarter bend (long-turn 90) 1 each Turns the run up into the sink bay. Guide: long-sweep 90 OR two 45s — NEVER a tight vent elbow. Buy the sweep; substitute two 2" 45s only if the sweep won't fit the seam geometry. The sweep makes the riser rodding access for the whole run.`},{route:"#/phase/-1",anchor:"preflight",title:'Buy · 2" ABS caps (Phase -1)',kind:"materials",text:'2" ABS caps 2" DWV cap, ABS 2 each One on the riser (cut to height at Phase 8 trim-out — tall stubs survive construction), one on the yard end at/below grade. Photograph + measure the yard cap to the fence post.'},{route:"#/phase/-1",anchor:"preflight",title:"Buy · ABS solvent cement (Phase -1)",kind:"materials",text:"ABS solvent cement 8 oz can, black ABS cement (no primer needed for ABS) 1 can For all drain joints. If you ever mix ABS/PVC, guide says use transition cement."},{route:"#/phase/-1",anchor:"preflight",title:'Buy · 2" Sch 40 PVC pipe (Phase -1)',kind:"materials",text:`2" Sch 40 PVC pipe 2" × 10' stick, Schedule 40 PVC 1 stick One stick yields BOTH 18–24" straight sleeves: gas sleeve (Step 2) + spare chase (Step 3). Guide allows 3" for 'luxurious clearance' on the gas sleeve; 2" ID (~2.07") passes ¾–1" CSST, fittings included. Do NOT lay actual gas pipe.`},{route:"#/phase/-1",anchor:"preflight",title:'Buy · 2" PVC caps (Phase -1)',kind:"materials",text:`2" PVC caps 2" Sch 40 PVC cap 4 each Both ends of gas sleeve + both ends of spare chase. Leave dry-fit/taped (they come off at pull-through); Sharpie ends 'GAS SLEEVE' and 'SPARE', photograph both runs.`},{route:"#/phase/-1",anchor:"preflight",title:"Buy · Pull string (Phase -1)",kind:"materials",text:"Pull string Mason line / poly pull twine, 250' spool 1 spool Guide requires a pull string left inside the gas sleeve AND the spare chase; spool spec is mine. Leftover reused for the Phase 1 corner gas chase."},{route:"#/phase/-1",anchor:"preflight",title:"Buy · Bedding sand (Phase -1)",kind:"materials",text:"Bedding sand All-purpose/paver sand, 50 lb bag 2 bags 'A few inches of sand between each' pipe and to re-bed pulled pavers. Trench order across the seam is law: drain, spare, gas — gas OUTERMOST, nothing touching."},{route:"#/phase/-1",anchor:"preflight",title:'Buy · ½" PEX tubing (Phase -1)',kind:"materials",text:'½" PEX tubing ½" PEX-A or PEX-B, red or white coil ~25 (measure) ft Measure from the existing supply riser, routed LOW and AROUND the fridge bay (never behind the fridge — compressor/exhaust path), to the sink bay; add slack for the low route.'},{route:"#/phase/-1",anchor:"preflight",title:'Buy · ½" PEX fittings kit (Phase -1)',kind:"materials",text:`½" PEX fittings kit Adapter to existing supply pipe type (verify), 2× ½" elbows or bend supports, ½" stub-out/ball valve, crimp or expansion rings to match your tool 1 set Guide says only 'PEX + fittings'. Verify what the existing water stub is (copper/CPVC/PEX) before picking the adapter.`},{route:"#/phase/-1",anchor:"preflight",title:'Buy · 1½" P-trap + sink tailpiece (Phase -1)',kind:"materials",text:'1½" P-trap + sink tailpiece 1½" tubular P-trap (ABS/poly, not chrome brass outdoors) + matching 1½" tailpiece 1 set Step 6: hard-pipe tailpiece + trap NOW so above-floor plumbing is done once; interim discharge to the jug. Run the trap arm as HIGH as the sink allows (18–20" above pavers) — banked fall budget.'},{route:"#/phase/-1",anchor:"preflight",title:'Buy · 2" × 1½" trap adapter (Phase -1)',kind:"materials",text:'2" × 1½" trap adapter 2" DWV × 1½" slip-joint trap adapter, ABS 1 each Joins the 1½" trap arm to the 2" riser on tie-in day; riser doubles as rodding access once the trap is pulled. Cheap to buy now with the ABS order.'},{route:"#/phase/-1",anchor:"preflight",title:"Buy · Sealed catch jug (Phase -1)",kind:"materials",text:"Sealed catch jug 5–7 gal carboy or jerry can 1 each The interim drain — 'much nicer than an open bucket: no splash, no smell, no mosquitoes.' Empty to a proper drain, not the landscape."},{route:"#/phase/-1",anchor:"preflight",title:"Buy · Bulkhead fitting (Phase -1)",kind:"materials",text:'Bulkhead fitting Bulkhead tank fitting sized to the trap discharge hose/pipe (typ. 1"–1½") 1 each Guide specifies a bulkhead fitting in the jug lid/wall; size is my call — match whatever connects the trap outlet to the jug.'},{route:"#/reference",anchor:"tools",title:"Tools",kind:"reference",text:"Own / buy once: brushless impact driver (the project s #1 tool), drywall screw gun w/ adjustable nose (TEKs), self-leveling cross-line laser (the #1 factor in a level kitchen — rent or ~$120), 4 box level, aviation snips (L/R/straight set), 4–6 locking C-clamp sheet-metal pliers, speed + framing square, chalk line, silver Sharpie, cut-resistant gloves, safety glasses, deburring tool, caulk gun. Buy for this project: carbide metal-cutting miter blade (Diablo Steel Demon class), non-ferrous (aluminum) blade, margin + notched trowels, tile leveling clip system, grout float + epoxy-grout sponges, N95/respirator, step bit, rivet gun (if building drawer boxes), diamond hole saws (handle holes). Rent: wet tile saw — get a rail/bridge saw for the 48 planks (~$60–90/day), not a tabletop unit."},{route:"#/reference",anchor:"library",title:"Visual Reference Library",kind:"reference",text:"Build diagrams (in this folder — keep the .svg files next to this guide): diagram-01 base + finish stack section · diagram-02 conduit offset · diagram-03 track splice + corner · diagram-04 curved wall buildup · diagram-05 kamado cradle · diagram-06 drain stub · diagram-07 door layers · diagram-08 backsplash zones Manufacturer illustrated guides (
