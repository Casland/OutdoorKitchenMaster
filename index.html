<text x="70" y="392" font-size="11" fill="#5F5E5A">Clamp before you drive — locking C-clamp pliers hold</text>
<text x="70" y="406" font-size="11" fill="#5F5E5A">the layers so the metal can't walk. Check square with a</text>
<text x="70" y="420" font-size="11" fill="#5F5E5A">framing square, then 4 screws minimum at the corner.</text>
<text x="70" y="446" font-size="11" fill="#5F5E5A">Spray every cut edge with cold-galv before assembly —</text>
<text x="70" y="460" font-size="11" fill="#5F5E5A">the miter cuts are raw steel and this is outdoors.</text>

<text x="70" y="498" font-size="11" fill="#534AB7">● = #8 x 1/2" wafer-head TEK screw</text>
</svg>`,title:"Track splice and outside corner, plan view",viewBox:"0 0 680 520",aspect:1.3076923076923077},"diagram-04-curved-wall.svg":{svg:`<svg preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" font-family="Arial, Helvetica, sans-serif">
<title>Curved wall buildup, plan view</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Curved kamado wall — plan view of the layer buildup</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">Faceted board carries the fireproofing; lath + mortar create the true radius. Kamado side is concave (lower left).</text>

\x3C!-- Arc center at (150,470). Wall band r 250..310 (outer structure). -->
\x3C!-- Outer arc r=310 -->
<path d="M 150 160 A 310 310 0 0 1 460 470" fill="none" stroke="#444441" stroke-width="1.5"/>
\x3C!-- Inner structural arc r=250 (stud line) -->
<path d="M 150 220 A 250 250 0 0 1 400 470" fill="none" stroke="#444441" stroke-width="0.75" stroke-dasharray="6 4"/>

\x3C!-- Curved track band fill between: draw as thick translucent band along mid r=280 -->
<path d="M 150 190 A 280 280 0 0 1 430 470" fill="none" stroke="#F4F2EC" stroke-width="56"/>
<path d="M 150 160 A 310 310 0 0 1 460 470" fill="none" stroke="#444441" stroke-width="1.5"/>
<path d="M 150 220 A 250 250 0 0 1 400 470" fill="none" stroke="#444441" stroke-width="1"/>

\x3C!-- Studs every 15 deg on r=280, drawn as small squares. angle from vertical at center (150,470) -->
<rect x="141" y="181" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1"/>
<rect x="205" y="190" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(15 214 199)"/>
<rect x="271" y="215" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(30 280 224)"/>
<rect x="329" y="264" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(45 338 273)"/>
<rect x="376" y="322" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(60 385 331)"/>
<rect x="404" y="386" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1" transform="rotate(75 413 395)"/>
<rect x="412" y="452" width="18" height="18" fill="#D9D6CC" stroke="#444441" stroke-width="1"/>

\x3C!-- Faceted 1/4in board strips: chords on inner face r=250, points every 15deg from (150,470):
 0:(150,220) 15:(215,229) 30:(275,254) 45:(327,293) 60:(367,345) 75:(392,406) 90:(400,470) -->
<polyline points="150,220 215,229 275,254 327,293 367,345 392,406 400,470" fill="none" stroke="#4A5A61" stroke-width="7"/>

\x3C!-- Lath: dashed smooth arc r=243 -->
<path d="M 150 227 A 243 243 0 0 1 393 470" fill="none" stroke="#5F5E5A" stroke-width="2" stroke-dasharray="6 4"/>

\x3C!-- Mortar band: r 233..241 -->
<path d="M 150 233 A 237 237 0 0 1 387 470" fill="none" stroke="#D9CDB8" stroke-width="10"/>
\x3C!-- True radius finish line r=232 -->
<path d="M 150 238 A 232 232 0 0 1 382 470" fill="none" stroke="#8A5F2A" stroke-width="1.75"/>

\x3C!-- Kamado -->
<circle cx="205" cy="415" r="52" fill="#E24B4A" stroke="#A32D2D" stroke-width="1.5"/>
<text x="205" y="412" font-size="12" font-weight="bold" fill="#FCEBEB" text-anchor="middle">Big Joe</text>
<text x="205" y="428" font-size="10" fill="#FCEBEB" text-anchor="middle">(concave side)</text>

\x3C!-- Screed template -->
<path d="M 262 330 A 232 232 0 0 1 300 362" fill="none" stroke="#0F6E56" stroke-width="5" stroke-linecap="round"/>
<line x1="285" y1="342" x2="330" y2="300" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

\x3C!-- Labels: right column -->
<line x1="223" y1="199" x2="480" y2="120" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="108" font-size="13" font-weight="bold" fill="#2C2C2A">Studs ~6" o.c. on the arc</text>
<text x="486" y="124" font-size="11" fill="#5F5E5A">set in curved track: snip both track</text>
<text x="486" y="138" font-size="11" fill="#5F5E5A">flanges every 1–2", bend web to arc;</text>
<text x="486" y="152" font-size="11" fill="#5F5E5A">matching curved track top + bottom</text>

<line x1="300" y1="268" x2="480" y2="200" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="188" font-size="13" font-weight="bold" fill="#4A5A61">1/4" board strips — flat facets</text>
<text x="486" y="204" font-size="11" fill="#5F5E5A">one strip per stud bay, zero bending;</text>
<text x="486" y="218" font-size="11" fill="#5F5E5A">thinset + mesh tape every joint</text>

<line x1="360" y1="352" x2="480" y2="268" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="256" font-size="13" font-weight="bold" fill="#5F5E5A">Galvanized expanded lath</text>
<text x="486" y="272" font-size="11" fill="#5F5E5A">wraps the facets continuously —</text>
<text x="486" y="286" font-size="11" fill="#5F5E5A">bends to any radius; overlap 2"+,</text>
<text x="486" y="300" font-size="11" fill="#5F5E5A">fasten into every stud</text>

<line x1="378" y1="410" x2="480" y2="340" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="486" y="328" font-size="13" font-weight="bold" fill="#8A5F2A">Mortar base coat to true radius</text>
<text x="486" y="344" font-size="11" fill="#5F5E5A">two thin passes; smooth stucco finish</text>
<text x="486" y="358" font-size="11" fill="#5F5E5A">or mosaic — planks stop at a trim line</text>

<text x="486" y="386" font-size="13" font-weight="bold" fill="#0F6E56">Screed template</text>
<text x="486" y="402" font-size="11" fill="#5F5E5A">plywood band-sawed to the arc from</text>
<text x="486" y="416" font-size="11" fill="#5F5E5A">the SketchUp profile; drag it around</text>
<text x="486" y="430" font-size="11" fill="#5F5E5A">the wall to shave mortar perfect</text>
<line x1="300" y1="362" x2="480" y2="390" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>

<text x="70" y="500" font-size="11" fill="#5F5E5A">Everything in this stack is non-combustible: cement board, steel lath, mortar. At 6" stud spacing the facets vanish under the mortar.</text>
<text x="70" y="518" font-size="11" fill="#5F5E5A">PT sill below chords the arc in short segments — it only needs bearing under the snipped track web every few inches.</text>
</svg>`,title:"Curved wall buildup, plan view",viewBox:"0 0 680 540",aspect:1.2592592592592593},"diagram-05-kamado-cradle.svg":{svg:`<svg preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="Arial, Helvetica, sans-serif">
<title>Kamado cradle load path</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Big Joe cradle — load travels in pure compression</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">~400+ lb of ceramic: posts land directly under the bearing points and run uninterrupted to the base</text>

\x3C!-- Pavers -->
<rect x="70" y="440" width="540" height="40" fill="#C9C7BE" stroke="#5F5E5A" stroke-width="0.75"/>

\x3C!-- Sill + track band -->
<rect x="180" y="416" width="320" height="24" fill="#B9D48B" stroke="#3B6D11" stroke-width="1"/>
<rect x="180" y="408" width="320" height="8" fill="#ECEAE4" stroke="#444441" stroke-width="1"/>

\x3C!-- Posts (doubled studs) -->
<rect x="232" y="300" width="26" height="108" fill="#F4F2EC" stroke="#444441" stroke-width="1.5"/>
<line x1="245" y1="300" x2="245" y2="408" stroke="#444441" stroke-width="0.75"/>
<rect x="422" y="300" width="26" height="108" fill="#F4F2EC" stroke="#444441" stroke-width="1.5"/>
<line x1="435" y1="300" x2="435" y2="408" stroke="#444441" stroke-width="0.75"/>

\x3C!-- Doubled rail / boxed track band -->
<rect x="210" y="284" width="260" height="16" fill="#ECEAE4" stroke="#444441" stroke-width="1.5"/>
<line x1="210" y1="292" x2="470" y2="292" stroke="#444441" stroke-width="0.75"/>

\x3C!-- Deck -->
<rect x="204" y="276" width="272" height="8" fill="#C4CDD1" stroke="#4A5A61" stroke-width="0.75"/>

\x3C!-- Mortar pads + ceramic feet -->
<rect x="262" y="270" width="42" height="6" fill="#D9CDB8" stroke="#8A5F2A" stroke-width="0.5"/>
<rect x="376" y="270" width="42" height="6" fill="#D9CDB8" stroke="#8A5F2A" stroke-width="0.5"/>
<rect x="272" y="252" width="22" height="18" fill="#F4F2EC" stroke="#444441" stroke-width="1.25"/>
<rect x="386" y="252" width="22" height="18" fill="#F4F2EC" stroke="#444441" stroke-width="1.25"/>

\x3C!-- Kamado egg -->
<ellipse cx="340" cy="155" rx="98" ry="100" fill="#E24B4A" stroke="#A32D2D" stroke-width="1.5"/>
<ellipse cx="340" cy="120" rx="70" ry="30" fill="none" stroke="#A32D2D" stroke-width="1"/>
<rect x="326" y="42" width="28" height="16" rx="3" fill="#444441"/>
<text x="340" y="165" font-size="13" font-weight="bold" fill="#FCEBEB" text-anchor="middle">Big Joe</text>

\x3C!-- Counter on both sides with gap -->
<rect x="70" y="220" width="150" height="14" fill="#ECEAE4" stroke="#8A5F2A" stroke-width="1.25"/>
<rect x="460" y="220" width="150" height="14" fill="#ECEAE4" stroke="#8A5F2A" stroke-width="1.25"/>

\x3C!-- Load arrows -->
<line x1="283" y1="256" x2="283" y2="430" stroke="#A32D2D" stroke-width="2" stroke-dasharray="6 4"/>
<polygon points="279,430 287,430 283,440" fill="#A32D2D"/>
<line x1="397" y1="256" x2="397" y2="430" stroke="#A32D2D" stroke-width="2" stroke-dasharray="6 4"/>
<polygon points="393,430 401,430 397,440" fill="#A32D2D"/>

\x3C!-- Labels left -->
<line x1="272" y1="260" x2="150" y2="272" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="144" y="262" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="end">Ceramic feet — 4 required</text>
<text x="144" y="278" font-size="11" fill="#5F5E5A" text-anchor="end">2 front + 2 back, spaced so the grill</text>
<text x="144" y="292" font-size="11" fill="#5F5E5A" text-anchor="end">can't rock when the dome opens;</text>
<text x="144" y="306" font-size="11" fill="#5F5E5A" text-anchor="end">they create required under-airflow</text>

<line x1="240" y1="350" x2="150" y2="350" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="144" y="340" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="end">Posts under bearing points</text>
<text x="144" y="356" font-size="11" fill="#5F5E5A" text-anchor="end">doubled/boxed studs; uninterrupted</text>
<text x="144" y="370" font-size="11" fill="#5F5E5A" text-anchor="end">to base track — NEVER carried on a</text>
<text x="144" y="384" font-size="11" fill="#5F5E5A" text-anchor="end">horizontal stud spanning an open bay</text>

<line x1="204" y1="230" x2="150" y2="212" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="144" y="196" font-size="13" font-weight="bold" fill="#8A5F2A" text-anchor="end">Counter (granite)</text>
<text x="144" y="212" font-size="11" fill="#5F5E5A" text-anchor="end">shelf sits BELOW counter height so</text>
<text x="144" y="226" font-size="11" fill="#5F5E5A" text-anchor="end">the band + front latch stay reachable</text>

\x3C!-- Labels right -->
<line x1="470" y1="292" x2="500" y2="310" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="506" y="304" font-size="13" font-weight="bold" fill="#2C2C2A">Doubled rail grid</text>
<text x="506" y="320" font-size="11" fill="#5F5E5A">web-vertical or boxed track —</text>
<text x="506" y="334" font-size="11" fill="#5F5E5A">never flat track on its weak axis</text>

<line x1="476" y1="280" x2="500" y2="260" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="506" y="248" font-size="13" font-weight="bold" fill="#4A5A61">Continuous deck</text>
<text x="506" y="264" font-size="11" fill="#5F5E5A">cement board over the grid; feet</text>
<text x="506" y="278" font-size="11" fill="#5F5E5A">zones mortar-bedded, never on</text>
<text x="506" y="292" font-size="11" fill="#5F5E5A">thin flanges</text>

<line x1="397" y1="380" x2="500" y2="380" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="506" y="372" font-size="13" font-weight="bold" fill="#A32D2D">Load path</text>
<text x="506" y="388" font-size="11" fill="#5F5E5A">feet, deck, rails, posts, track,</text>
<text x="506" y="402" font-size="11" fill="#5F5E5A">PT sill, pavers — straight down</text>

<text x="70" y="500" font-size="11" fill="#5F5E5A">Dimension the opening from the Kamado Joe A–R built-in chart (Ceramic Grill Store). Verify dome rear swing clears the curved wall,</text>
<text x="70" y="516" font-size="11" fill="#5F5E5A">and keep the counter open in front of the grill — the front latch needs access. Assemble the Big Joe in place; it will not fit later.</text>
</svg>`,title:"Kamado cradle load path",viewBox:"0 0 680 520",aspect:1.3076923076923077},"diagram-06-drain-stub.svg":{svg:`<svg preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 512" font-family="Arial, Helvetica, sans-serif">
<title>Drain stub geometry</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Drain start — seated high, section view (yard left, island right)</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">2" DWV directly beneath the pavers banks elevation for the tight fall budget; riser doubles as rodding access</text>

<line x1="554" y1="204" x2="470" y2="86" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="80" y="76" font-size="13" font-weight="bold" fill="#2C2C2A">Riser capped 6–8" proud of pavers</text>
<text x="80" y="92" font-size="11" fill="#5F5E5A">cut to height at trim-out; tall stubs survive construction. Pull the trap = rodding access to the whole buried run.</text>

<rect x="360" y="120" width="250" height="150" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="6 4"/>
<text x="478" y="140" font-size="11" fill="#5F5E5A" text-anchor="middle">sink cabinet bay</text>

<line x1="380" y1="176" x2="610" y2="176" stroke="#0F6E56" stroke-width="1" stroke-dasharray="5 4"/>
<text x="384" y="168" font-size="11" fill="#0F6E56">trap arm exits high (~18–20") = free fall budget</text>

<rect x="360" y="270" width="250" height="30" fill="#B9D48B" stroke="#3B6D11" stroke-width="1"/>
<text x="452" y="289" font-size="11" fill="#3B6D11" text-anchor="middle">PT sill + frame footprint</text>

<rect x="60" y="300" width="560" height="34" fill="#C9C7BE" stroke="#5F5E5A" stroke-width="0.75"/>
<line x1="170" y1="300" x2="170" y2="334" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="280" y1="300" x2="280" y2="334" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="390" y1="300" x2="390" y2="334" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="500" y1="300" x2="500" y2="334" stroke="#5F5E5A" stroke-width="0.5"/>

<rect x="360" y="300" width="200" height="34" fill="#E24B4A" opacity="0.14"/>

<path d="M 100 344 L 520 338 Q 552 336 554 306 L 554 210" fill="none" stroke="#55534E" stroke-width="16" stroke-linecap="butt"/>
<path d="M 100 344 L 520 338 Q 552 336 554 306 L 554 210" fill="none" stroke="#E8E6E0" stroke-width="11"/>

<rect x="88" y="334" width="12" height="20" fill="#DDDACF" stroke="#55534E" stroke-width="1.25"/>
<rect x="543" y="200" width="22" height="12" rx="2" fill="#DDDACF" stroke="#55534E" stroke-width="1.25"/>

<line x1="360" y1="270" x2="540" y2="270" stroke="#4A5A61" stroke-width="2"/>
<line x1="568" y1="270" x2="610" y2="270" stroke="#4A5A61" stroke-width="2"/>

<line x1="300" y1="362" x2="180" y2="364" stroke="#185FA5" stroke-width="1.5"/>
<polygon points="180,359 180,369 168,364" fill="#185FA5"/>
<text x="246" y="382" font-size="11" fill="#185FA5" text-anchor="middle">slight fall toward yard</text>

<path d="M 94 354 L 70 400 L 70 424" fill="none" stroke="#55534E" stroke-width="3" stroke-dasharray="6 5"/>

<line x1="300" y1="332" x2="240" y2="212" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="80" y="192" font-size="13" font-weight="bold" fill="#2C2C2A">2" ABS/PVC DWV seated directly beneath pavers</text>
<text x="80" y="208" font-size="11" fill="#5F5E5A">2" beats 3": smaller pipe = higher invert = more fall to spend</text>

<line x1="96" y1="336" x2="120" y2="252" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="80" y="234" font-size="13" font-weight="bold" fill="#2C2C2A">Capped yard end at/below grade</text>
<text x="80" y="250" font-size="11" fill="#5F5E5A">photo + tape-measure to the fence post</text>

<text x="368" y="324" font-size="10" font-weight="bold" fill="#A32D2D">NO-DRILL ZONE over pipe</text>

<line x1="548" y1="320" x2="616" y2="356" stroke="#888780" stroke-width="0.6" stroke-dasharray="3 3"/>
<text x="620" y="352" font-size="12" font-weight="bold" fill="#2C2C2A">Long-</text>
<text x="620" y="366" font-size="12" font-weight="bold" fill="#2C2C2A">sweep 90</text>
<text x="620" y="382" font-size="10" fill="#5F5E5A">or 2x45s;</text>
<text x="620" y="394" font-size="10" fill="#5F5E5A">never a</text>
<text x="620" y="406" font-size="10" fill="#5F5E5A">vent elbow</text>

<text x="80" y="440" font-size="11" fill="#5F5E5A">Tie-in day: the dashed continuation drops to 12"+ cover just OUTSIDE the footprint, then 1/4" per ft to the cleanout.</text>
<text x="80" y="458" font-size="11" fill="#5F5E5A">Interim: trap discharges to a sealed 5–7 gal jug with a bulkhead fitting inside the cabinet.</text>
<text x="80" y="476" font-size="11" fill="#5F5E5A">Everything from the trap up lives above the cabinet floor. Cabinet floor board gets a sealed hole around the riser.</text>
<text x="80" y="494" font-size="11" fill="#854F0B">Gas sleeve (not shown): straight 2–3" PVC chase in the same trench, ~12" offset, ending in the open propane bay. Both lines = no-drill zone.</text>
</svg>`,title:"Drain stub geometry",viewBox:"0 0 680 512",aspect:1.328125},"diagram-07-door-layers.svg":{svg:`<svg preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" font-family="Arial, Helvetica, sans-serif">
<title>Door construction layers</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Door build — three layers, bolt-and-bond, no welding</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">Frame + backer + tile face. Size = opening minus an even 1/8–3/16" reveal all around.</text>

\x3C!-- Layer 1: aluminum frame -->
<text x="145" y="86" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="middle">1 — Aluminum frame</text>
<rect x="70" y="100" width="150" height="230" fill="none" stroke="#888780" stroke-width="10"/>
<line x1="75" y1="215" x2="215" y2="215" stroke="#888780" stroke-width="8"/>
<polygon points="75,105 110,105 75,140" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<polygon points="215,105 180,105 215,140" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<polygon points="75,325 110,325 75,290" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<polygon points="215,325 180,325 215,290" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>
<circle cx="92" cy="120" r="3" fill="#534AB7"/>
<circle cx="198" cy="120" r="3" fill="#534AB7"/>
<circle cx="92" cy="310" r="3" fill="#534AB7"/>
<circle cx="198" cy="310" r="3" fill="#534AB7"/>
<text x="145" y="352" font-size="11" fill="#5F5E5A" text-anchor="middle">1"x1" tube/angle, miter cut,</text>
<text x="145" y="366" font-size="11" fill="#5F5E5A" text-anchor="middle">gussets + SS machine screws</text>
<text x="145" y="380" font-size="11" fill="#5F5E5A" text-anchor="middle">+ structural adhesive (DP420);</text>
<text x="145" y="394" font-size="11" fill="#5F5E5A" text-anchor="middle">center rail on doors over 24"</text>

<text x="248" y="225" font-size="26" fill="#5F5E5A" text-anchor="middle">+</text>

<rect x="270" y="100" width="150" height="230" fill="#9FE1CB" stroke="#085041" stroke-width="1.25"/>
<circle cx="290" cy="120" r="3" fill="#0F6E56"/>
<circle cx="400" cy="120" r="3" fill="#0F6E56"/>

<circle cx="400" cy="310" r="3" fill="#0F6E56"/>
<text x="345" y="352" font-size="11" fill="#5F5E5A" text-anchor="middle">waterproof foam board, a fraction</text>
<text x="345" y="366" font-size="11" fill="#5F5E5A" text-anchor="middle">of cement board's weight (weight</text>
<text x="345" y="380" font-size="11" fill="#5F5E5A" text-anchor="middle">kills hinges); bonded AND screwed</text>
<text x="345" y="394" font-size="11" fill="#5F5E5A" text-anchor="middle">to frame — seal edges + seams</text>

<text x="448" y="225" font-size="26" fill="#5F5E5A" text-anchor="middle">+</text>

\x3C!-- Layer 3: tile face -->
<text x="545" y="86" font-size="13" font-weight="bold" fill="#2C2C2A" text-anchor="middle">3 — Porcelain plank face</text>
<rect x="470" y="100" width="150" height="230" fill="none" stroke="#8A5F2A" stroke-width="4"/>

<text x="545" y="352" font-size="11" fill="#5F5E5A" text-anchor="middle">door EDGES land on grout joints;</text>
<text x="545" y="366" font-size="11" fill="#5F5E5A" text-anchor="middle">metal edge trim perimeter, epoxy</text>
<text x="545" y="380" font-size="11" fill="#5F5E5A" text-anchor="middle">grout; handle holes diamond-drilled,</text>
<text x="545" y="394" font-size="11" fill="#5F5E5A" text-anchor="middle">siliconed, through-bolted to frame</text>

\x3C!-- Hinge note strip -->
<rect x="70" y="418" width="540" height="2" fill="#D3D1C7"/>
<text x="70" y="444" font-size="13" font-weight="bold" fill="#2C2C2A">Hinges — install prep BEFORE tiling:</text>
<text x="70" y="462" font-size="11" fill="#5F5E5A">European-look opening: clamp-on concealed hinges made for aluminum-frame doors (3-way adjustable, no 35mm bore). Fallback: stainless piano hinge.</text>
<text x="70" y="478" font-size="11" fill="#5F5E5A">Either way: machine screws + lock nuts into the frame (never self-tappers), landing on the aluminum-angle hinge backing bolted into the studs in Phase 1.</text>
</svg>`,title:"Door construction layers",viewBox:"0 0 680 500",aspect:1.36},"diagram-08-backsplash-zones.svg":{svg:`<svg preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="Arial, Helvetica, sans-serif">
<title>Backsplash zones, elevation</title>
<text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A">Backsplash — 18" band, zoned by heat (elevation, wall unrolled flat)</text>
<text x="340" y="46" text-anchor="middle" font-size="12" fill="#5F5E5A">~18 LF of back wall. Grout behind a grill is a grease trap: smooth large-format porcelain in the heat zone instead of stainless.</text>

\x3C!-- Z-flashing -->
<rect x="70" y="120" width="540" height="6" fill="#B4B2A9" stroke="#5F5E5A" stroke-width="0.75"/>

<g stroke="#5DCAA5" stroke-width="0.75" fill="none">

<path d="M 402 126 L 412 141 L 412 201 L 402 216"/>
<path d="M 424 126 L 434 141 L 434 201 L 424 216"/>
<path d="M 446 126 L 456 141 L 456 201 L 446 216"/>
<path d="M 468 126 L 478 141 L 478 201 L 468 216"/>
<path d="M 490 126 L 500 141 L 500 201 L 490 216"/>
<path d="M 512 126 L 522 141 L 522 201 L 512 216"/>
<path d="M 534 126 L 544 141 L 544 201 L 534 216"/>
<path d="M 556 126 L 566 141 L 566 201 L 556 216"/>
<path d="M 578 126 L 588 141 L 588 201 L 578 216"/>
</g>

\x3C!-- Movement joints between zones -->
<line x1="190" y1="126" x2="190" y2="216" stroke="#0F6E56" stroke-width="2.5"/>
<line x1="280" y1="126" x2="280" y2="216" stroke="#0F6E56" stroke-width="2.5"/>

\x3C!-- Silicone joint + counter -->
<rect x="70" y="216" width="540" height="4" fill="#0F6E56"/>

<rect x="82" y="242" width="96" height="52" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3"/>
<text x="130" y="272" font-size="11" fill="#5F5E5A" text-anchor="middle">grill</text>
<circle cx="235" cy="268" r="26" fill="none" stroke="#A32D2D" stroke-width="1" stroke-dasharray="5 3"/>
<text x="235" y="272" font-size="11" fill="#A32D2D" text-anchor="middle">kamado</text>
<rect x="380" y="242" width="70" height="52" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 3"/>
<text x="415" y="272" font-size="11" fill="#5F5E5A" text-anchor="middle">sink</text>

\x3C!-- Zone width dimensions -->

<text x="130" y="98" font-size="11" fill="#5F5E5A" text-anchor="middle">~4' smooth · ~12 sq ft</text>

<line x1="196" y1="106" x2="280" y2="106" stroke="#5F5E5A" stroke-width="0.75"/>
<line x1="280" y1="100" x2="280" y2="112" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="238" y="98" font-size="11" fill="#5F5E5A" text-anchor="middle">~3' · ~5 sq ft</text>

<line x1="286" y1="106" x2="610" y2="106" stroke="#5F5E5A" stroke-width="0.75"/>

<text x="448" y="98" font-size="11" fill="#5F5E5A" text-anchor="middle">~11' feature tile · ~20 sq ft + 20% waste (pickets waste more)</text>

<line x1="624" y1="216" x2="636" y2="216" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="642" y="175" font-size="11" fill="#5F5E5A">18"</text>

\x3C!-- Legend / rules -->
<text x="70" y="330" font-size="13" font-weight="bold" fill="#2C2C2A">Rules baked into this elevation</text>
<text x="70" y="350" font-size="11" fill="#5F5E5A">— Z-flashing across the top plate (gray strip), sloped toward the fence, front edge caulked</text>
<text x="70" y="366" font-size="11" fill="#0F6E56">— Green lines = SILICONE movement joints: at the counter and at every zone/material change — never grout there</text>
<text x="70" y="382" font-size="11" fill="#5F5E5A">— Grill + kamado zones: smooth 24"+ light porcelain, minimal grout lines; feature zone: your pick of the four comps</text>
<text x="70" y="398" font-size="11" fill="#5F5E5A">— Epoxy grout, one shade darker than instinct; porcelain/glass only — never stone behind a cook surface</text>
<text x="70" y="414" font-size="11" fill="#5F5E5A">— Buy one extra box of the feature tile as attic stock; dye lots disappear</text>
</svg>`,title:"Backsplash zones, elevation",viewBox:"0 0 680 440",aspect:1.5454545454545454}},be=[{id:"OD1",decisionRef:"D11",title:'Grill: Coyote SL 30" vs 36" — and LP vs NG',deadlinePhase:1,deadlineStep:"1.6",deadlineText:"Before framing the grill bay (Phase 1, Step 1.6)",method:`Cardboard mockup at 25½" vs 32½" cutout widths on the real sill once it's down.`,status:"open",resolution:null,deadlineAnchor:"step-16-openings-and-blocking-do-now-or-regret-it-list"},{id:"OD2",decisionRef:"D13",title:"Backsplash tile — four comps; Sea Glass Sage recommended",deadlinePhase:6,deadlineStep:null,deadlineText:"Before the counter is templated (Phase 6); practically before the Phase 4 tile order if you want one combined order",method:"Pick from the four rendered comps — Sea Glass Sage is the standing recommendation next to the red Big Joe.",status:"open",resolution:null,deadlineAnchor:null},{id:"OD3",decisionRef:"D07",title:"Door hinges: clamp-on concealed (Euro opening preferred) vs piano",deadlinePhase:5,deadlineStep:null,deadlineText:"Phase 5, before tiling the door faces",method:"Shortlist clamp-on concealed hinges for aluminum-frame doors; piano hinge is the sag-proof fallback. Phase 1 hinge backing supports either.",status:"open",resolution:null,deadlineAnchor:null},{id:"OD4",decisionRef:"D18",title:"Sewer + gas tie-in timing / permit",deadlinePhase:null,deadlineStep:null,deadlineText:"No build deadline — the jug and capped stubs bridge it",method:"When it happens, permitted is cheap insurance relative to the trench labor. Confirm the path with San Diego DSD.",status:"open",resolution:null,deadlineAnchor:null}],ye=[{source:"manual",id:"F1",severity:"review",summary:"Coyote SL conversion kit costs ~$320 at the manufacturer — the guide budgets ~$60–100 for the LP→NG swap.",details:"Owner-verified July 2026 on coyotegrill.com: SL-series kits exist BOTH directions — LP→NG (C3LP2NG) and NG→LP (C3NG2LP) — at roughly $320 each, so budget ~$250 more than the guide's Phase −1 fuel note and D11 estimate (installer hour still applies). Both-way availability also de-risks the LP-first strategy: the fuel choice is reversible for the kit price.",locations:[{doc:"build-guide",anchor:"phase--1"}],status:"open"},{id:"AUTO-1",source:"auto",severity:"review",summary:'Materials rollup: "Shell (Phases −1 through 4)" rows sum to $1,930–$3,330 but the stated subtotal is $1,900–$3,450.',details:"Computed from the Est. column of the master materials list. Verify which figure is current — the site displays the guide's numbers unchanged.",locations:[{doc:"build-guide",anchor:"materials"}],status:"open"},{id:"AUTO-2",source:"auto",severity:"review",summary:'Materials rollup: "Doors, drawers, counter, backsplash (Phases 5–7)" rows sum to $1,800–$3,550 but the stated subtotal is $1,850–$3,700.',details:"Computed from the Est. column of the master materials list. Verify which figure is current — the site displays the guide's numbers unchanged.",locations:[{doc:"build-guide",anchor:"materials"}],status:"open"},{id:"AUTO-3",source:"auto",severity:"review",summary:'Materials rollup: "Appliances (Phase 8)" rows sum to $6,230–$7,680 but the stated subtotal is $6,200–$7,700.',details:"Computed from the Est. column of the master materials list. Verify which figure is current — the site displays the guide's numbers unchanged.",locations:[{doc:"build-guide",anchor:"materials"}],status:"open"},{id:"AUTO-4",source:"auto",severity:"review",summary:"Project total: the three subtotals sum to $9,950–$14,850, but the guide states roughly $10,100–$15,000.",details:'The guide says "roughly", so this may be deliberate rounding to the landing zone set early on — flagged so you can confirm rather than have the site silently pick one.',locations:[{doc:"build-guide",anchor:"materials"}],status:"open"}],ke={"Plumbing rough-in":[-1],Base:[0],Frame:[1],"Corrosion protection":[1],Sheathing:[3],"Waterproofing/flashing":[3],"Curved wall":[3],Electrical:[2],Cladding:[4],"Doors (DIY)":[5],Drawers:[5],Countertop:[6],Backsplash:[7],Grill:[8],Kamado:[8],"Controller + lighter":[8],Fridge:[8],"Sink + faucet":[8],"LP detector, vents, misc":[3,8]},we={0:[{item:"PVC conduit offset fittings",spec:`Sch 40 PVC 'meter offset' fittings, trade size matched to existing stubs (likely ¾" — verify)`,qty:"3–4 (measure)",unit:"each",source:"measure",note:"~$2 each per guide (or heat-gun-bend your own). Count = number of pipes in the stubs — confirm what the second pipe in the double stub is BEFORE demo; it changes the plan if it's not a spare.",id:"p0.buy.b6055267"},{item:"PVC conduit couplings",spec:"Sch 40 PVC coupling, same trade size as stubs",qty:"4",unit:"each",source:"estimate",note:"Glue onto each cut-down stub (leave a coupling's worth above the pavers) before the offset goes on. Step 0.2.4.",id:"p0.buy.26252ec6"},{item:"PVC conduit caps",spec:"Push-on caps or tape plugs, same trade size",qty:"4",unit:"each",source:"estimate",note:"Cap the open conduit ends until Phase 2.",id:"p0.buy.d13c4571"},{item:"PVC cement + primer (gray/conduit)",spec:"Small can each, rated for electrical PVC",qty:"1",unit:"set",source:"estimate",note:"Serves Phase 0 offsets and the Phase 2 conduit runs.",id:"p0.buy.2f9cce9b"},{item:"PT 2×4 sill lumber",spec:"Pressure-treated 2×4, above-ground UC3A tag, 8' (length assumed — take a cut list from the footprint)",qty:"8–10",unit:"boards",source:"guide",note:'Guide count is 8–10. Every wall line incl. backsplash wall and kamado cradle; short chorded segments (or band-sawn curve) under the arc. Drill ~¼"-oversize holes mid-board where conduit rises — stronger than a notch.',id:"p0.buy.b07af624"},{item:"Shims",spec:"Cedar shim contractor pack (composite shims = the rot-proof upgrade the guide names)",qty:"2",unit:"packs",source:"guide",note:"Shim to the laser at every bearing point, packing UP from the pavers' high point — never grind down.",id:"p0.buy.404bb063"},{item:"PL Premium construction adhesive",spec:"Loctite PL Premium, 10 oz cartridge",qty:"2",unit:"cartridges",source:"guide",note:"Guide: 'PL Premium ×2'. Bed every sill run before anchoring.",id:"p0.buy.1a46eaaa"},{item:"Tapcon anchors",spec:'¼" × 3¼" hex-head Tapcon, 25-count box w/ matched masonry bit (length derived: 1½" PT + ≥1" paver embedment)',qty:"1",unit:"box",source:"estimate",note:"Guide says 'Tapcons/paver anchors every few feet' — ~25 covers ~60 LF of sill at ~3' spacing. NO anchor ever lands on the marked drain or gas-sleeve lines — they sit at exactly bedding depth (Phase −1 anchor-conflict warning).",id:"p0.buy.c5240212"},{item:"Sill seal foam",spec:`Closed-cell polyethylene sill seal, 3½" × 50' roll`,qty:"2",unit:"rolls",source:"estimate",note:"Non-negotiable isolation over the TOP of every PT run before any steel touches it — ACQ/copper-azole PT corrodes galvanized steel. Buy 2 rolls to cover all runs; return one if the LF comes in under 50'.",id:"p0.buy.ef74a001"}],1:[{item:"Steel studs",spec:`3-5/8" × 10' 20-gauge EQ galvanized studs — label reads -18/-19/-20/-23 mil; AVOID -14/-16`,qty:"~50",unit:"sticks",source:"guide",note:'10-footers yield three ~33" studs per stick (locked cut length 32-13/16"). Buy from J&B (El Cajon) or Westside (Sorrento Valley) supply yards, not HD. Dry-stack one test sandwich to 34-13/16" before gang-cutting fifty.',id:"p1.buy.2d73d6ad"},{item:"Steel track",spec:`3-5/8" × 10' 20-gauge EQ track (U-channel, no return lips)`,qty:"~14",unit:"sticks",source:"guide",note:`Don't mix up with studs. Curved corner track: snip both flanges every 1–2" and bend — comes out of this count. Blocking/ledgers/boxed members also cut from the stud+track sticks — no separate purchase.`,id:"p1.buy.a75b8da0"},{item:'#8 × ½" wafer-head self-drilling TEK screws',spec:"500-count box",qty:"1",unit:"box",source:"guide",note:"Stud↔track, ~4 per stud. Buy online/Fastenal, not HD. Heads-up (my math, flagged): 150 cut studs × 4 = 600 — grab a second box if you cut all 50 sticks.",id:"p1.buy.91feb22b"},{item:'#10 × ¾" hex-head TEK screws',spec:"100-count box; G185 hot-dip or stainless coating — plain zinc never touches PT",qty:"1",unit:"box",source:"guide",note:"Track→PT sill; they bite the wood better. The G185/stainless rule at PT is law.",id:"p1.buy.f0c7dae0"},{item:"Cold-galvanizing spray",spec:"Cold-galv zinc spray, standard rattle can",qty:"2",unit:"cans",source:"guide",note:"EVERY cut edge gets sprayed — non-negotiable outdoors. Also every deburred track weep hole (Step 1.3).",id:"p1.buy.5d342e10"},{item:"PVC pipe for corner gas chase",spec:`1¼"–1½" Sch 40 PVC × 10' (guide's stated size range)`,qty:"1",unit:"stick",source:"guide",note:"Step 1.4b: route through the kamado corner's stud knockouts while framing is bare, both ends emerging in flanking bays. ~$8 of pipe; once the Big Joe loads the cradle this corner is blind forever.",id:"p1.buy.c52c9661"},{item:'1½" PVC caps',spec:"Cap to match chase pipe size",qty:"2",unit:"each",source:"estimate",note:"Cap both chase ends, insert pull string (Phase −1 spool), label 'GAS CHASE'.",id:"p1.buy.3f48569f"},{item:"Aluminum angle for hinge backing",spec:`1"×1" × 1/8" aluminum angle, 8' lengths`,qty:"2 (measure)",unit:"lengths",source:"measure",note:"Step 1.6: bolt across the hinge-side stud at EVERY door opening NOW — a thin stud web won't hold a hinge for 20 years, miserable retrofit. Count door openings for LF. Guide's alternative: boxed heavier-gauge stud from track offcuts.",id:"p1.buy.756cec73"}],2:[{item:"PVC electrical conduit",spec:`¾" Sch 40 gray electrical PVC × 10' (size assumed — must match the existing stubs; verify before buying)`,qty:"~5 (measure)",unit:"sticks",source:"measure",note:"Conduit runs the WHOLE way — island interior is a damp/wet location: THWN-2 in conduit, no Romex, no bare UF. Measure both circuit paths through stud bays and knockouts.",id:"p2.buy.e6367be7"},{item:"Conduit fittings assortment",spec:'¾": 4–6 sweep 90s, ~10 couplings, 8–10 male terminal adapters (2 per box entry), LB only if a run needs it',qty:"1",unit:"set",source:"estimate",note:"Guide names offsets (bought Phase 0) and generic 'fittings'; this assortment is my derivation for two circuits and five boxes.",id:"p2.buy.9a1ea2f5"},{item:"Snap-in bushings/grommets",spec:'Plastic snap bushings sized to the 1½" stud knockouts + conduit KOs, bag of ~20',qty:"1",unit:"bag",source:"estimate",note:"Guide: 'bushings/grommets on any cut steel edge.' Grommets at every knockout regardless — abrasion protection is a separate rule from strike protection (D19).",id:"p2.buy.aa92730c"},{item:"Weatherproof outlet boxes",spec:`Single-gang PVC weatherproof ('Bell') boxes with ¾" hubs`,qty:"4",unit:"each",source:"estimate",note:'Grill: low 8–12" in adjacent cavity; fridge: in ADJACENT cabinet, never behind the fridge; sink: high on sidewall away from trap drips; kamado: near cradle. Anything near the propane bay mounts HIGH — gas pools low.',id:"p2.buy.dfa0761d"},{item:"Weatherproof junction box",spec:'PVC WP j-box, 4" square class, ¾" hubs',qty:"1",unit:"each",source:"estimate",note:"Accessible splice hub in the fridge cavity — a removable panel counts as accessible; buried behind tile doesn't.",id:"p2.buy.df97206f"},{item:"THWN-2 wire",spec:"12 AWG stranded THWN-2 — black + red (hots), white ×2 or shared per fill (neutrals), green (ground)",qty:"measure",unit:"ft",source:"measure",note:"Measure each conduit path end-to-end, add 10% + box tails. Two 20A circuits: (1) fridge dedicated, (2) grill + kamado + sink convenience. Pull, coil tails, land NOTHING until Phase 8. Remember D20: a future point-of-use water heater (~12A) weighs on circuit loading.",id:"p2.buy.d7660aeb"},{item:"Cord pass-through grommet",spec:'Rubber desk-type grommet, ~1" hole',qty:"1",unit:"each",source:"estimate",note:"Fridge cord pass-through from cavity to adjacent-bay outlet; steel wool + sealant close it at Phase 8 — pest highway otherwise.",id:"p2.buy.cb644c66"}],3:[{item:'½" cement board',spec:`½" × 3'×5' sheets (Durock/Hardie)`,qty:"~26",unit:"sheets",source:"guide",note:"Guide's own caveat: the open back removed ~100 sq ft from earlier estimates — RE-COUNT against the final plan before buying, then buy 2–3 extra. Grill-bay back sheet gets pre-attached to its panel at Phase 1 tilt-up. Respirator for every cut — non-negotiable.",id:"p3.buy.6f982bb3"},{item:"Backer screws",spec:'Power Pro #9 × 1¼" ceramic-coated wafer-head backer screws, 925-count box',qty:"1",unit:"box",source:"guide",note:'Covers the whole project. 1¼" is right: ½" board + ¾" past it to thread the steel. Screws every 8" into studs.',id:"p3.buy.700c93b6"},{item:"Alkali-resistant mesh tape",spec:`2" × 150' alkali-resistant fiberglass mesh`,qty:"2",unit:"rolls",source:"estimate",note:"All seams + corners, plus the curved wall's facet joints (Step 3.5.2).",id:"p3.buy.03543c05"},{item:"Thinset for seams/facets",spec:"Polymer-modified thinset, 50 lb bag",qty:"2",unit:"bags",source:"estimate",note:"Seam taping, facet packing, and laminating alternate on the curve. Cladding thinset is a separate Phase 4 buy.",id:"p3.buy.063f83ff"},{item:"Waterproofing membrane",spec:"RedGard or AquaDefense, 1-gal pails",qty:"2",unit:"gal",source:"guide",note:"Counter deck (top + back edge) + clad faces ONLY — two coats, opposing directions. Boarded back gets NO membrane (drying side by design, D24). Clad within 2–4 months — UV degrades it, rain doesn't.",id:"p3.buy.2cf358b7"},{item:"Z-flashing",spec:"Galvanized or stainless Z-profile sized to the backsplash top plate width",qty:"measure (~2 × 10')",unit:"pieces",source:"measure",note:"Across the backsplash top plate, sloped toward the fence, front edge caulked. Measure top-plate length + lap allowance.",id:"p3.buy.44c9dec7"},{item:"Weep screed",spec:`Stucco weep screed for ~1" finish stack, 10' sticks`,qty:"measure (~4)",unit:"sticks",source:"measure",note:'Base perimeter of all clad faces, ~½" above pavers (D17 — no raw wood at grade). Measure clad perimeter LF.',id:"p3.buy.477cd2fa"},{item:'¼" galvanized hardware cloth',spec:`¼" mesh galvanized hardware cloth, 36" × 25' roll`,qty:"1 (measure)",unit:"roll",source:"measure",note:'Entire back EXCEPT the grill bay; kamado corner stays cloth (D14). Cavity height ~33" fits 36" width; measure back LF minus grill bay. Curved corner gets stapled progressively during Phase 1 framing — buy before framing if you want it on hand then.',id:"p3.buy.19c83c00"},{item:"Stainless screws + fender washers (cloth attachment)",spec:"#8 stainless pan-heads + stainless fender washers, small box each",qty:"1",unit:"set",source:"estimate",note:"Cloth 'staples/screws on from the front through the bays'.",id:"p3.buy.76b6585f"},{item:"Rockwool ComfortBatt R-15",spec:"R-15 mineral wool batt pack",qty:"1",unit:"pack",source:"guide",note:"Guide's Phase 3 list: '1 pack does grill bay + fridge bay + sink back.' Note Step 3.4 separately demotes the grill-bay-adjacent cavity batt to a buy-it-later retrofit — flagged for review; reconcile before checkout.",id:"p3.buy.01e7e684"},{item:'¼" cement board (curved wall)',spec:`¼" × 3'×5' sheets`,qty:"2",unit:"sheets",source:"guide",note:'Cut into vertical strips ~6" wide, one per arc stud bay — flat facets, zero bending stress. Two backer screws per strip per stud.',id:"p3.buy.5fc35e1e"},{item:"Expanded-metal lath",spec:'Galvanized expanded-metal lath, 2.5 lb, 27"×96" sheets',qty:"2",unit:"sheets",source:"estimate",note:'Wrap the arc continuously, laps 2"+, fasten into every stud — this is the true curve former.',id:"p3.buy.9d7a6f43"},{item:"Base-coat mortar",spec:"Polymer-modified stucco base coat (or sanded thinset), 50 lb bag",qty:"1",unit:"bag",source:"estimate",note:"Screed to the true radius with a plywood template band-sawed from the SketchUp arc; two thin passes beat one thick.",id:"p3.buy.7d485f56"},{item:"Stucco finish coat",spec:"Smooth stucco finish coat, 1 bag/pail",qty:"1",unit:"bag",source:"estimate",note:"If the curve finishes as the smooth accent band (the guide's lean); narrow mosaic/picket tile is the named alternative — skip this if tile wins.",id:"p3.buy.3fe2fa32"},{item:"Louvered stainless vents",spec:"Stainless louvered island vents — SIZE TO THE COYOTE MANUAL'S SQUARE-INCH NUMBERS (LP compartments have explicit low-vent requirements)",qty:"~4 (measure)",unit:"each",source:"measure",note:"Toe-kick under the grill (LOW — propane sinks) + island ends. The manual is law — buy after the cutout/vent sheet is in hand.",id:"p3.buy.536eb783"},{item:"LP leak detector",spec:"Plug-in or battery propane (LP) gas detector",qty:"1",unit:"each",source:"guide",note:"Mounts LOW in the propane bay. If the grill ever converts to NG, add detection HIGH — detection flips at conversion.",id:"p3.buy.b02e5413"},{item:"Exterior silicone sealant",spec:"100% silicone, exterior-rated, 10 oz tubes",qty:"3",unit:"tubes",source:"estimate",note:"Seal every penetration cut BEFORE hanging: conduit, PEX, the drain-riser hole in the cabinet floor board, vent sleeves.",id:"p3.buy.1fefc2f8"},{item:"Fence standoff heat shield (conditional)",spec:'½" cement board offcut + non-combustible standoffs',qty:"0–1",unit:"each",source:"estimate",note:`Only if the Coyote manual's rear clearance number is tight against the boarded back + 2" fence gap — the guide's named cheap fix. Check the manual first; likely free from sheet offcuts.`,id:"p3.buy.48b17882"}],4:[{item:"Wood-look porcelain plank",spec:'RECTIFIED porcelain plank, light driftwood tone, ~48" length class',qty:"~135 sq ft + 10–15% waste + 1 extra box",unit:"sq ft",source:"guide",note:"~135 sq ft faces is the guide figure — re-measure faces before ordering. Extra box = attic stock; dye lots disappear. Dry-lay the entire face first; door edges land on grout joints. ⚠ If you want one combined tile order, the backsplash pick (Phase 7) practically decides now.",id:"p4.buy.94688d74"},{item:"Tile leveling clip system",spec:'Tuscan/Raimondi/MLT clips (1/16" or match plank joint) + wedges',qty:"~400 clips + 100 wedges",unit:"kit",source:"estimate",note:"Non-negotiable on planks. Wedges reuse; clips are consumable — count from the dry-lay if you want it tighter.",id:"p4.buy.2e266d04"},{item:"Exterior thinset (cladding)",spec:"Polymer-modified exterior-rated thinset, 50 lb bags, white",qty:"5",unit:"bags",source:"estimate",note:"Back-butter EVERY plank + combed wall = double coverage, ~30 sq ft/bag effective over ~135 sq ft. Same pass beds the Schluter trim legs.",id:"p4.buy.15fec0c2"},{item:"Epoxy grout (cladding)",spec:"100% epoxy grout (SpectraLOCK Pro class), color dead-matched to plank",qty:"2",unit:"full units",source:"estimate",note:"Joints read as reveals. Clean haze aggressively as you go — epoxy haze is forever. Rectified tight joints keep consumption low; confirm coverage chart against joint width.",id:"p4.buy.ecd0d4a2"},{item:"Metal edge trim",spec:`Schluter Quadec or Rondec, height matched to plank thickness (~3/8"), 8' 2½" lengths, finish of your pick`,qty:"measure (~5)",unit:"lengths",source:"measure",note:"EVERY outside corner — never miter porcelain. Also the plank-stop trim line where the field meets the curved wall (D22). Measure vertical corner LF + curve termination.",id:"p4.buy.b820133c"},{item:"Color-matched silicone",spec:"100% silicone matched to grout color (Latasil class), 10 oz",qty:"3",unit:"tubes",source:"estimate",note:"Movement joints: every change of plane, cladding-to-counter/appliance/trim. Silicone, not grout — law.",id:"p4.buy.0d5f532b"}],5:[{item:"Aluminum door frame stock",spec:`1"×1" aluminum angle or 1" thin-wall square tube, 8' lengths`,qty:"measure (~4–6)",unit:"lengths",source:"measure",note:'Frame = opening minus an even 1/8–3/16" reveal; center rail on anything over ~24". Take perimeter LF from actual door openings. Cut with the non-ferrous blade.',id:"p5.buy.ccf3e0a5"},{item:"Aluminum gusset plates / corner brackets",spec:'Flat aluminum gussets or 90° corner brackets to suit 1" stock',qty:"4 per door",unit:"each",source:"estimate",note:"Corners joined with gussets + stainless machine screws + nylock nuts PLUS structural adhesive — bolt-and-bond, no welding.",id:"p5.buy.e36be103"},{item:"Stainless machine screws + nylock nuts",spec:"#10-24 stainless machine screws assorted lengths + nylock nuts, small boxes",qty:"1",unit:"set",source:"estimate",note:"Frame corners AND hinge mounting — machine screws + lock nuts into the frame, NEVER self-tappers, for connections carrying the door's whole life.",id:"p5.buy.8ede8e1e"},{item:"Structural adhesive",spec:"3M 5200 (cartridge) or 3M DP420 (dual cartridge + mixing nozzles)",qty:"1–2",unit:"cartridges",source:"guide",note:"Guide names both products. The bond + bolts make the torsion box.",id:"p5.buy.42a3f890"},{item:"GoBoard backer",spec:`GoBoard/Wedi foam backer, ½" × 3'×5' sheets`,qty:"measure (~2)",unit:"sheets",source:"measure",note:"NOT cement board — door weight kills hinges; foam bonds porcelain equally well. Count from door areas. Bond with thinset/adhesive AND screw with stainless self-tappers.",id:"p5.buy.c734731b"},{item:"GoBoard sealant",spec:"Waterproof board sealant (GoBoard Pro Sealant class), 1 tube",qty:"1",unit:"tube",source:"estimate",note:"Waterproof the backer edges/seams per the JM install guide in the reference library.",id:"p5.buy.9d24f21e"},{item:"Stainless self-tapping screws",spec:'#8 stainless self-tappers, ~¾", small box',qty:"1",unit:"box",source:"estimate",note:"Backer to frame, alongside the adhesive bond.",id:"p5.buy.ac84d480"},{item:"Concealed clamp-on hinges (⚠ open decision)",spec:"Concealed hinges made for aluminum-frame cabinet doors — clamp-on type, NO 35mm cup bore, 3-way adjustable (search 'aluminum frame door concealed hinge' / glass-cabinet hardware)",qty:"2 per door",unit:"each",source:"measure",note:"⚠ Decide BEFORE tiling door faces. Stainless piano hinge (cut to door height) is the sag-proof fallback if clamp-ons don't suit the frame profile. Phase 1 backing supports either.",id:"p5.buy.f077ec05"},{item:"Stainless handles",spec:"Stainless bar/pull handles, through-bolted",qty:"1 per door + drawer",unit:"each",source:"measure",note:"Diamond-drill through tile into the frame, sleeve holes with silicone, through-bolt.",id:"p5.buy.1c78b043"},{item:"Outdoor door catches",spec:"Outdoor-rated magnetic or roller catch",qty:"1 per door",unit:"each",source:"estimate",note:"Hang after cladding; dial reveals even.",id:"p5.buy.5c096e2c"},{item:"Drawer box panel stock",spec:'.050–.063" aluminum sheet OR 3–4mm ACP/Dibond panels',qty:"measure",unit:"sq ft",source:"measure",note:'From the drawer cut list: each box = opening − slide clearance (usually ½" per side). Build the tallest drawer first as the pattern.',id:"p5.buy.c1f031f4"},{item:"Aluminum angle + flat bar (drawers)",spec:`1"×1" aluminum angle (corners) + aluminum flat bar (slide-height rails), 8' lengths`,qty:"measure",unit:"lengths",source:"measure",note:"Angle is the frame, panel is the skin; flat-bar rails give solid bite for slide screws and stiffen the wall in one move.",id:"p5.buy.e488f6c6"},{item:"Stainless pop rivets",spec:'1/8" stainless pop rivets, 250-count',qty:"1",unit:"box",source:"estimate",note:"Every corner joint. $25 rivet gun is on the tool list. Stainless (not aluminum) stays the rule near the firebox surround.",id:"p5.buy.0eab93ab"},{item:"Perforated aluminum sheet",spec:'Perforated aluminum, ~.050", cut to drawer bottoms',qty:"measure",unit:"sq ft",source:"measure",note:"Bottoms drain instead of pooling.",id:"p5.buy.948b8fb6"},{item:"Aluminum U-channel edge cap",spec:"U-channel sized to panel thickness (.050–4mm)",qty:"measure",unit:"lengths",source:"measure",note:"Top rim of each box — no razor edges, looks finished.",id:"p5.buy.8de16c96"},{item:"Stainless full-extension drawer slides",spec:'Stainless full-extension ball-bearing slides, length to bay depth (typ. 20–22")',qty:"1 pair per drawer",unit:"pairs",source:"measure",note:"Boxes land under 10 lb empty — standard slides carry them. Mount to flat-bar rails and to Phase 1 blocking/angle on the cabinet side; size box to the slide spec's clearance.",id:"p5.buy.69811c8c"},{item:"Stainless through-bolts + fender washers (drawer faces)",spec:'¼" stainless bolts + fender washers + nylocks, assorted',qty:"1",unit:"set",source:"estimate",note:'Faces are tiled ½" cement-board panels (Phase 3 offcuts) through-bolted from inside with SLOTTED holes for alignment.',id:"p5.buy.6be8ec15"},{item:"Cabinet interior paint",spec:"Light-colored elastomeric/masonry paint (guide-specified type), 1 gal",qty:"1",unit:"gal",source:"estimate",note:"Over interior cement board so you can see into the bays. Quantity is my estimate.",id:"p5.buy.bc1613dd"},{item:"Shelf material",spec:"Stainless wire shelving or marine HDPE sheet, cut to bays",qty:"measure",unit:"sq ft",source:"measure",note:"Sits on the Phase 1 blocking/ledgers. Both picks drain — that's why they won.",id:"p5.buy.b6579d5c"}],6:[{item:"Granite countertop (remnant, fabricated)",spec:'LIGHT granite (Alaska White / Kashmir White / Colonial White / Bianco Antico class), 3cm (1¼" nominal / 1-3/16" actual), LEATHERED — two pieces, seam at the corner',qty:"~40",unit:"sq ft",source:"guide",note:"Remnants $10–18/sq ft + $600–1,000 fabrication → $1,000–1,800 all-in. Dark stone hits 150–170°F — off the table. Seam away from the sink; match 3cm across both pieces; cutouts need meat — constrains which remnants work. Give fabricator: sink template, grill cutout (SL30 25½×20½ / SL36 32½×20½ — decided by now), Big Joe A–R chart opening, seam location. ⚠ Backsplash tile must be chosen before templating (rear-overhang detail).",id:"p6.buy.4f17b2d8"},{item:"Granite sealer",spec:"Penetrating stone sealer, ~$25 bottle",qty:"1",unit:"bottle",source:"guide",note:"Seal at install, then twice a year, 20 minutes — calendar it.",id:"p6.buy.4867d900"},{item:"Silicone (setting beds)",spec:"100% silicone, clear or color-matched, 10 oz",qty:"2",unit:"tubes",source:"estimate",note:"Counters set in silicone beds; fabricator epoxies + color-matches the seam and often supplies setting silicone — confirm before buying.",id:"p6.buy.e5eb0ba1"},{item:"Thinset/mortar for kamado bearing",spec:"Polymer-modified thinset (Phase 4 leftover works)",qty:"leftover or 1",unit:"bag",source:"estimate",note:"Mortar-bed the kamado feet zone and the throat-band 'little shelf' so the stone is fully bedded and never spans air (Step 6.3).",id:"p6.buy.51ce706a"}],7:[{item:"Smooth large-format porcelain (heat zone)",spec:'Smooth light porcelain, 24"+ faces, minimal grout lines',qty:"~17 sq ft + waste (~12 grill + ~5 kamado)",unit:"sq ft",source:"guide",note:`Grill zone ~4' + kamado corner ~3' of the 18" band. Grout behind a grill is a grease trap — big smooth tile is the wipeable substitute for the stainless panel that was ruled out. Kamado corner may alternatively take the feature tile (soot-on-grout tradeoff, guide's words).`,id:"p7.buy.6789ce1e"},{item:"Feature tile (⚠ open decision)",spec:"Your pick of the four comps — Sea Glass Sage is the standing recommendation; porcelain or glass ONLY behind cook surfaces",qty:"~20 sq ft (incl. the guide's +20% picket waste) + 1 extra box",unit:"sq ft",source:"guide",note:`Sink wall + runs, ~11' of the 18" band. Picket shapes waste more. Extra box = attic stock. ⚠ Deadline was Phase 6 templating — must be locked by now.`,id:"p7.buy.e829737a"},{item:"Epoxy grout (backsplash)",spec:"100% epoxy grout, ONE SHADE DARKER than instinct",qty:"1",unit:"full unit",source:"estimate",note:"Pale grout behind a grill grays in a season anyway — guide's rule.",id:"p7.buy.47ad277a"},{item:"Metal edge trim (transitions)",spec:`Schluter-type profile matched to tile thickness, 8' 2½" lengths`,qty:"measure (~2–3)",unit:"lengths",source:"measure",note:"Smooth-to-feature transitions and any change of plane/material — metal trim + silicone, never a grouted butt joint. Measure transition LF.",id:"p7.buy.8227193f"},{item:"Thinset (backsplash)",spec:"Polymer-modified exterior thinset (Phase 4 leftover works)",qty:"leftover or 1",unit:"bag",source:"estimate",note:"Same one-material-discipline system as the cladding.",id:"p7.buy.aff782e1"},{item:"Color-matched silicone (counter joint)",spec:"100% silicone matched to grout, 10 oz",qty:"2",unit:"tubes",source:"estimate",note:"Counter-to-backsplash joint gets silicone, NEVER grout — it's a movement joint.",id:"p7.buy.29bf5496"}],8:[{item:"Coyote SL grill (⚠ open decision ×2)",spec:'C3SL30 (cutout 25½"W × 20½"D × 10¼"H, ~$3,100 LP) or C3SL36 (32½"W × 20½"D × 10¼"H, ~$3,500–3,700) — LP or NG, ships fuel-specific',qty:"1",unit:"each",source:"guide",note:"Size was decided back at Phase 1 framing; fuel: tie-in a year+ out → order LP, cook on the tank, budget the Coyote LP→NG conversion kit + orifice/regulator swap (~$60–100) for tie-in day. Order early enough that the manual is in hand for Phase 3 vent sizing — the manual is law. Flange bears on counter, sealed per instructions.",id:"p8.buy.cb78c499"},{item:"Kamado Joe Big Joe III (standalone)",spec:"Big Joe Series III grill head, no cart",qty:"1",unit:"each",source:"guide",note:"~$2,200–2,700. Assemble IN PLACE — it does not fit through openings after the fact; 400+ lb ceramic, two-strong-people minimum, rent/borrow a shoulder or appliance dolly.",id:"p8.buy.b883ff03"},{item:"Kamado Joe ceramic feet",spec:"KJ ceramic feet for built-in installs",qty:"4",unit:"each",source:"guide",note:"2 front, 2 back, spaced so it can't rock when the dome swings. Required in built-ins — they create the under-grill airflow; never set the ceramic base flat on the deck. kamadojoe.com parts.",id:"p8.buy.06c79390"},{item:"SMOBOT — Kamado Joe version",spec:"SMOBOT KJ version, $349, micro-USB powered",qty:"1",unit:"each",source:"guide",note:"KJ version ONLY — the standard BGE daisy-wheel kit does NOT fit the cast-aluminum Kontrol Tower. Routes to the cradle outlet.",id:"p8.buy.f7b3b5bf"},{item:"Looftlighter",spec:"Looftlighter electric fire starter, ~$80",qty:"1",unit:"each",source:"guide",note:"Covers the manual-ignition gap; stages at the cradle outlet with the SMOBOT.",id:"p8.buy.e326e0e3"},{item:"Fridge",spec:'Velieta 24" front-venting built-in/freestanding, compressor, adjustable feet, ~$300–450',qty:"1",unit:"each",source:"guide",note:"ORDER EARLY — the Phase 1 bay gets framed to its actual cut sheet on arrival. Front grille completely unobstructed at install; cord through the grommeted pass-through to the adjacent-bay outlet.",id:"p8.buy.8e5068db"},{item:"Sink + faucet + cover",spec:"Stainless bar sink + cold-only faucet + permanently attachable sink cover",qty:"1",unit:"set",source:"guide",note:"$120–250 class. Buy early enough to hand the fabricator the sink template at Phase 6. The cover satisfies the sewered-outdoor-sink rain rule for tie-in day. Set in silicone per template.",id:"p8.buy.9a0fba7f"},{item:"GFCI receptacles",spec:"20A, weather-resistant (WR) + tamper-resistant, self-testing GFCI",qty:"2",unit:"each",source:"estimate",note:"Head of each circuit per the guide's 'GFCI everything — at the head of each circuit or breaker-level.' If you go breaker-level GFCI instead, swap these for 2 WR duplexes and 2 GFCI breakers. Test every GFCI.",id:"p8.buy.9a48b62a"},{item:"WR receptacles (downstream)",spec:"20A WR/TR duplex receptacles",qty:"2",unit:"each",source:"estimate",note:"Downstream outlets on circuit 2 (kamado + sink convenience), protected by the head GFCI.",id:"p8.buy.df9344d2"},{item:"In-use covers",spec:"Weatherproof in-use ('bubble') covers, single-gang, sized to box + plug",qty:"4",unit:"each",source:"estimate",note:"Guide requires in-use covers on everything; count matches the four outlet locations. Covers stay closed over cords at the grill outlet.",id:"p8.buy.434336b3"},{item:"Circuit labels",spec:"Preprinted circuit label kit or label-maker tape",qty:"1",unit:"kit",source:"estimate",note:"Label the circuits at trim-out — guide's electrical-trim step.",id:"p8.buy.93adb25b"},{item:"Propane tank",spec:"20 lb LP cylinder, filled",qty:"1",unit:"each",source:"estimate",note:"Sits on the pavers in the open, unfinished under-grill bay. Skip if you already own one. (Only if the grill ordered LP.)",id:"p8.buy.649ca4f0"},{item:"Leak-test solution",spec:"Spray bottle + dish soap, or commercial gas leak detector solution",qty:"1",unit:"bottle",source:"estimate",note:"Leak-test EVERY propane fitting with soapy water — guide's safety language, verbatim requirement.",id:"p8.buy.2dbbfa44"},{item:"Air admittance valve (conditional)",spec:'1½" AAV + adapter to the trap arm',qty:"0–1",unit:"each",source:"estimate",note:"Guide: 'AAV under the counter if that's your vent plan' — conditional on the venting approach at drain trim/tie-in.",id:"p8.buy.68f1b287"},{item:"Faucet supply connection",spec:'½" PEX × faucet thread adapter or ½" quarter-turn stop + braided connector',qty:"1",unit:"set",source:"estimate",note:"Hooks the cold faucet to the Phase −1 PEX run; match your PEX connection system.",id:"p8.buy.57064782"},{item:"Steel wool + exterior sealant",spec:"Coarse steel wool pad + exterior sealant tube",qty:"1",unit:"set",source:"estimate",note:"Seal the fridge cord pass-through — 'pest highway otherwise.' Silicone leftovers cover the rest of the punch-list change-of-plane joints.",id:"p8.buy.620a9f7f"}],"-1":[{item:'2" ABS DWV pipe',spec:`2" × 10' stick, ABS DWV (cellular-core fine for drain)`,qty:"1",unit:"stick",source:"estimate",note:`Covers the under-paver run + riser stub capped 6–8" proud (Step 1). ABS chosen per guide: 'San Diego is traditionally ABS territory' — match it (or transition cement) at tie-in day.`,id:"p-1.buy.0a677ba4"},{item:'2" ABS long-sweep 90',spec:'2" DWV long-sweep quarter bend (long-turn 90)',qty:"1",unit:"each",source:"estimate",note:`Turns the run up into the sink bay. Guide: long-sweep 90 OR two 45s — NEVER a tight vent elbow. Buy the sweep; substitute two 2" 45s only if the sweep won't fit the seam geometry. The sweep makes the riser rodding access for the whole run.`,id:"p-1.buy.d867682e"},{item:'2" ABS caps',spec:'2" DWV cap, ABS',qty:"2",unit:"each",source:"estimate",note:"One on the riser (cut to height at Phase 8 trim-out — tall stubs survive construction), one on the yard end at/below grade. Photograph + measure the yard cap to the fence post.",id:"p-1.buy.ff76dce9"},{item:"ABS solvent cement",spec:"8 oz can, black ABS cement (no primer needed for ABS)",qty:"1",unit:"can",source:"estimate",note:"For all drain joints. If you ever mix ABS/PVC, guide says use transition cement.",id:"p-1.buy.6b25dd42"},{item:'2" Sch 40 PVC pipe',spec:`2" × 10' stick, Schedule 40 PVC`,qty:"1",unit:"stick",source:"estimate",note:`One stick yields BOTH 18–24" straight sleeves: gas sleeve (Step 2) + spare chase (Step 3). Guide allows 3" for 'luxurious clearance' on the gas sleeve; 2" ID (~2.07") passes ¾–1" CSST, fittings included. Do NOT lay actual gas pipe.`,id:"p-1.buy.74fa9f2a"},{item:'2" PVC caps',spec:'2" Sch 40 PVC cap',qty:"4",unit:"each",source:"estimate",note:"Both ends of gas sleeve + both ends of spare chase. Leave dry-fit/taped (they come off at pull-through); Sharpie ends 'GAS SLEEVE' and 'SPARE', photograph both runs.",id:"p-1.buy.86055e6b"},{item:"Pull string",spec:"Mason line / poly pull twine, 250' spool",qty:"1",unit:"spool",source:"estimate",note:"Guide requires a pull string left inside the gas sleeve AND the spare chase; spool spec is mine. Leftover reused for the Phase 1 corner gas chase.",id:"p-1.buy.dd9eccb2"},{item:"Bedding sand",spec:"All-purpose/paver sand, 50 lb bag",qty:"2",unit:"bags",source:"estimate",note:"'A few inches of sand between each' pipe and to re-bed pulled pavers. Trench order across the seam is law: drain, spare, gas — gas OUTERMOST, nothing touching.",id:"p-1.buy.16ba17de"},{item:'½" PEX tubing',spec:'½" PEX-A or PEX-B, red or white coil',qty:"~25 (measure)",unit:"ft",source:"measure",note:"Measure from the existing supply riser, routed LOW and AROUND the fridge bay (never behind the fridge — compressor/exhaust path), to the sink bay; add slack for the low route.",id:"p-1.buy.6b32ba9d"},{item:'½" PEX fittings kit',spec:'Adapter to existing supply pipe type (verify), 2× ½" elbows or bend supports, ½" stub-out/ball valve, crimp or expansion rings to match your tool',qty:"1",unit:"set",source:"estimate",note:"Guide says only 'PEX + fittings'. Verify what the existing water stub is (copper/CPVC/PEX) before picking the adapter.",id:"p-1.buy.0ee7f324"},{item:'1½" P-trap + sink tailpiece',spec:'1½" tubular P-trap (ABS/poly, not chrome brass outdoors) + matching 1½" tailpiece',qty:"1",unit:"set",source:"estimate",note:'Step 6: hard-pipe tailpiece + trap NOW so above-floor plumbing is done once; interim discharge to the jug. Run the trap arm as HIGH as the sink allows (18–20" above pavers) — banked fall budget.',id:"p-1.buy.0987e668"},{item:'2" × 1½" trap adapter',spec:'2" DWV × 1½" slip-joint trap adapter, ABS',qty:"1",unit:"each",source:"estimate",note:'Joins the 1½" trap arm to the 2" riser on tie-in day; riser doubles as rodding access once the trap is pulled. Cheap to buy now with the ABS order.',id:"p-1.buy.a210a1ff"},{item:"Sealed catch jug",spec:"5–7 gal carboy or jerry can",qty:"1",unit:"each",source:"guide",note:"The interim drain — 'much nicer than an open bucket: no splash, no smell, no mosquitoes.' Empty to a proper drain, not the landscape.",id:"p-1.buy.11378657"},{item:"Bulkhead fitting",spec:'Bulkhead tank fitting sized to the trap discharge hose/pipe (typ. 1"–1½")',qty:"1",unit:"each",source:"estimate",note:"Guide specifies a bulkhead fitting in the jug lid/wall; size is my call — match whatever connects the trap outlet to the jug.",id:"p-1.buy.b53a26b5"}]},ve=[`Pipe is sold in 10' sticks: the guide's 2" ABS drain run and riser fit one stick; the 18–24" gas sleeve and spare chase both come from one 2" Sch 40 PVC stick. Guide allows 3" PVC for the gas sleeve ('luxurious clearance') — I specced 2" since the guide confirms 2" ID passes ¾–1" CSST with fittings.`,"Drain elbow: one long-sweep 90 is the primary buy; the two-45s alternative is noted on the same line rather than double-bought. Never a tight vent elbow, per the guide.","ABS over PVC for the drain per the guide's 'San Diego is traditionally ABS territory' — the owner must still match (or transition-cement) at tie-in day.","Sleeve/chase caps specced as dry-fit/taped so they come off for the future pull; the guide says only 'cap both ends.' Drain caps glue on (riser cap gets cut to height at trim-out).","P-trap, tailpiece, trap adapter, jug and bulkhead are bought in Phase −1 because Step 6 says to hard-pipe the trap now; bulkhead size is my call — the guide gives no dimension.","PT 2×4 length assumed 8' (guide only gives the 8–10 board count); take a cut list from the actual footprint before buying.",`Tapcon spec (¼" × 3¼", ~25 count) derived from 1½" PT + ≥1" paver embedment and 'every few feet' over ~60 LF of sill; the guide names no size or count.`,"Sill-seal roll count (2 × 50') assumes ~60–100 LF of sill runs; return the surplus.",'Electrical conduit assumed ¾" Sch 40 with 12 AWG THWN-2 for the two 20A circuits; the guide states neither trade size nor wire gauge. Offset/coupling size must match the existing stubs — measure before buying.',"Box count (4 outlets + 1 j-box) and in-use cover count (4) are derived from the guide's four named outlet locations plus the fridge-cavity splice hub.","GFCI plan assumed device-level: one GFCI at the head of each circuit + 2 protected WR duplexes downstream. The guide's alternative (breaker-level GFCI) changes this to 2 GFCI breakers + 4 WR duplexes.",`Flagged, not fixed: #8 × ½" TEK math — the guide's single 500-count box vs ~4 screws × 150 cut studs = ~600. Kept the guide's 1 box verbatim with a buy-a-second-if-cutting-all-fifty note.`,"Flagged, not fixed: Rockwool R-15 — the Phase 3 materials list says buy 1 pack now ('grill bay + fridge bay + sink back') while Step 3.4 defers the grill-bay-adjacent batt to an if-needed retrofit. Listed 1 pack per the materials list with the conflict noted for owner review.","Blocking, ledgers, boxed members, and the doubled-rail kamado grid are cut from the ~50 stud / ~14 track sticks — no separate steel purchase line.",`Hardware-cloth roll (36" × 25') sized from ~33" cavity height and ~18 LF back minus the ~4' grill bay; verify against the real back before buying. Its stainless screw/washer attachment hardware is my addition — the guide says only 'staples/screws on from the front.'`,"Vent quantity (~4) is a placeholder — the guide's rule is to size vent area to the Coyote manual's square-inch numbers, so the real buy waits for the manual.","Cladding consumables derived from the guide's ~135 sq ft: 5 bags thinset (back-butter doubles coverage), ~400 leveling clips, 2 epoxy grout units, 3 silicone tubes. All are stocking estimates, not guide figures.","Door/drawer quantities (angle stock, GoBoard sheets, hinges at 2/door, handles, catches, slides, panel stock) depend on the final door/drawer count and opening sizes, which the guide never enumerates — all marked measure.","Structural adhesive marked source:guide because the guide names the exact products (3M 5200 / DP420); cartridge count is mine.","Cabinet paint type (light elastomeric/masonry) is the guide's; the 1-gal quantity is mine, so it is marked estimate.","Phase 8 big-ticket items carry order-early notes that are mine: the grill manual must exist before Phase 3 vent sizing and Phase 1 bay framing; the fridge cut sheet before its Phase 1 bay; the sink template before Phase 6 templating. The guide implies each but files them under Phase 8 purchasing.","Propane tank (20 lb) included on the assumption the owner doesn't already own one, and only applies if the open LP-vs-NG decision lands LP.","Fence standoff heat shield and stucco finish coat are conditional lines, kept because the guide names them as contingent buys (tight rear clearance; smooth-stucco curve finish).","Consumable counts throughout (mesh tape rolls, silicone tubes, cement cans, sand bags, rivet boxes) are shopping-cart stocking estimates sized to the described work, not guide numbers.","Tools are excluded — the guide keeps its own tool list (own/buy/rent) and this list is materials only. The pull-string spool, Sharpie labeling, and plywood screed template ride on existing tool-list items or scrap."],xe={0:["p0.buy.b6055267","p0.buy.26252ec6","p0.buy.d13c4571","p0.buy.2f9cce9b","p0.buy.b07af624","p0.buy.404bb063","p0.buy.1a46eaaa","p0.buy.c5240212","p0.buy.ef74a001"],1:["p1.buy.2d73d6ad","p1.buy.a75b8da0","p1.buy.91feb22b","p1.buy.f0c7dae0","p1.buy.5d342e10","p1.buy.c52c9661","p1.buy.3f48569f","p1.buy.756cec73"],2:["p2.buy.e6367be7","p2.buy.9a1ea2f5","p2.buy.aa92730c","p2.buy.dfa0761d","p2.buy.df97206f","p2.buy.d7660aeb","p2.buy.cb644c66"],3:["p3.buy.6f982bb3","p3.buy.700c93b6","p3.buy.03543c05","p3.buy.063f83ff","p3.buy.2cf358b7","p3.buy.44c9dec7","p3.buy.477cd2fa","p3.buy.19c83c00","p3.buy.76b6585f","p3.buy.01e7e684","p3.buy.5fc35e1e","p3.buy.9d7a6f43","p3.buy.7d485f56","p3.buy.3fe2fa32","p3.buy.536eb783","p3.buy.b02e5413","p3.buy.1fefc2f8","p3.buy.48b17882"],4:["p4.buy.94688d74","p4.buy.2e266d04","p4.buy.15fec0c2","p4.buy.ecd0d4a2","p4.buy.b820133c","p4.buy.0d5f532b"],5:["p5.buy.ccf3e0a5","p5.buy.e36be103","p5.buy.8ede8e1e","p5.buy.42a3f890","p5.buy.c734731b","p5.buy.9d24f21e","p5.buy.ac84d480","p5.buy.f077ec05","p5.buy.1c78b043","p5.buy.5c096e2c","p5.buy.c1f031f4","p5.buy.e488f6c6","p5.buy.0eab93ab","p5.buy.948b8fb6","p5.buy.8de16c96","p5.buy.69811c8c","p5.buy.6be8ec15","p5.buy.bc1613dd","p5.buy.b6579d5c"],6:["p6.buy.4f17b2d8","p6.buy.4867d900","p6.buy.e5eb0ba1","p6.buy.51ce706a"],7:["p7.buy.6789ce1e","p7.buy.e829737a","p7.buy.47ad277a","p7.buy.8227193f","p7.buy.aff782e1","p7.buy.29bf5496"],8:["p8.buy.cb78c499","p8.buy.b883ff03","p8.buy.06c79390","p8.buy.f7b3b5bf","p8.buy.e326e0e3","p8.buy.8e5068db","p8.buy.9a0fba7f","p8.buy.9a48b62a","p8.buy.df9344d2","p8.buy.434336b3","p8.buy.93adb25b","p8.buy.649ca4f0","p8.bu -assemble-wall-panels-flat-tilt-up"},{technique:"Tapcon anchoring into masonry/pavers",phase:0,step:"0.4",section:"",title:"Using Tapcon Anchors the RIGHT WAY!",channel:"How I Do Things Woodworking",videoId:"Xdj7g_BRfHw",note:"Hammer-drill bit sizing, hole cleaning, and torque feel so base-track anchors bite instead of spin.",slug:"step-04-build-the-pt-base-your-step-2"},{technique:"Solvent-welding PVC DWV (primer + cement)",phase:-1,step:"",section:"phase--1-intro",title:"How To Prime & Glue PVC Pipe The RIGHT WAY (Steps for a NO-LEAK Joint)",channel:"SimpleDIYProjects",videoId:"x4uKjHgg0oc",note:"Primer coverage, quarter-turn insertion, and hold time — the whole no-leak joint in one short pass.",slug:"phase--1-intro"},{technique:"PEX crimp connections",phase:-1,step:"",section:"phase--1-intro",title:"How to Make PEX Crimp Connections",channel:"SupplyHouse",videoId:"M3RHwlu9g30",note:"Ring placement, square crimp, and the go/no-go gauge check for the sink supply stubs.",slug:"phase--1-intro"},{technique:"Heat-bending PVC conduit: 90s, offsets, box offsets",phase:2,step:"",section:"steps",title:"Heating and Bending PVC Conduit - BENDING 90s, OFFSETS, and BOX OFFSETS",channel:"Electrician U",videoId:"-soQvQ8Qc3s",note:"An electrician-teacher shows even heating and the exact offset bends the island's conduit runs need.",slug:"steps"},{technique:"Wiring a GFCI receptacle (line vs load)",phase:8,step:"",section:"electrical-trim",title:"How to Wire a GFCI Outlet - What's Line vs Load? - Electrical Wiring 101",channel:"Top Homeowner",videoId:"Uop79H_iqoQ",note:"Line vs load terminals explained — the one mistake that silently defeats GFCI protection downstream. (Devices land at Phase 8 trim; wire is pulled in Phase 2.)",slug:"electrical-trim"},{technique:"Scoring and snapping cement board",phase:3,step:"",section:"steps",title:"How to Cut HardieBacker Cement Board (Clean, Easy Method) | Beginner's Guide to Score and Snap",channel:"DIY for Home and Life",videoId:"g77Q0mmuAv lGECOe1U",note:"Rivet sizing, nozzle match, and the squeeze-to-snap feel for joining aluminum door and panel parts.",slug:"drawers-diy-riveted-aluminum-locked-custom-sizes"},{technique:"Propane leak test with soapy water",phase:8,step:"",section:"grill",title:"How to Check for Gas Line Leaks on a Gas Grill | The Soap Bubble Test | BBQGuys.com",channel:"BBQGuys",videoId:"7UPQhuvdeL8",note:"The soap-bubble test on grill fittings, from a grill retailer — bubbles at any joint mean stop and refit.",slug:"grill"},{technique:"Kamado built-in / table installation (ceramic feet, clearances)",phase:8,step:"",section:"kamado-big-joe",title:"Installing my Kamado Joe into a table for the LAST TIME?  Kamado table install tips & tricks",channel:"Smoking Dad BBQ",videoId:"dLsKPBpjMcQ",note:"Setting a kamado into a built-in bay: lifting safely, ceramic feet, and clearance lessons learned.",slug:"kamado-big-joe"}],Ce=[{date:"2026-07-04",note:"Site built from the planning docs. Nothing physical yet — first real entry should be pulling pavers at the seam and laying the three pipes.",photo:null,photoData:null}],Pe=[{route:"#/phase/-1",anchor:null,title:"Phase -1 — Plumbing Rough-In (Deferred-Drain Plan)",kind:"phase",text:"Drain stub geometry The decision: you re going Option C — build the kitchen now, tie the drain into the sewer later, and run a catch jug under the sink in the meantime. Two routing candidates for the eventual connection: Routing decided: the first few feet of the actual drain get installed NOW — a short run of pipe seated directly beneath the paver seam, turning up through the sink-bay floor as a capped internal riser. The future yard trench simply meets the capped outside end whenever tie-in day comes; nothing under the island ever needs to be dug again, and no external upstem is needed. The now-work: Lay the actual drain start — seated HIGH. (Supersedes the earlier empty-sleeve idea: the routing is decided, so install the real pipe.) The fall budget to the cleanout is known-tight, so elevation is banked deliberately: pull the paver(s) at the crossing, scrape only enough bedding to seat 2&quot; ABS/PVC DWV directly beneath the pavers — one horizontal-ish run pointed exactly at the future trench exit with a slight fall outward, then a long-sweep 90 (or two 45s — never a tight vent elbow) turning up inside the sink bay, then a riser stub capped 6–8&quot; proud of the pavers (cut to height at trim-out; tall stubs survive construction). Cap the outside end at/below grade, photograph + measure its location to the fence post. 2&quot; beats 3&quot; here: the trap arm is 1½&quot;, and the smaller pipe&#39;s invert sits higher — more fall budget. The long sweep means the riser doubles as rodding access for the whole underground run once the trap is pulled. Everything from the trap up (tailpiece → P-trap → trap arm → riser) lives above ground inside the cabinet, accessible forever. ⚠️ Anchor conflict: this pipe sits at bedding depth, exactly where the Phase 0 Tapcon anchors drill. Mark BOTH lines (drain + gas sleeve) on the sill layout before relaying pavers so no anchor, now or ever, lands on either. Bank height at the trap arm too: run the trap arm out of the sink as HIGH as the sink allows (18–20 above pavers is realistic with a bar sink at a 36 counter) — free fall budget. The tie-in math (do on paper before digging): fall available = trap-arm height above pavers + cleanout invert depth; fall needed = run length × ¼ /ft. Plan at ¼ /ft for 2 line. Comfortable margin → gravity to the cleanout. Tight → fence-run route (buys ~1 ft of elevation and nullifies the problem). Negative → utility drain pump (Saniflo-class gray-water pump, ~$150–300, under the sink; pressurized small-diameter discharge runs uphill, elevation problem ceases to exist; uses the sink outlet already in the plan). Material note: pick ABS or PVC now and match it (or use transition cement) when the yard trench happens — San Diego is traditionally ABS territory. Lay the gas sleeve in the same operation — short, straight, seam-crossing only. A straight 18–24&quot; run of 2&quot; PVC Sch 40 (3&quot; for luxurious clearance) in the same paver lift, offset ~12&quot; laterally from the drain, crossing ONLY the footprint seam and emerging inside the island next to the drain riser location — with clear vertical headroom above the exit. Cap both ends, leave a pull string inside, sharpie both ends &quot;GAS SLEEVE,&quot; photograph the run. Do NOT lay actual gas pipe — pressurized fuel gets installed, pressure-tested, and inspected as one operation on tie-in day. Why the straight sleeve isn t a problem: the future line is CSST (or PE), which bends by hand — the installer pushes it through the short straight chase and simply bends it upward at the exit. Rigid pipe needed the glued sweep (drain); flexible pipe IS the bend. Interior routing (tie-in day, or pre-run — see below): from the riser point, CSST runs to the grill bay through the centered stud-web knockouts of the back wall — inside the wall plane, behind everything, no drawer conflict possible. Centered in a 3-5/8 web the line sits 1.5 + from either face, beyond the reach of 1¼ backer screws, so no strike plates on the knockout run ; plates (or a verified 1 + setback) only where the line leaves the centered path — the rise at the stub and the turn into the grill bay. Grommets/bushings at every knockout regardless (abrasion protection is a separate rule from strike protection). Installer bonds the CSST per manufacturer instructions. Its own sealed hole through the cabinet floor board, beside the drain riser s. Pre-run option: the island s interior stays accessible for life (hardware-cloth back, door/drawer openings), so pre-running buys little — the installer can push CSST through the finished structure in 20 minutes. If pre-running anyway: use Home-Flex (the DIY-sold CSST; TracPipe/Gastite require certified installers), confirm the future installer will accept and test homeowner-run l
