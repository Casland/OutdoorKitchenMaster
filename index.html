  <script type="module" crossorigin>const pe={title:"Outdoor Kitchen — Complete Build Guide",subtitleHtml:`<p><em>Compiled from all project conversations · San Diego · L-shaped island on existing pavers</em>
<em>Last updated: July 1, 2026</em></p>`,atAGlance:{introHtml:"<p><strong>What you&#39;re building:</strong> An L-shaped outdoor kitchen (~9&#39; × 11&#39; legs) on your existing paver patio, backed against the vinyl fence, next to the hot tub. Galvanized steel stud framing on a pressure-treated sill, cement board sheathing, wood-look porcelain plank cladding, tile backsplash, stone counter at 36&quot; finished height, with a built-in gas grill, a corner kamado cradle, a front-venting fridge, and a cold-water sink.</p>",tableLeadHtml:"<p><strong>Locked decisions (from our chats):</strong></p>",lockedTable:{header:["Item","Decision"],rows:[["Footprint","L-shape, 9&#39; and 11&#39; legs, kamado in the corner cradle, grill on the long run, fridge + sink on the return"],["Counter height","36&quot; finished"],["Counter depth","<strong>31&quot;</strong> (≈30&quot; usable + rear overhang so the backsplash cladding sits on overhang, not usable depth)"],["Base","<strong>PT 2×4 sill on shims</strong> (above-ground UC3A) on the pavers, dead level, adhesive + anchors, sill-seal isolation from the steel — LOCKED"],["Frame","3-5/8&quot; <strong>20-gauge EQ</strong> galvanized steel studs (10&#39; sticks) + matching track"],["Countertop","<strong>3cm granite (1¼&quot; nominal / 1-3/16&quot; actual), light color, leathered</strong> — LOCKED"],["Stud length","<strong>32-13/16&quot;</strong> (34&quot; − 1-3/16&quot; granite) — LOCKED. Cut every stud to this."],["Sheathing","½&quot; cement board on faces + counter deck. Back wall: <strong>¼&quot; galvanized hardware cloth everywhere except the grill bay, which gets board (pre-attached before tilt-up)</strong>. Grill bay is a fully boarded compartment: back + both side partitions, single layer, bare/taped."],["Grill bay","Single ½&quot; cement board — the steel + cement assembly is non-combustible (ASTM E136), which is the entire requirement. Coyote manual governs cutout/venting/clearances."],["Waterproofing","RedGard/AquaDefense on counter deck + clad faces only; Z-flashing at top, weep screed at base"],["Cladding","<strong>Wood-look porcelain plank</strong>, run vertically (reeded look), rectified, ≤33% offset, leveling clips, epoxy grout matched to plank"],["Doors","DIY: bolt-and-bond aluminum frames + GoBoard backer + porcelain plank faces; edges land on grout joints. <strong>Hinge style: European-look concealed (clamp-on aluminum-frame type) preferred — final pick deferred to Phase 5</strong>"],["Drawer boxes","<strong>DIY riveted aluminum/ACP boxes (custom sizes)</strong> — LOCKED. Tiled cement-board faces through-bolted with slotted holes."],["Electrical","Two 20A circuits in PVC conduit w/ THWN-2: (1) fridge dedicated, (2) grill + kamado + sink convenience. GFCI everything. Weatherproof in-use covers."],["Conduit fix","Offset fittings at the base, below track level, rising inside a stud bay — no notching the cement board"],["Plumbing","Cold-only sink; <strong>Option C stub-out variant</strong> — build now, tie in later; <strong>catch jug under the sink as the interim drain</strong>; supply = ½&quot; PEX routed low around the fridge bay"],["Propane","Tank sits on pavers in the open, unfinished under-grill bay; toe-kick venting; LP leak detector low in the bay"],["Grill","<strong>Coyote SL — 30&quot; vs 36&quot; still undecided.</strong> Decide before framing the grill bay. SL30 cutout: 25½&quot;W × 20½&quot;D × 10¼&quot;H · SL36 cutout: 32½&quot;W × 20½&quot;D × 10¼&quot;H"],["Kamado","<strong>Kamado Joe Big Joe + SMOBOT (Kamado Joe version) + Looftlighter</strong> — LOCKED"],["Fridge","<strong>Velieta 24&quot; front-venting built-in/freestanding</strong> (verified front-vent, compressor, adjustable feet) — frame the cavity to its cut sheet"],["Backsplash","<strong>18&quot; band height, no stainless panel</strong> — smooth large-format porcelain in the grill heat zone instead. Tile pattern/color: late-binding decision."],["Kamado corner wall","<strong>Curve is alive:</strong> curved track + studs on the arc, faceted cement board, lath + mortar fill to the true radius (see Phase 3.5)"],["Fence","Hold island 1.5–2&quot; off the vinyl fence (heat + conduit + vent path); heat shield behind the grill zone"]]},notesHtml:"<p><strong>⚠️ Four decisions remain open</strong> (grill size, backsplash tile, door hinge type, sewer tie-in timing) — flagged inline and listed at the end with their deadlines. None of them blocks starting the build.</p>"},buildOrder:{html:`<p>Your 10-step list was close. Two changes matter:</p>
<ol>
<li><strong>Plumbing rough-in comes first</strong> (before anything touches the ground) if you&#39;re trenching — you cannot dig under a built kitchen.</li>
<li><strong>Electrical rough-in happens <em>during</em> framing, before cement board</strong> — boxes and conduit runs go through the open studs. Only <em>device trim</em> (outlets, covers) happens late. Doing &quot;electrical&quot; as step 7 after cladding would mean fishing wire through a closed structure.</li>
</ol>
<p>Final sequence:</p>`,pipeline:[{num:-1,label:"Plumbing rough-in (drain path decision + stub)"},{num:0,label:"Site prep, conduit relocation, PT base"},{num:1,label:"Steel frame (incl. kamado cradle, backsplash wall, all blocking)"},{num:2,label:"Electrical rough-in (conduit, boxes, wire pulled)"},{num:3,label:"Cement board + waterproofing + flashing + hardware cloth"},{num:4,label:"Cladding (porcelain plank on all visible faces)"},{num:5,label:"Doors & drawers (parallel-track — can start anytime after Phase 1)"},{num:6,label:"Countertop"},{num:7,label:"Backsplash tile"},{num:8,label:"Appliances, plumbing trim, electrical trim, final details"}]},phases:[{num:-1,id:"phase--1",title:"Plumbing Rough-In (Deferred-Drain Plan)",heading:"Phase −1 — Plumbing Rough-In (Deferred-Drain Plan)",sections:[{kind:"intro",stepNo:null,title:null,slug:"phase--1-intro",blocks:[{type:"diagram",file:"diagram-06-drain-stub.svg",alt:"Drain stub geometry"},{type:"html",html:"<p><strong>The decision:</strong> you&#39;re going Option C — build the kitchen now, tie the drain into the sewer later, and run a <strong>catch jug under the sink</strong> in the meantime. Two routing candidates for the eventual connection:</p>"},{type:"html",html:"<p><strong>Routing decided:</strong> the first few feet of the actual drain get installed NOW — a short run of pipe seated directly beneath the paver seam, turning up through the sink-bay floor as a capped internal riser. The future yard trench simply meets the capped outside end whenever tie-in day comes; nothing under the island ever needs to be dug again, and no external upstem is needed.</p>"},{type:"html",html:"<p><strong>The now-work:</strong></p>"},{type:"checklist",ordered:!0,items:[{id:"p-1.dc9a4da1",html:"<p><strong>Lay the actual drain start — seated HIGH.</strong> (Supersedes the earlier empty-sleeve idea: the routing is decided, so install the real pipe.) The fall budget to the cleanout is known-tight, so elevation is banked deliberately: pull the paver(s) at the crossing, scrape only enough bedding to seat <strong>2&quot; ABS/PVC DWV directly beneath the pavers</strong> — one horizontal-ish run pointed exactly at the future trench exit with a slight fall outward, then a <strong>long-sweep 90 (or two 45s — never a tight vent elbow)</strong> turning up inside the sink bay, then a riser stub <strong>capped 6–8&quot; proud of the pavers</strong> (cut to height at trim-out; tall stubs survive construction). Cap the outside end at/below grade, photograph + measure its location to the fence post. 2&quot; beats 3&quot; here: the trap arm is 1½&quot;, and the smaller pipe&#39;s invert sits higher — more fall budget. The long sweep means the riser doubles as rodding access for the whole underground run once the trap is pulled. Everything from the trap up (tailpiece → P-trap → trap arm → riser) lives above ground inside the cabinet, accessible forever.</p>",detailsHtml:`<ul>
<li><strong>⚠️ Anchor conflict:</strong> this pipe sits at bedding depth, exactly where the Phase 0 <strong>Tapcon anchors</strong> drill. Mark BOTH lines (drain + gas sleeve) on the sill layout before relaying pavers so no anchor, now or ever, lands on either.</li>
<li><strong>Bank height at the trap arm too:</strong> run the trap arm out of the sink as HIGH as the sink allows (18–20&quot; above pavers is realistic with a bar sink at a 36&quot; counter) — free fall budget.</li>
<li><strong>The tie-in math (do on paper before digging):</strong> fall available = trap-arm height above pavers + cleanout invert depth; fall needed = run length × ¼&quot;/ft. Plan at ¼&quot;/ft for 2&quot; line. Comfortable margin → gravity to the cleanout. Tight → <strong>fence-run route</strong> (buys ~1 ft of elevation and nullifies the problem). Negative → <strong>utility drain pump</strong> (Saniflo-class gray-water pump, ~$150–300, under the sink; pressurized small-diameter discharge runs uphill, elevation problem ceases to exist; uses the sink outlet already in the plan).</li>
<li>Material note: pick ABS or PVC now and match it (or use transition cement) when the yard trench happens — San Diego is traditionally ABS territory.</li>
</ul>`,plain:"Lay the actual drain start — seated HIGH. (Supersedes the earlier empty-sleeve idea: the routing is decided, so install the real pipe.) The fall budget to the cleanout is known-tight, so elevation is banked deliberately: pull the paver(s) at the crossing, scrape only enough bedding to seat 2&quot; ABS/PVC DWV directly beneath the pavers — one horizontal-ish run pointed exactly at the future trench exit with a slight fall outward, then a long-sweep 90 (or two 45s — never a tight vent elbow) turning up inside the sink bay, then a riser stub capped 6–8&quot; proud of the pavers (cut to height at trim-out; tall stubs survive construction). Cap the outside end at/below grade, photograph + measure its location to the fence post. 2&quot; beats 3&quot; here: the trap arm is 1½&quot;, and the smaller pipe&#39;s invert sits higher — more fall budget. The long sweep means the riser doubles as rodding access for the whole underground run once the trap is pulled. Everything from the trap up (tailpiece → P-trap → trap arm → riser) lives above ground inside the cabinet, accessible forever."},{id:"p-1.4e43068a",html:"<p><strong>Lay the gas sleeve in the same operation — short, straight, seam-crossing only.</strong> A <strong>straight</strong> 18–24&quot; run of 2&quot; PVC Sch 40 (3&quot; for luxurious clearance) in the same paver lift, offset ~12&quot; laterally from the drain, crossing ONLY the footprint seam and emerging inside the island next to the drain riser location — with clear vertical headroom above the exit. Cap both ends, leave a <strong>pull string</strong> inside, sharpie both ends &quot;GAS SLEEVE,&quot; photograph the run. Do NOT lay actual gas pipe — pressurized fuel gets installed, pressure-tested, and inspected as one operation on tie-in day.</p>",detailsHtml:`<ul>
<li><strong>Why the straight sleeve isn&#39;t a problem:</strong> the future line is <strong>CSST</strong> (or PE), which bends by hand — the installer pushes it through the short straight chase and simply bends it upward at the exit. Rigid pipe needed the glued sweep (drain); flexible pipe IS the bend.</li>
<li><strong>Interior routing (tie-in day, or pre-run — see below):</strong> from the riser point, CSST runs to the grill bay <strong>through the centered stud-web knockouts of the back wall</strong> — inside the wall plane, behind everything, no drawer conflict possible. Centered in a 3-5/8&quot; web the line sits 1.5&quot;+ from either face, beyond the reach of 1¼&quot; backer screws, so <strong>no strike plates on the knockout run</strong>; plates (or a verified 1&quot;+ setback) only where the line leaves the centered path — the rise at the stub and the turn into the grill bay. <strong>Grommets/bushings at every knockout regardless</strong> (abrasion protection is a separate rule from strike protection). Installer bonds the CSST per manufacturer instructions. Its own sealed hole through the cabinet floor board, beside the drain riser&#39;s.</li>
<li><strong>Pre-run option:</strong> the island&#39;s interior stays accessible for life (hardware-cloth back, door/drawer openings), so pre-running buys little — the installer can push CSST through the finished structure in 20 minutes. If pre-running anyway: use <strong>Home-Flex</strong> (the DIY-sold CSST; TracPipe/Gastite require certified installers), confirm the future installer will accept and test homeowner-run line BEFORE buying, cap + tape both ends, and pressure-test with a gauge tee (10 psi, hold an hour) before and after construction. Default: don&#39;t.</li>
<li><strong>Chase note:</strong> the gas sleeve is a SEPARATE piece of the same 2&quot; Sch 40 PVC, laid alongside the drain with a few inches of sand between — the drain itself is a live pipe, never a chase. 2&quot; ID (~2.07&quot;) passes ¾&quot;–1&quot; CSST easily, fittings included.</li>
<li><strong>Grill fuel decision:</strong> the Coyote ships fuel-specific. Tie-in a year+ out or uncertain → order <strong>LP</strong>, cook on the tank, budget the <strong>Coyote LP→NG conversion kit + orifice/regulator swap</strong> (~$60–100 + an hour of installer time) for tie-in day. Tie-in imminent → order <strong>NG</strong> outright and skip the propane era. Detection flips at conversion: propane sinks (detector low now), natural gas rises (add detection high after).</li>
</ul>`,plain:"Lay the gas sleeve in the same operation — short, straight, seam-crossing only. A straight 18–24&quot; run of 2&quot; PVC Sch 40 (3&quot; for luxurious clearance) in the same paver lift, offset ~12&quot; laterally from the drain, crossing ONLY the footprint seam and emerging inside the island next to the drain riser location — with clear vertical headroom above the exit. Cap both ends, leave a pull string inside, sharpie both ends &quot;GAS SLEEVE,&quot; photograph the run. Do NOT lay actual gas pipe — pressurized fuel gets installed, pressure-tested, and inspected as one operation on tie-in day."},{id:"p-1.4c959e37",html:"<p><strong>Lay a third pipe: the universal spare chase.</strong> Same spec as the gas sleeve — straight 2&quot; PVC, capped both ends, pull string, sharpied &quot;SPARE&quot; — in the same lift. Empty conduit under a permanent structure is never wasted: future low-voltage lighting, an added circuit, irrigation control, or a water line. (If the someday-goal is hot water at the sink, the better answer is a <strong>point-of-use heater</strong> under the counter — 2.5-gal mini-tank, ~1440W/12A on the existing cold line + sink-area circuit, hot water in seconds with zero trenching. Remember during Phase 2 that this appliance is probable when weighing circuit loading.) <strong>Trench arrangement across the seam: drain, spare, gas</strong> — a few inches of sand between each, nothing touching, gas outermost so no future dig at a water line ever crosses it.</p>",detailsHtml:null,plain:"Lay a third pipe: the universal spare chase. Same spec as the gas sleeve — straight 2&quot; PVC, capped both ends, pull string, sharpied &quot;SPARE&quot; — in the same lift. Empty conduit under a permanent structure is never wasted: future low-voltage lighting, an added circuit, irrigation control, or a water line. (If the someday-goal is hot water at the sink, the better answer is a point-of-use heater under the counter — 2.5-gal mini-tank, ~1440W/12A on the existing cold line + sink-area circuit, hot water in seconds with zero trenching. Remember during Phase 2 that this appliance is probable when weighing circuit loading.) Trench arrangement across the seam: drain, spare, gas — a few inches of sand between each, nothing touching, gas outermost so no future dig at a water line ever crosses it."},{id:"p-1.a59adf6b",html:"<p><strong>Build the end bay removable anyway</strong> (cheap insurance): frame that end panel as a screwed-on, cladding-faced access panel rather than a permanently tiled face — same trick as the drawer faces: a tiled cement-board panel through-bolted from inside. Nobody will see the difference, and if the buried run ever needs attention, you have a service door instead of demolition.</p>",detailsHtml:null,plain:"Build the end bay removable anyway (cheap insurance): frame that end panel as a screwed-on, cladding-faced access panel rather than a permanently tiled face — same trick as the drawer faces: a tiled cement-board panel through-bolted from inside. Nobody will see the difference, and if the buried run ever needs attention, you have a service door instead of demolition."},{id:"p-1.a325daac",html:"<p><strong>Frame around the riser.</strong> The riser comes up through the sink-bay floor, so the cabinet floor&#39;s cement board (Phase 3) gets a hole cut around it, sealed with exterior silicone. No side exits, no external upstem — the trap-to-drain connection lives entirely inside the cabinet.</p>",detailsHtml:null,plain:"Frame around the riser. The riser comes up through the sink-bay floor, so the cabinet floor&#39;s cement board (Phase 3) gets a hole cut around it, sealed with exterior silicone. No side exits, no external upstem — the trap-to-drain connection lives entirely inside the cabinet."},{id:"p-1.e66fc527",html:"<p><strong>Interim jug setup:</strong> hard-pipe the sink tailpiece + P-trap now so the plumbing above the cabinet floor is done once, and let the trap discharge into a large sealed catch jug (a 5–7 gal carboy/jerry can with a bulkhead fitting is much nicer than an open bucket — no splash, no smell, no mosquitoes). Empty it to a proper drain, not the landscape, if there&#39;s anything besides rinse water in it.</p>",detailsHtml:null,plain:"Interim jug setup: hard-pipe the sink tailpiece + P-trap now so the plumbing above the cabinet floor is done once, and let the trap discharge into a large sealed catch jug (a 5–7 gal carboy/jerry can with a bulkhead fitting is much nicer than an open bucket — no splash, no smell, no mosquitoes). Empty it to a proper drain, not the landscape, if there&#39;s anything besides rinse water in it."},{id:"p-1.08c39a50",html:"<p><strong>Supply:</strong> the existing water line comes up in the wrong spot — route ½&quot; <strong>PEX low and around</strong> the fridge bay (never behind the fridge; built-ins fill the cavity nearly wall-to-wall and you don&#39;t want supply against the compressor/exhaust path).</p>",detailsHtml:null,plain:"Supply: the existing water line comes up in the wrong spot — route ½&quot; PEX low and around the fridge bay (never behind the fridge; built-ins fill the cavity nearly wall-to-wall and you don&#39;t want supply against the compressor/exhaust path)."}]},{type:"html",html:'<p><strong>Straight talk for later, so it&#39;s on the record:</strong> in San Diego, sink fixture waste is supposed to go to the sanitary sewer, the underground portion normally requires an inspection <strong>before it&#39;s covered</strong>, and a sewered outdoor sink needs a roof or a permanently attached cover. None of that blocks the build today — the jug is a legitimate bridge — but when you do the tie-in, doing it permitted protects you at resale and the homeowner no-plan permit is cheap relative to the trenching labor you&#39;re doing anyway. Confirm the path with <a href="https://www.sandiego.gov/development-services" target="_blank" rel="noopener">San Diego DSD</a>.</p>'},{type:"html",html:"<hr>"}]}]},{num:0,id:"phase-0",title:"Site Prep, Conduit Fix, and the Level Base",heading:"Phase 0 — Site Prep, Conduit Fix, and the Level Base",sections:[{kind:"step",stepNo:"0.1",title:"Step 0.1 — Verify the paver base",slug:"step-01-verify-the-paver-base",blocks:[{type:"html",html:"<p>Walk the footprint. Look for rocking pavers or ponding low spots. A loaded island runs 1,500–2,500 lb; if pavers are on proper compacted road base + sand, you&#39;re fine. Fix any rockers now.</p>"}]},{kind:"step",stepNo:"0.2",title:"Step 0.2 — Electrical conduit relocation (your step 1)",slug:"step-02-electrical-conduit-relocation-your-step-1",blocks:[{type:"diagram",file:"diagram-02-conduit-offset.svg",alt:"Conduit offset at the sill"},{type:"html",html:`<p>
The existing stubs sit tight to the fence post and would collide with the back plane.</p>`},{type:"checklist",ordered:!0,items:[{id:"p0.db434090",html:"<p><strong>Kill both circuits at the panel. Verify dead.</strong></p>",detailsHtml:null,plain:"Kill both circuits at the panel. Verify dead."},{id:"p0.5fbf99b0",html:"<p>Demo the existing boxes; cut each PVC stub down, leaving a coupling&#39;s worth above the pavers.</p>",detailsHtml:null,plain:"Demo the existing boxes; cut each PVC stub down, leaving a coupling&#39;s worth above the pavers."},{id:"p0.9e3f63c1",html:"<p><strong>Confirm what the second pipe in the double stub is</strong> (spare circuit? low voltage? gas?) before demo — it changes the plan if it&#39;s not a spare.</p>",detailsHtml:null,plain:"Confirm what the second pipe in the double stub is (spare circuit? low voltage? gas?) before demo — it changes the plan if it&#39;s not a spare."},{id:"p0.f4965222",html:"<p>Glue on couplings and <strong>PVC offset fittings right at the base, below track level</strong> (~$2 each; or heat-gun-bend your own). The jog kicks the conduit off the fence line so it rises <em>inside</em> a stud bay. Never notch the back cement board at grade.</p>",detailsHtml:null,plain:"Glue on couplings and PVC offset fittings right at the base, below track level (~$2 each; or heat-gun-bend your own). The jog kicks the conduit off the fence line so it rises inside a stud bay. Never notch the back cement board at grade."},{id:"p0.614ea954",html:"<p>Lay out the run so each stub lands <strong>between studs</strong>, not under track. If one lands dead-on the track line, notch the track flange around it — not the pipe.</p>",detailsHtml:null,plain:"Lay out the run so each stub lands between studs, not under track. If one lands dead-on the track line, notch the track flange around it — not the pipe."},{id:"p0.696155cf",html:"<p>Cap the open conduit ends until Phase 2.</p>",detailsHtml:null,plain:"Cap the open conduit ends until Phase 2."}]}]},{kind:"step",stepNo:"0.3",title:"Step 0.3 — Lay out the footprint",slug:"step-03-lay-out-the-footprint",blocks:[{type:"checklist",ordered:!1,items:[{id:"p0.827ecec1",html:"<p>Snap chalk lines on the pavers for both legs of the L, holding the whole island <strong>1.5–2&quot; off the vinyl fence</strong> (you already have scorch marks on that fence — vinyl deforms ~160°F; the gap also makes your back vents functional and gives the conduit room).</p>",detailsHtml:null,plain:"Snap chalk lines on the pavers for both legs of the L, holding the whole island 1.5–2&quot; off the vinyl fence (you already have scorch marks on that fence — vinyl deforms ~160°F; the gap also makes your back vents functional and gives the conduit room)."},{id:"p0.76c68b91",html:"<p>Mark the sink chase, conduit penetrations, and the grill/kamado/fridge bay centerlines on the ground.</p>",detailsHtml:null,plain:"Mark the sink chase, conduit penetrations, and the grill/kamado/fridge bay centerlines on the ground."}]}]},{kind:"step",stepNo:"0.4",title:"Step 0.4 — Build the PT base (your step 2)",slug:"step-04-build-the-pt-base-your-step-2",blocks:[{type:"html",html:"<p>Locked: PT 2×4 shimmed directly on the pavers.</p>"},{type:"diagram",file:"diagram-01-base-finish-stack.svg",alt:"Base and finish stack cross-section"},{type:"html",html:"<p><em>Read the section above before cutting anything: the track&#39;s front flange sits flush with the PT front face, the stud web spans the full track interior, and the finish stack (½&quot; board + thinset + plank ≈ 1&quot;) drops past the sill to a weep screed ~½&quot; above the pavers — no raw wood visible at grade. If you&#39;d rather have a recessed toe-kick at any bay, hold that bay&#39;s board/cladding up at a horizontal trim line instead and paint the recess dark; the default here is the monolithic face to grade shown in your renders.</em></p>"},{type:"checklist",ordered:!0,items:[{id:"p0.401c813c",html:"<p><strong>Find the high point</strong> of the pavers inside the footprint with the laser. That&#39;s your datum — everywhere else you pack <em>up</em>; never grind down.</p>",detailsHtml:null,plain:"Find the high point of the pavers inside the footprint with the laser. That&#39;s your datum — everywhere else you pack up; never grind down."},{id:"p0.c377fc65",html:"<p><strong>Lay the drain start</strong> (Phase −1): the 2&quot; pipe + riser goes in at the sink-bay crossing before any sill goes over it — and its marked line is a no-drill zone for every anchor in step 6.</p>",detailsHtml:null,plain:"Lay the drain start (Phase −1): the 2&quot; pipe + riser goes in at the sink-bay crossing before any sill goes over it — and its marked line is a no-drill zone for every anchor in step 6."},{id:"p0.830c95d3",html:"<p>Cut PT 2×4 (above-ground UC3A) sill runs for every wall line, including the backsplash wall and the kamado cradle.</p>",detailsHtml:null,plain:"Cut PT 2×4 (above-ground UC3A) sill runs for every wall line, including the backsplash wall and the kamado cradle."},{id:"p0.9e91dd6d",html:"<p><strong>Gap or drill the sill</strong> where the conduit stubs rise (drilling a hole ~¼&quot; oversize mid-board is stronger than an open notch; PVC needs the slack for thermal movement).</p>",detailsHtml:null,plain:"Gap or drill the sill where the conduit stubs rise (drilling a hole ~¼&quot; oversize mid-board is stronger than an open notch; PVC needs the slack for thermal movement)."},{id:"p0.435dac6c",html:"<p>Set each run on the chalk lines. Shim to the laser at every bearing point (cedar shims were on the buy list; composite shims are the more rot-proof upgrade if you want it). Check level along and across every run, then leg-to-leg across the whole L.</p>",detailsHtml:null,plain:"Set each run on the chalk lines. Shim to the laser at every bearing point (cedar shims were on the buy list; composite shims are the more rot-proof upgrade if you want it). Check level along and across every run, then leg-to-leg across the whole L."},{id:"p0.9f128901",html:"<p>Bed in <strong>PL Premium</strong> and anchor to the pavers with Tapcons/paver anchors every few feet. The sill is your shear connection to earth.</p>",detailsHtml:null,plain:"Bed in PL Premium and anchor to the pavers with Tapcons/paver anchors every few feet. The sill is your shear connection to earth."},{id:"p0.14d92dd6",html:"<p><strong>Isolation is non-negotiable:</strong> roll <strong>closed-cell sill seal foam</strong> over the top of every PT run before any steel touches it — modern ACQ/copper-azole PT corrodes galvanized steel. Any screw touching PT is <strong>hot-dip G185 or stainless</strong>, never plain zinc.</p>",detailsHtml:null,plain:"Isolation is non-negotiable: roll closed-cell sill seal foam over the top of every PT run before any steel touches it — modern ACQ/copper-azole PT corrodes galvanized steel. Any screw touching PT is hot-dip G185 or stainless, never plain zinc."}]},{type:"gate",id:"p0.gate.c1127e7e",html:"<strong>Check before moving on:</strong> laser across every run and diagonal — you want the whole sill plane within ~1/16&quot;. Every error here telegraphs to the countertop."},{type:"html",html:"<hr>"}]}]},{num:1,id:"phase-1",title:"Steel Frame (your step 3)",heading:"Phase 1 — Steel Frame (your step 3)",sections:[{kind:"materials",stepNo:null,title:"Materials (from the phased-budget chat)",slug:"materials-from-the-phased-budget-chat",blocks:[{type:"html",html:`<ul>
<li>~<strong>50 sticks</strong> 3-5/8&quot; × 10&#39; 20-ga <strong>EQ</strong> studs (label reads -18/-19/-20/-23 mil; avoid -14/-16). The 10-footers yield <strong>three ~33&quot; studs per stick</strong> — that&#39;s why you chose them.</li>
<li>~<strong>14 sticks</strong> 3-5/8&quot; track (U-channel — no return lips; don&#39;t mix up with studs).</li>
<li>#8 × ½&quot; wafer-head self-drilling TEK screws (500 box) — stud↔track. ~4 per stud.</li>
<li>#10 × ¾&quot; hex-head TEK screws (100 box) — track→PT sill (these bite the wood better).</li>
<li>Cold-galvanizing spray, 2 cans — <strong>every cut edge gets sprayed.</strong> Non-negotiable outdoors.</li>
<li>Sources: J&amp;B (El Cajon) or Westside (Sorrento Valley) supply yards beat HD on studs; buy TEK screws online/Fastenal, not HD.</li>
</ul>`}]},{kind:"step",stepNo:"1.1",title:"Step 1.1 — Cut the studs",slug:"step-11-cut-the-studs",blocks:[{type:"checklist",ordered:!1,items:[{id:"p1.26f462db",html:"<p><strong>Stud length is locked: 32-13/16&quot;</strong> (34&quot; − 1-3/16&quot; for the 3cm granite). Cut a test stud, dry-stack the full sandwich (PT + track + stud + track + ½&quot; deck board) and tape-measure to 34-13/16&quot; before you gang-cut fifty of them.</p>",detailsHtml:null,plain:"Stud length is locked: 32-13/16&quot; (34&quot; − 1-3/16&quot; for the 3cm granite). Cut a test stud, dry-stack the full sandwich (PT + track + stud + track + ½&quot; deck board) and tape-measure to 34-13/16&quot; before you gang-cut fifty of them."},{id:"p1.106b2e5b",html:"<p>Score-and-snap: snip both flanges, nick the web, bend and snap. Or the miter saw with a <strong>carbide metal-cutting blade</strong> (Diablo Steel Demon type — cuts cold, no sparks, clean miters). Never an abrasive wheel.</p>",detailsHtml:null,plain:"Score-and-snap: snip both flanges, nick the web, bend and snap. Or the miter saw with a carbide metal-cutting blade (Diablo Steel Demon type — cuts cold, no sparks, clean miters). Never an abrasive wheel."},{id:"p1.743389a8",html:"<p>Deburr every cut; <strong>spray every cut edge</strong> with cold-galv. Wear cut gloves — sheared steel is a razor.</p>",detailsHtml:null,plain:"Deburr every cut; spray every cut edge with cold-galv. Wear cut gloves — sheared steel is a razor."}]}]},{kind:"step",stepNo:"1.2",title:"Step 1.2 — Assemble wall panels flat, tilt up",slug:"step-12-assemble-wall-panels-flat-tilt-up",blocks:[{type:"diagram",file:"diagram-03-splice-and-corner.svg",alt:"Track splice and outside corner"},{type:"checklist",ordered:!1,items:[{id:"p1.6cc11e6b",html:"<p>Build each wall section flat on the patio, square it with a framing square, then tilt into place onto the sill track. Far easier than building vertically.</p>",detailsHtml:null,plain:"Build each wall section flat on the patio, square it with a framing square, then tilt into place onto the sill track. Far easier than building vertically."},{id:"p1.b227140b",html:"<p><strong>Sheath backs before tilt-up:</strong> a panel lying flat has an accessible back face; a standing panel against the fence never does again. The grill-bay section gets its back cement board attached NOW, on the ground (see Phase 3 zoning). Any storage bay you want dust-tight gets the same treatment — decide per panel before it stands. (The curved corner is framed in place, so staple its hardware cloth progressively as you frame, while your arm still fits.)</p>",detailsHtml:null,plain:"Sheath backs before tilt-up: a panel lying flat has an accessible back face; a standing panel against the fence never does again. The grill-bay section gets its back cement board attached NOW, on the ground (see Phase 3 zoning). Any storage bay you want dust-tight gets the same treatment — decide per panel before it stands. (The curved corner is framed in place, so staple its hardware cloth progressively as you frame, while your arm still fits.)"},{id:"p1.86db4c6a",html:"<p>Studs at 16&quot; o.c. standard; <strong>~6&quot; o.c. on the kamado arc/corner facets</strong> if you kept any curved/faceted geometry.</p>",detailsHtml:null,plain:"Studs at 16&quot; o.c. standard; ~6&quot; o.c. on the kamado arc/corner facets if you kept any curved/faceted geometry."},{id:"p1.633fcc04",html:"<p><strong>Clamp before you drive</strong> — locking C-clamp pliers (own 4–6) hold the layers so the metal can&#39;t walk. Drywall screw gun with adjustable nose &gt; impact for TEKs; a stripped hole is a dead joint.</p>",detailsHtml:null,plain:"Clamp before you drive — locking C-clamp pliers (own 4–6) hold the layers so the metal can&#39;t walk. Drywall screw gun with adjustable nose &gt; impact for TEKs; a stripped hole is a dead joint."},{id:"p1.7f226a3a",html:"<p>Corners: two mitered pieces spliced with a nested track sleeve, screwed through both flanges + web — stronger than a single bent web. Splice long runs with an 8–12&quot; nested sleeve.</p>",detailsHtml:null,plain:"Corners: two mitered pieces spliced with a nested track sleeve, screwed through both flanges + web — stronger than a single bent web. Splice long runs with an 8–12&quot; nested sleeve."}]}]},{kind:"step",stepNo:"1.3",title:"Step 1.3 — Fasten to the base",slug:"step-13-fasten-to-the-base",blocks:[{type:"checklist",ordered:!1,items:[{id:"p1.246f8981",html:"<p><strong>Weep the tracks first, on the sawhorses:</strong> drill ¼&quot; holes at the very bottom of the BACK flange, right at the web corner, 1–2 per stud bay, every track run. The U-channel is otherwise a gutter with no outlet — cavity water (wind-blown rain through the back cloth, or a someday plumbing mishap) pools in it and standing water is what eats galvanizing. Because the track&#39;s back flange slightly overhangs the PT&#39;s rear edge (front flange is the flush one), these weeps drain sideways past the PT face into the fence air gap and onto open paver. Deburr + cold-galv every hole. Same philosophy as the cabinet-floor weeps and the weep screed: never give water a place to sit.</p>",detailsHtml:null,plain:"Weep the tracks first, on the sawhorses: drill ¼&quot; holes at the very bottom of the BACK flange, right at the web corner, 1–2 per stud bay, every track run. The U-channel is otherwise a gutter with no outlet — cavity water (wind-blown rain through the back cloth, or a someday plumbing mishap) pools in it and standing water is what eats galvanizing. Because the track&#39;s back flange slightly overhangs the PT&#39;s rear edge (front flange is the flush one), these weeps drain sideways past the PT face into the fence air gap and onto open paver. Deburr + cold-galv every hole. Same philosophy as the cabinet-floor weeps and the weep screed: never give water a place to sit."},{id:"p1.9aca3fd2",html:"<p>Bottom track over the sill seal, onto the PT, with the #10 × ¾&quot; hex TEKs (G185/stainless where they touch PT).</p>",detailsHtml:null,plain:"Bottom track over the sill seal, onto the PT, with the #10 × ¾&quot; hex TEKs (G185/stainless where they touch PT)."},{id:"p1.b18472d2",html:"<p>Plumb every wall, brace temporarily, then tie the legs of the L together into one rigid unit.</p>",detailsHtml:null,plain:"Plumb every wall, brace temporarily, then tie the legs of the L together into one rigid unit."}]}]},{kind:"step",stepNo:"1.4",title:"Step 1.4 — The kamado cradle (build this heavy) — Big Joe, locked",slug:"step-14-the-kamado-cradle-build-this-heavy-big-joe-locked",blocks:[{type:"diagram",file:"diagram-05-kamado-cradle.svg",alt:"Kamado cradle load path"},{type:"html",html:`<p>
A Big Joe is the heaviest single object in the build — the standalone Series III grill head runs roughly <strong>28.2&quot;W and on the order of 400+ lb</strong> of ceramic concentrated on a small footprint.</p>`},{type:"checklist",ordered:!1,items:[{id:"p1.e5353546",html:"<p>The load must travel <strong>straight down in compression</strong>: posts directly under where the ceramic base contacts (4 bearing points for a Big Joe), running uninterrupted to the base track. Never carry it on a horizontal stud spanning an open bay.</p>",detailsHtml:null,plain:"The load must travel straight down in compression: posts directly under where the ceramic base contacts (4 bearing points for a Big Joe), running uninterrupted to the base track. Never carry it on a horizontal stud spanning an open bay."},{id:"p1.b951cc58",html:"<p>Use your <strong>doubled-rail grid</strong> here (you already modeled this — good). Web-vertical orientation or boxed track for any horizontal members, never flat track on its weak axis.</p>",detailsHtml:null,plain:"Use your doubled-rail grid here (you already modeled this — good). Web-vertical orientation or boxed track for any horizontal members, never flat track on its weak axis."},{id:"p1.9d1ca8a9",html:"<p>Deck the shelf so the base bears on a continuous surface, not thin flanges (cement board deck comes in Phase 3; mortar-bed the feet zone).</p>",detailsHtml:null,plain:"Deck the shelf so the base bears on a continuous surface, not thin flanges (cement board deck comes in Phase 3; mortar-bed the feet zone)."},{id:"p1.14f01e03",html:'<p><strong>Kamado Joe requires ceramic feet in built-in installs</strong> — Big Joe takes <strong>4</strong> (2 front, 2 back), spaced so it doesn&#39;t rock when the dome opens. They create the under-grill airflow that dissipates heat; don&#39;t set the ceramic base flat on the deck. (<a href="https://www.kamadojoe.com/collections/parts" target="_blank" rel="noopener">kamadojoe.com parts</a>)</p>',detailsHtml:null,plain:"Kamado Joe requires ceramic feet in built-in installs — Big Joe takes 4 (2 front, 2 back), spaced so it doesn&#39;t rock when the dome opens. They create the under-grill airflow that dissipates heat; don&#39;t set the ceramic base flat on the deck. (kamadojoe.com parts)"},{id:"p1.2b785c92",html:'<p>Dimension the cutout from the <strong>A–R built-in chart</strong>: <a href="https://ceramicgrillstore.com/products/kamado-joe-built-in-dimensions-cutout-guide" target="_blank" rel="noopener">Ceramic Grill Store — Kamado Joe Built-In Dimensions &amp; Cutout Guide</a>. Two rules from it worth engraving: <strong>don&#39;t build fixed counter in front of the grill</strong> (the front latch needs access), and the shelf surface sits a few inches <strong>below</strong> counter so the band/latch clears.</p>',detailsHtml:null,plain:"Dimension the cutout from the A–R built-in chart: Ceramic Grill Store — Kamado Joe Built-In Dimensions &amp; Cutout Guide. Two rules from it worth engraving: don&#39;t build fixed counter in front of the grill (the front latch needs access), and the shelf surface sits a few inches below counter so the band/latch clears."},{id:"p1.aa1dcded",html:"<p>Verify the dome&#39;s rear swing clears the backsplash/curved wall before you commit the shelf depth.</p>",detailsHtml:null,plain:"Verify the dome&#39;s rear swing clears the backsplash/curved wall before you commit the shelf depth."},{id:"p1.1883d037",html:'<p>Controller: order the <strong>SMOBOT Kamado Joe version</strong> (<a href="https://smobot.com/products/kamado-joe" target="_blank" rel="noopener">smobot.com/products/kamado-joe</a>, ~$349) — the standard BGE daisy-wheel kit does <strong>not</strong> fit the cast-aluminum Kontrol Tower. It&#39;s micro-USB powered, so the outlet at the cradle serves it and the Looftlighter.</p>',detailsHtml:null,plain:"Controller: order the SMOBOT Kamado Joe version (smobot.com/products/kamado-joe, ~$349) — the standard BGE daisy-wheel kit does not fit the cast-aluminum Kontrol Tower. It&#39;s micro-USB powered, so the outlet at the cradle serves it and the Looftlighter."}]}]},{kind:"step",stepNo:"1.4b",title:"Step 1.4b — The curved corner wall (curve is alive)",slug:"step-14b-the-curved-corner-wall-curve-is-alive",blocks:[{type:"diagram",file:"diagram-04-curved-wall.svg",alt:"Curved wall layer buildup"},{type:"html",html:`<p>
The studs do the curving; everything above them just follows.</p>`},{type:"checklist",ordered:!0,items:[{id:"p1.4d34f0d7",html:"<p><strong>Curved track:</strong> snip both flanges of a length of track every 1–2&quot; (tighter radius = tighter snips), leave the web intact, and bend it smoothly to your arc. Cut one for the base and a matching one for the top; trace the arc from your SketchUp template onto plywood/cardboard first so both tracks match exactly.</p>",detailsHtml:null,plain:"Curved track: snip both flanges of a length of track every 1–2&quot; (tighter radius = tighter snips), leave the web intact, and bend it smoothly to your arc. Cut one for the base and a matching one for the top; trace the arc from your SketchUp template onto plywood/cardboard first so both tracks match exactly."},{id:"p1.9e13c7d3",html:"<p>The PT sill under it: cut short PT segments to chord the arc (the sill doesn&#39;t need to be a perfect curve — it just needs bearing under the track&#39;s snipped web every few inches), or band-saw a curved sill from wider PT stock if you want it clean.</p>",detailsHtml:null,plain:"The PT sill under it: cut short PT segments to chord the arc (the sill doesn&#39;t need to be a perfect curve — it just needs bearing under the track&#39;s snipped web every few inches), or band-saw a curved sill from wider PT stock if you want it clean."},{id:"p1.70e2d535",html:"<p><strong>Studs at ~6&quot; on center around the arc.</strong> At that spacing the facets disappear under the finish. Plumb each one; the two tracks hold the geometry.</p>",detailsHtml:null,plain:"Studs at ~6&quot; on center around the arc. At that spacing the facets disappear under the finish. Plumb each one; the two tracks hold the geometry."},{id:"p1.910625cd",html:"<p><strong>Pre-install the gas chase through the corner</strong> while the framing is bare: 1¼–1½&quot; PVC conduit routed through the corner&#39;s stud knockouts (gentle sweeps or straight chords), both ends emerging in the open bays flanking the corner. Cap, pull string, label &quot;GAS CHASE.&quot; Once the cradle carries the Big Joe against the fence, this corner is blind forever — this $8 of pipe is the only way a future line crosses it in twenty minutes instead of never.</p>",detailsHtml:null,plain:"Pre-install the gas chase through the corner while the framing is bare: 1¼–1½&quot; PVC conduit routed through the corner&#39;s stud knockouts (gentle sweeps or straight chords), both ends emerging in the open bays flanking the corner. Cap, pull string, label &quot;GAS CHASE.&quot; Once the cradle carries the Big Joe against the fence, this corner is blind forever — this $8 of pipe is the only way a future line crosses it in twenty minutes instead of never."}]}]},{kind:"step",stepNo:"1.5",title:"Step 1.5 — Backsplash wall",slug:"step-15-backsplash-wall",blocks:[{type:"checklist",ordered:!1,items:[{id:"p1.e3d17eb5",html:"<p>Frame the thin backsplash wall per the stud-orientation plan we worked out (studs rotated for minimal thickness).</p>",detailsHtml:null,plain:"Frame the thin backsplash wall per the stud-orientation plan we worked out (studs rotated for minimal thickness)."},{id:"p1.65d04690",html:"<p>Remember it can&#39;t be anchored into pavers against wind load — its stability comes from being tied hard into the L and the mass of the island. Bolt it through into the counter framing with blocking at the bolt lines.</p>",detailsHtml:null,plain:"Remember it can&#39;t be anchored into pavers against wind load — its stability comes from being tied hard into the L and the mass of the island. Bolt it through into the counter framing with blocking at the bolt lines."}]}]},{kind:"step",stepNo:"1.6",title:"Step 1.6 — Openings and blocking (do-now-or-regret-it list)",slug:"step-16-openings-and-blocking-do-now-or-regret-it-list",blocks:[{type:"html",html:"<p>Frame every negative to the <strong>manufacturer&#39;s cutout spec, not your framing instinct</strong>:</p>"},{type:"checklist",ordered:!1,items:[{id:"p1.9cd8e9f7",html:"<p>Grill: ⚠️ <strong>decide SL30 vs SL36 before framing this bay.</strong> SL30: 25½&quot;W × 20½&quot;D × 10¼&quot;H · SL36: 32½&quot;W × 20½&quot;D × 10¼&quot;H — plus ~1&quot; margin on width/depth for cross-brand swap insurance. Depth is where brands vary most. (Everything else in the frame is identical either way; only this one bay and its flanking stud positions wait on the decision.)</p>",detailsHtml:null,plain:"Grill: ⚠️ decide SL30 vs SL36 before framing this bay. SL30: 25½&quot;W × 20½&quot;D × 10¼&quot;H · SL36: 32½&quot;W × 20½&quot;D × 10¼&quot;H — plus ~1&quot; margin on width/depth for cross-brand swap insurance. Depth is where brands vary most. (Everything else in the frame is identical either way; only this one bay and its flanking stud positions wait on the decision.)"},{id:"p1.f7a7a1f0",html:"<p>Fridge: the Velieta 24&quot; class — pull the exact cutout from its manual once it arrives (frame that bay last if needed; these budget units share ~23.5&quot;W × ~23&quot;D × ~34&quot;H footprints but verify). Frame a <strong>solid, dead-level floor shelf</strong> for it. Honesty note: at ~$350 it&#39;s a verified front-vent built-in, but it&#39;s not a Blaze-tier outdoor unit — the lined cavity gives it a sheltered life, and if it dies in 6–8 years, the standard 24&quot; bay means any replacement drops in.</p>",detailsHtml:null,plain:"Fridge: the Velieta 24&quot; class — pull the exact cutout from its manual once it arrives (frame that bay last if needed; these budget units share ~23.5&quot;W × ~23&quot;D × ~34&quot;H footprints but verify). Frame a solid, dead-level floor shelf for it. Honesty note: at ~$350 it&#39;s a verified front-vent built-in, but it&#39;s not a Blaze-tier outdoor unit — the lined cavity gives it a sheltered life, and if it dies in 6–8 years, the standard 24&quot; bay means any replacement drops in."},{id:"p1.2292f4fe",html:"<p>Sink cutout per sink template.</p>",detailsHtml:null,plain:"Sink cutout per sink template."},{id:"p1.f2767167",html:"<p><strong>Horizontal blocking at counter height</strong> under the stone, grill flange, and sink.</p>",detailsHtml:null,plain:"Horizontal blocking at counter height under the stone, grill flange, and sink."},{id:"p1.cc51e10d",html:"<p><strong>Hinge backing at every door opening:</strong> bolt aluminum angle (or boxed heavier-gauge stud) across the hinge-side stud <em>now</em> — a thin stud web alone will not hold a piano hinge for 20 years, and this is a miserable retrofit.</p>",detailsHtml:null,plain:"Hinge backing at every door opening: bolt aluminum angle (or boxed heavier-gauge stud) across the hinge-side stud now — a thin stud web alone will not hold a piano hinge for 20 years, and this is a miserable retrofit."},{id:"p1.0d3c0302",html:"<p><strong>Shelf blocking/ledgers</strong> at your chosen shelf heights in every cabinet bay — cement board is skin, not structure.</p>",detailsHtml:null,plain:"Shelf blocking/ledgers at your chosen shelf heights in every cabinet bay — cement board is skin, not structure."},{id:"p1.ca96416e",html:"<p>Route paths: confirm the conduit bays, the PEX route low around the fridge, the drain chase.</p>",detailsHtml:null,plain:"Route paths: confirm the conduit bays, the PEX route low around the fridge, the drain chase."}]},{type:"gate",id:"p1.gate.79a39822",html:"<strong>Check before moving on:</strong> laser across the entire top track — dead level, both legs, corner to corner. Rack-test every bay. This is the last cheap moment to fix anything."},{type:"html",html:"<hr>"}]}]},{num:2,id:"phase-2",title:"Electrical Rough-In (your step 7, moved here)",heading:"Phase 2 — Electrical Rough-In (your step 7, moved here)",sections:[{kind:"intro",stepNo:null,title:null,slug:"phase-2-intro",blocks:[{type:"html",html:"<p>You&#39;re doing this yourself and you&#39;ve got two circuits at the stubs.</p>"}]},{kind:"section",stepNo:null,title:"The plan we settled",slug:"the-plan-we-settled",blocks:[{type:"checklist",ordered:!1,items:[{id:"p2.63c29b70",html:"<p><strong>Circuit 1 (20A, dedicated):</strong> fridge. Refrigeration hates sharing with a tripping GFCI.</p>",detailsHtml:null,plain:"Circuit 1 (20A, dedicated): fridge. Refrigeration hates sharing with a tripping GFCI."},{id:"p2.a9257643",html:"<p><strong>Circuit 2 (20A):</strong> grill outlet (the Coyote SL needs 120V for lights/ignition), kamado outlet (Looftlighter + fan controller — note some kamado electronics are GFCI-sensitive; a clean dedicated-ish path helps), sink-area convenience outlet.</p>",detailsHtml:null,plain:"Circuit 2 (20A): grill outlet (the Coyote SL needs 120V for lights/ignition), kamado outlet (Looftlighter + fan controller — note some kamado electronics are GFCI-sensitive; a clean dedicated-ish path helps), sink-area convenience outlet."},{id:"p2.c41244ea",html:"<p><strong>GFCI protection on everything</strong> — at the head of each circuit or breaker-level.</p>",detailsHtml:null,plain:"GFCI protection on everything — at the head of each circuit or breaker-level."}]}]},{kind:"section",stepNo:null,title:"Steps",slug:"steps",blocks:[{type:"checklist",ordered:!0,items:[{id:"p2.c6842024",html:"<p>From the offset fittings at the base, extend <strong>PVC conduit</strong> up the stud bays and laterally <strong>through the stud knockouts</strong> (bushings/grommets on any cut steel edge). Conduit runs the whole way — the island interior is a damp/wet location; THWN-2 in conduit, no Romex, no bare UF.</p>",detailsHtml:null,plain:"From the offset fittings at the base, extend PVC conduit up the stud bays and laterally through the stud knockouts (bushings/grommets on any cut steel edge). Conduit runs the whole way — the island interior is a damp/wet location; THWN-2 in conduit, no Romex, no bare UF."},{id:"p2.8f8f7081",html:"<p>Set <strong>weatherproof boxes with in-use covers</strong>:</p>",detailsHtml:`<ul>
<li>Grill outlet: low (8–12&quot;) inside the adjacent cavity or on the back face under the counter — cords out of sight, covers stay closed.</li>
<li>Fridge outlet: <strong>in the adjacent cabinet</strong>, not behind the fridge (you can&#39;t reach it and the cord gets pinched). Drill a grommeted cord pass-through, seal it (steel wool + sealant — pest highway otherwise).</li>
<li>Sink convenience: high on the cabinet sidewall, away from trap drips.</li>
<li>Kamado: near the cradle.</li>
</ul>`,plain:"Set weatherproof boxes with in-use covers:"},{id:"p2.90e652d6",html:"<p>Keep splices in an <strong>accessible</strong> j-box (the fridge cavity works as a hub — a removable panel counts as accessible; buried behind tile doesn&#39;t).</p>",detailsHtml:null,plain:"Keep splices in an accessible j-box (the fridge cavity works as a hub — a removable panel counts as accessible; buried behind tile doesn&#39;t)."},{id:"p2.6024ce64",html:"<p>Pull THWN-2, land nothing yet — leave tails coiled in boxes. Devices and covers go in at Phase 8 (after tile, so nothing gets thinset in it).</p>",detailsHtml:null,plain:"Pull THWN-2, land nothing yet — leave tails coiled in boxes. Devices and covers go in at Phase 8 (after tile, so nothing gets thinset in it)."},{id:"p2.b6180a19",html:"<p>Any electrical near the propane bay mounts <strong>high</strong>, not low where gas would pool.</p>",detailsHtml:null,plain:"Any electrical near the propane bay mounts high, not low where gas would pool."}]},{type:"html",html:"<hr>"}]}]},{num:3,id:"phase-3",title:"Cement Board, Waterproofing, Flashing (your step 4)",heading:"Phase 3 — Cement Board, Waterproofing, Flashing (your step 4)",sections:[{kind:"materials",stepNo:null,title:"Materials",slug:"materials",blocks:[{type:"html",html:`<ul>
<li>½&quot; cement board (Durock/Hardie), ~<strong>26 sheets</strong> of 3×5 estimated for faces + counter deck + backsplash (recheck against final plan — the open back removed ~100 sq ft from earlier estimates, so re-count before buying; buy 2–3 extra).</li>
<li><strong>Power Pro #9 × 1¼&quot; ceramic-coated wafer-head backer screws</strong> — the 925-count box covers the whole project. (Yes, 1¼&quot; is right: ½&quot; board + ¾&quot; past it to thread the steel.)</li>
<li>Alkali-resistant mesh tape + thinset for seams.</li>
<li>RedGard or AquaDefense (~2 gal), Z-flashing, weep screed, ¼&quot; galvanized hardware cloth.</li>
<li>Rockwool ComfortBatt R-15 (1 pack does grill bay + fridge bay + sink back).</li>
<li><strong>Respirator for every cut. Non-negotiable.</strong> Score-and-snap where you can; diamond blade outside for the rest.</li>
</ul>`}]},{kind:"section",stepNo:null,title:"Steps",slug:"steps",blocks:[{type:"checklist",ordered:!0,items:[{id:"p3.e578ce39",html:"<p><strong>Interior cavity liners first</strong> where access closes later: line the fridge cavity on all five faces (offcuts are fine), build its level floor shelf, and give every cabinet floor a slight pitch (~¼&quot;) to a <strong>weep hole</strong> at the low point — no bathtubs. Under-sink bay gets the waterproof-pan treatment on its floor.</p>",detailsHtml:null,plain:"Interior cavity liners first where access closes later: line the fridge cavity on all five faces (offcuts are fine), build its level floor shelf, and give every cabinet floor a slight pitch (~¼&quot;) to a weep hole at the low point — no bathtubs. Under-sink bay gets the waterproof-pan treatment on its floor."},{id:"p3.72f7bddd",html:"<p><strong>Plan and cut every penetration before hanging</strong> — conduit, PEX, drain chase, vents. Sleeve and seal with exterior silicone. Retrofitting holes through finished board is miserable.</p>",detailsHtml:null,plain:"Plan and cut every penetration before hanging — conduit, PEX, drain chase, vents. Sleeve and seal with exterior silicone. Retrofitting holes through finished board is miserable."},{id:"p3.66067341",html:"<p>Hang the <strong>face sheets</strong>: screws every 8&quot; into studs, edges landing on framing, 1/8&quot; gaps between sheets.</p>",detailsHtml:null,plain:"Hang the face sheets: screws every 8&quot; into studs, edges landing on framing, 1/8&quot; gaps between sheets."},{id:"p3.f00aec30",html:"<p><strong>Grill bay — a fully boarded compartment, single layer throughout:</strong> back (pre-attached at tilt-up) plus the bay-facing side of BOTH flanking partitions. Not a fire-rating issue (the steel assembly is already non-combustible, ASTM E136) — the side boards do three other jobs: they stop firebox heat and grease vapor migrating into adjacent storage (where the door backers are polyiso foam), they make the bay a defined compartment so the manual&#39;s ventilation-opening math means something (LP compartments have explicit vent requirements — low openings especially, propane sinks; size the toe-kick louvers to the manual&#39;s square-inch numbers), and they stiffen the partitions carrying the counter at the cutout. Finish level: bare board, seams taped, no membrane, no tile — nobody sees inside a grill bay. Bottom stays open to the pavers for the tank; front per the manual&#39;s access + vent layout. <strong>The manual is law:</strong> cutout dims, vent areas, clearance-to-combustibles (the vinyl fence counts — boarded back + 2&quot; gap covers it, verify against the manual&#39;s rear number; a cement-board standoff shield on the fence is the cheap fix if tight). Optional retrofit: Rockwool batt into the open stud cavity if the adjacent bay ever runs warm — buy it then, not now.</p>",detailsHtml:null,plain:"Grill bay — a fully boarded compartment, single layer throughout: back (pre-attached at tilt-up) plus the bay-facing side of BOTH flanking partitions. Not a fire-rating issue (the steel assembly is already non-combustible, ASTM E136) — the side boards do three other jobs: they stop firebox heat and grease vapor migrating into adjacent storage (where the door backers are polyiso foam), they make the bay a defined compartment so the manual&#39;s ventilation-opening math means something (LP compartments have explicit vent requirements — low openings especially, propane sinks; size the toe-kick louvers to the manual&#39;s square-inch numbers), and they stiffen the partitions carrying the counter at the cutout. Finish level: bare board, seams taped, no membrane, no tile — nobody sees inside a grill bay. Bottom stays open to the pavers for the tank; front per the manual&#39;s access + vent layout. The manual is law: cutout dims, vent areas, clearance-to-combustibles (the vinyl fence counts — boarded back + 2&quot; gap covers it, verify against the manual&#39;s rear number; a cement-board standoff shield on the fence is the cheap fix if tight). Optional retrofit: Rockwool batt into the open stud cavity if the adjacent bay ever runs warm — buy it then, not now."},{id:"p3.7c3c2299",html:"<p><strong>Counter deck:</strong> ½&quot; cement board screwed down across the top track — it&#39;s the counter&#39;s subfloor. Everything flush; any blocking sitting ¼&quot; low reintroduces voids under stone.</p>",detailsHtml:null,plain:"Counter deck: ½&quot; cement board screwed down across the top track — it&#39;s the counter&#39;s subfloor. Everything flush; any blocking sitting ¼&quot; low reintroduces voids under stone."},{id:"p3.685c7f1a",html:`<p><strong>Back of the island:</strong> <strong>¼&quot; galvanized hardware cloth across the entire back EXCEPT the grill bay.</strong> Cloth staples/screws on from the front through the bays — free ventilation, pest exclusion, a permanent drying lung for the cavity, and physically incapable of trapping water. The <strong>grill bay back gets solid board, pre-attached while its panel lies flat in Phase 1</strong> (no radiant line-of-sight through mesh to the already-scorched vinyl fence). The kamado corner stays cloth: a kamado is a thermos — its ceramic keeps the exterior cool — and the boarded, porcelain-faced backsplash wall already stands between body and fence.
The boarded back gets seams taped but NO membrane — it is the drying side by design.</p>`,detailsHtml:null,plain:"Back of the island: ¼&quot; galvanized hardware cloth across the entire back EXCEPT the grill bay. Cloth staples/screws on from the front through the bays — free ventilation, pest exclusion, a permanent drying lung for the cavity, and physically incapable of trapping water. The grill bay back gets solid board, pre-attached while its panel lies flat in Phase 1 (no radiant line-of-sight through mesh to the already-scorched vinyl fence). The kamado corner stays cloth: a kamado is a thermos — its ceramic keeps the exterior cool — and the boarded, porcelain-faced backsplash wall already stands between body and fence. The boarded back gets seams taped but NO membrane — it is the drying side by design."},{id:"p3.8d3ca4b3",html:"<p>Tape + thinset all seams and corners (alkali-resistant mesh).</p>",detailsHtml:null,plain:"Tape + thinset all seams and corners (alkali-resistant mesh)."},{id:"p3.cea09442",html:"<p><strong>Waterproofing where it earns its keep:</strong> roll RedGard/AquaDefense on the counter deck (top + back edge) and all faces getting cladding. Two coats, opposing directions.</p>",detailsHtml:null,plain:"Waterproofing where it earns its keep: roll RedGard/AquaDefense on the counter deck (top + back edge) and all faces getting cladding. Two coats, opposing directions."},{id:"p3.22e33324",html:"<p><strong>Flashing:</strong> weep screed at the base perimeter; <strong>Z-flashing across the backsplash top plate</strong>, sloped toward the fence, front edge caulked.</p>",detailsHtml:null,plain:"Flashing: weep screed at the base perimeter; Z-flashing across the backsplash top plate, sloped toward the fence, front edge caulked."},{id:"p3.ebd0e6b4",html:"<p><strong>Vents:</strong> louvered stainless vents low in the toe kick under the grill and at the island ends; back vents work because of the fence air gap. Add the <strong>LP leak detector</strong> low in the propane bay.</p>",detailsHtml:null,plain:"Vents: louvered stainless vents low in the toe kick under the grill and at the island ends; back vents work because of the fence air gap. Add the LP leak detector low in the propane bay."},{id:"p3.00355545",html:"<p>If the shell will sit before cladding: fine in rain, but the membrane doesn&#39;t love months of direct UV — aim to clad within <strong>2–4 months</strong>, and tape/cap the open counter-deck edges in the meantime.</p>",detailsHtml:null,plain:"If the shell will sit before cladding: fine in rain, but the membrane doesn&#39;t love months of direct UV — aim to clad within 2–4 months, and tape/cap the open counter-deck edges in the meantime."}]}]},{kind:"step",stepNo:"3.5",title:"Step 3.5 — The curved wall: faceted board → true radius",slug:"step-35-the-curved-wall-faceted-board-true-radius",blocks:[{type:"html",html:"<p>You&#39;re right that you won&#39;t bend ½&quot; board around that arc, and you don&#39;t need to. The system is: <strong>faceted cement board for the fireproofing, metal lath + mortar for the geometry.</strong> The board is the non-combustible substrate; the lath-and-mortar layer is what actually creates the smooth curve.</p>"},{type:"checklist",ordered:!0,items:[{id:"p3.6519dee3",html:"<p><strong>Skin the arc in ¼&quot; cement board, cut into vertical strips</strong> — one strip per stud bay (your studs are at ~6&quot; o.c. on the arc, so strips run ~6&quot; wide). Each strip is dead flat, spans stud to stud, zero bending stress, impossible to crack. You&#39;re building a polygon that <em>reads</em> as a curve. Two screws per strip per stud with the same Power Pro backer screws.</p>",detailsHtml:`<ul>
<li><em>If you want fewer seams:</em> two alternates from our earlier session — kerf the back of a wider piece every ~1&quot; with a grinder + diamond blade and wrap it, or laminate two ¼&quot; sheets (each bends easily; bonded together with thinset + screws they behave like ½&quot;). The vertical strips are still the most foolproof.</li>
</ul>`,plain:"Skin the arc in ¼&quot; cement board, cut into vertical strips — one strip per stud bay (your studs are at ~6&quot; o.c. on the arc, so strips run ~6&quot; wide). Each strip is dead flat, spans stud to stud, zero bending stress, impossible to crack. You&#39;re building a polygon that reads as a curve. Two screws per strip per stud with the same Power Pro backer screws."},{id:"p3.ca21623e",html:"<p>Pack the facet joints with thinset and tape everything with alkali-resistant mesh.</p>",detailsHtml:null,plain:"Pack the facet joints with thinset and tape everything with alkali-resistant mesh."},{id:"p3.1037b1a8",html:"<p><strong>Staple/screw galvanized expanded-metal lath over the whole arc</strong>, wrapping it continuously — the lath bends to any radius effortlessly, and it&#39;s your true curve former. Overlap laps by 2&quot;+, fasten into every stud. This is your &quot;bendable non-combustible material&quot; — it&#39;s exactly what pros use for curved masonry surfaces; a flexible cement board that does this doesn&#39;t really exist.</p>",detailsHtml:null,plain:"Staple/screw galvanized expanded-metal lath over the whole arc, wrapping it continuously — the lath bends to any radius effortlessly, and it&#39;s your true curve former. Overlap laps by 2&quot;+, fasten into every stud. This is your &quot;bendable non-combustible material&quot; — it&#39;s exactly what pros use for curved masonry surfaces; a flexible cement board that does this doesn&#39;t really exist."},{id:"p3.7e8b9e0d",html:"<p><strong>Trowel a mortar/stucco base coat over the lath</strong> (a polymer-modified base coat or sanded thinset works), screeding to the radius. Make a simple <strong>curved screed template</strong> — a piece of plywood band-sawed to the arc from your SketchUp profile — and drag it around the wall to shave the mortar to a perfect radius. Two thin passes beat one thick one.</p>",detailsHtml:null,plain:"Trowel a mortar/stucco base coat over the lath (a polymer-modified base coat or sanded thinset works), screeding to the radius. Make a simple curved screed template — a piece of plywood band-sawed to the arc from your SketchUp profile — and drag it around the wall to shave the mortar to a perfect radius. Two thin passes beat one thick one."},{id:"p3.26da9233",html:"<p>Once cured, finish however the corner wants: a smooth stucco finish coat as a deliberate accent zone (my lean — a smooth curved band framing the red kamado looks intentional next to the planked flats), or narrow mosaic/picket tile which follows a radius happily. Full-width porcelain planks won&#39;t wrap it — plan the plank field to <em>stop</em> at the curve with a metal trim line, and let the curve be its own material.</p>",detailsHtml:null,plain:"Once cured, finish however the corner wants: a smooth stucco finish coat as a deliberate accent zone (my lean — a smooth curved band framing the red kamado looks intentional next to the planked flats), or narrow mosaic/picket tile which follows a radius happily. Full-width porcelain planks won&#39;t wrap it — plan the plank field to stop at the curve with a metal trim line, and let the curve be its own material."}]},{type:"html",html:"<p>Everything in this stack is non-combustible — cement board, steel lath, mortar — so the kamado&#39;s radiant heat is a non-issue.</p>"},{type:"html",html:"<hr>"}]}]},{num:4,id:"phase-4",title:"Cladding (your step 5)",heading:"Phase 4 — Cladding (your step 5)",sections:[{kind:"intro",stepNo:null,title:null,slug:"phase-4-intro",blocks:[{type:"html",html:"<p><strong>The decision:</strong> wood-look <strong>porcelain plank</strong>, run <strong>vertically</strong> for the reeded look in your renders. One material discipline across the whole build (plank faces + picket backsplash + stone/porcelain top = one wet saw, one thinset, one grout strategy).</p>"}]},{kind:"materials",stepNo:null,title:"Buying specs",slug:"buying-specs",blocks:[{type:"html",html:`<ul>
<li><strong>Rectified</strong> plank (tight, wood-like joints), light driftwood tone per the renders.</li>
<li>Leveling clip system (Tuscan/Raimondi/MLT) — non-negotiable on planks.</li>
<li>Polymer-modified exterior thinset; <strong>epoxy grout</strong> color-matched dead-on to the plank so joints read as reveals.</li>
<li><strong>Schluter-type metal edge trim</strong> (Quadec/Rondec) for outside corners — never miter porcelain corners; trim is faster, tougher, forgiving. (<a href="https://www.schluter.com" target="_blank" rel="noopener">schluter.com</a>)</li>
<li>Buy one extra box as attic stock — dye lots disappear.</li>
<li>Saw check: 48&quot; planks fight a small tabletop wet saw — plan on a rail/bridge saw rental or score-and-snap + grinder for notches.</li>
</ul>`}]},{kind:"section",stepNo:null,title:"Steps",slug:"steps",blocks:[{type:"checklist",ordered:!0,items:[{id:"p4.26c13286",html:"<p><strong>Dry-lay the entire face on the ground first.</strong> Shuffle planks for grain/color variation, reject the ugly ones, decide where door openings land so <strong>door edges fall on grout joints</strong>. This is where the forgiveness lives — audition everything before anything is permanent.</p>",detailsHtml:null,plain:"Dry-lay the entire face on the ground first. Shuffle planks for grain/color variation, reject the ugly ones, decide where door openings land so door edges fall on grout joints. This is where the forgiveness lives — audition everything before anything is permanent."},{id:"p4.7bf4b69c",html:"<p>Snap plumb/level layout lines. Vertical planks, <strong>offset ≤33% — never 50% brick pattern</strong> (plank bow guarantees lippage at 50%; manufacturers warn against it).</p>",detailsHtml:null,plain:"Snap plumb/level layout lines. Vertical planks, offset ≤33% — never 50% brick pattern (plank bow guarantees lippage at 50%; manufacturers warn against it)."},{id:"p4.a1e159f3",html:"<p><strong>Back-butter every plank</strong> + combed thinset on the wall — full coverage.</p>",detailsHtml:null,plain:"Back-butter every plank + combed thinset on the wall — full coverage."},{id:"p4.2496e401",html:"<p>Set with leveling clips; check plane constantly with a straightedge.</p>",detailsHtml:null,plain:"Set with leveling clips; check plane constantly with a straightedge."},{id:"p4.a334f7de",html:"<p>Edge trim bedded in the same thinset pass as the adjoining tile (the perforated leg embeds in the bed — trim and tile go on together, not sequentially).</p>",detailsHtml:null,plain:"Edge trim bedded in the same thinset pass as the adjoining tile (the perforated leg embeds in the bed — trim and tile go on together, not sequentially)."},{id:"p4.ced3a81c",html:"<p>Cure, then epoxy grout. Clean haze aggressively as you go — epoxy haze is forever.</p>",detailsHtml:null,plain:"Cure, then epoxy grout. Clean haze aggressively as you go — epoxy haze is forever."},{id:"p4.182d23e4",html:"<p><strong>Movement joints:</strong> color-matched silicone (not grout) at every change of plane and where cladding meets counter/appliances/trim.</p>",detailsHtml:null,plain:"Movement joints: color-matched silicone (not grout) at every change of plane and where cladding meets counter/appliances/trim."}]},{type:"html",html:"<hr>"}]}]},{num:5,id:"phase-5",title:"Doors & Drawers (your step 6)",heading:"Phase 5 — Doors & Drawers (your step 6)",sections:[{kind:"intro",stepNo:null,title:null,slug:"phase-5-intro",blocks:[{type:"html",html:"<p>This runs as a <strong>parallel bench-work track</strong> — build them any time after framing; hang them after cladding.</p>"}]},{kind:"section",stepNo:null,title:"Doors (no welding)",slug:"doors-no-welding",blocks:[{type:"diagram",file:"diagram-07-door-layers.svg",alt:"Door construction layers"},{type:"checklist",ordered:!0,items:[{id:"p5.6ed593cc",html:"<p><strong>Frame:</strong> 1&quot;×1&quot; aluminum angle or thin-wall 1&quot; square tube, cut on the miter saw with a <strong>non-ferrous blade</strong>. Corners joined with aluminum gusset plates/corner brackets — stainless machine screws + nylock nuts <strong>plus</strong> structural adhesive (3M 5200 / DP420). Add a center rail on anything over ~24&quot;. Size = opening minus an even 1/8–3/16&quot; reveal.</p>",detailsHtml:null,plain:"Frame: 1&quot;×1&quot; aluminum angle or thin-wall 1&quot; square tube, cut on the miter saw with a non-ferrous blade. Corners joined with aluminum gusset plates/corner brackets — stainless machine screws + nylock nuts plus structural adhesive (3M 5200 / DP420). Add a center rail on anything over ~24&quot;. Size = opening minus an even 1/8–3/16&quot; reveal."},{id:"p5.960ecaaf",html:"<p><strong>Backer:</strong> <strong>GoBoard/Wedi foam board</strong>, not cement board — waterproof, bonds porcelain equally well, a fraction of the weight (door weight kills hinges). Bond with thinset/adhesive <strong>and</strong> screw with stainless self-tappers; the bond makes the torsion box.</p>",detailsHtml:null,plain:"Backer: GoBoard/Wedi foam board, not cement board — waterproof, bonds porcelain equally well, a fraction of the weight (door weight kills hinges). Bond with thinset/adhesive and screw with stainless self-tappers; the bond makes the torsion box."},{id:"p5.dea9c60f",html:"<p>Waterproof the backer edges/seams.</p>",detailsHtml:null,plain:"Waterproof the backer edges/seams."},{id:"p5.e64f630e",html:"<p><strong>Hinge prep before tiling.</strong> You want the <strong>European-style opening</strong> — that points at <strong>concealed hinges made for aluminum-frame cabinet doors</strong> (clamp-on type, no 35mm cup bore, 3-way adjustable — search &quot;aluminum frame door concealed hinge&quot; / glass-cabinet hardware category). Piano hinge remains the sag-proof fallback if the clamp-on options don&#39;t suit your frame profile. Final pick happens here at Phase 5 — but either way the <strong>cabinet-side hinge backing was installed back in Phase 1</strong>, so nothing upstream waits on it. Whichever hinge: machine screws + lock nuts into the frame, never self-tappers, for the connection carrying the door&#39;s whole life.</p>",detailsHtml:null,plain:"Hinge prep before tiling. You want the European-style opening — that points at concealed hinges made for aluminum-frame cabinet doors (clamp-on type, no 35mm cup bore, 3-way adjustable — search &quot;aluminum frame door concealed hinge&quot; / glass-cabinet hardware category). Piano hinge remains the sag-proof fallback if the clamp-on options don&#39;t suit your frame profile. Final pick happens here at Phase 5 — but either way the cabinet-side hinge backing was installed back in Phase 1, so nothing upstream waits on it. Whichever hinge: machine screws + lock nuts into the frame, never self-tappers, for the connection carrying the door&#39;s whole life."},{id:"p5.dacfb0e2",html:"<p>Tile the face with the same planks — <strong>edges landing on grout joints</strong> so the reveal hides in a reveal; metal edge trim around the perimeter; epoxy grout.</p>",detailsHtml:null,plain:"Tile the face with the same planks — edges landing on grout joints so the reveal hides in a reveal; metal edge trim around the perimeter; epoxy grout."},{id:"p5.c782a924",html:"<p><strong>Diamond-drill handle holes</strong> through the tile into the frame, sleeve with silicone, through-bolt stainless handles.</p>",detailsHtml:null,plain:"Diamond-drill handle holes through the tile into the frame, sleeve with silicone, through-bolt stainless handles."},{id:"p5.b3df161c",html:"<p>Hang, and dial the reveals even. Outdoor magnetic/roller catch.</p>",detailsHtml:null,plain:"Hang, and dial the reveals even. Outdoor magnetic/roller catch."}]}]},{kind:"section",stepNo:null,title:"Drawers — DIY riveted aluminum (locked, custom sizes)",slug:"drawers-diy-riveted-aluminum-locked-custom-sizes",blocks:[{type:"checklist",ordered:!1,items:[{id:"p5.3e2e821b",html:"<p>Boxes: <strong>.050–.063&quot; aluminum sheet or 3–4mm ACP/Dibond panels</strong>, every corner joined with 1&quot;×1&quot; aluminum angle + <strong>stainless pop rivets</strong> ($25 rivet gun). The angle is the frame; the panel is the skin.</p>",detailsHtml:null,plain:"Boxes: .050–.063&quot; aluminum sheet or 3–4mm ACP/Dibond panels, every corner joined with 1&quot;×1&quot; aluminum angle + stainless pop rivets ($25 rivet gun). The angle is the frame; the panel is the skin."},{id:"p5.d5e67c39",html:"<p>Run <strong>aluminum flat bar/angle along each side at slide height</strong> — solid bite for the slide screws and it stiffens the wall in one move.</p>",detailsHtml:null,plain:"Run aluminum flat bar/angle along each side at slide height — solid bite for the slide screws and it stiffens the wall in one move."},{id:"p5.90552522",html:"<p><strong>Perforated aluminum bottom</strong> so any water drains instead of pooling; <strong>U-channel edge cap</strong> on the top rim (no razor edges, looks finished).</p>",detailsHtml:null,plain:"Perforated aluminum bottom so any water drains instead of pooling; U-channel edge cap on the top rim (no razor edges, looks finished)."},{id:"p5.a7f47425",html:"<p>Boxes land under 10 lb empty → standard <strong>stainless full-extension slides</strong> carry them easily; mount slides to the flat-bar rails and to blocking/angle on the cabinet side.</p>",detailsHtml:null,plain:"Boxes land under 10 lb empty → standard stainless full-extension slides carry them easily; mount slides to the flat-bar rails and to blocking/angle on the cabinet side."},{id:"p5.30dc381d",html:"<p>Cut list tip: size each box to (opening − slide clearance per the slide spec, usually ½&quot; per side) and build the tallest drawer first as your pattern.</p>",detailsHtml:null,plain:"Cut list tip: size each box to (opening − slide clearance per the slide spec, usually ½&quot; per side) and build the tallest drawer first as your pattern."},{id:"p5.bba7d460",html:"<p>The <strong>face</strong> stays easy: tiled ½&quot; cement-board panel (weight is fine here — it rides the slides flat) <strong>through-bolted from inside the box with slotted holes</strong> so you can nudge alignment. No hinges, no frame needed.</p>",detailsHtml:null,plain:"The face stays easy: tiled ½&quot; cement-board panel (weight is fine here — it rides the slides flat) through-bolted from inside the box with slotted holes so you can nudge alignment. No hinges, no frame needed."},{id:"p5.9d3f9f94",html:"<p>Stainless (not aluminum) stays the rule for anything in the firebox surround zone.</p>",detailsHtml:null,plain:"Stainless (not aluminum) stays the rule for anything in the firebox surround zone."}]}]},{kind:"section",stepNo:null,title:"Cabinet interiors",slug:"cabinet-interiors",blocks:[{type:"checklist",ordered:!1,items:[{id:"p5.c50d3f02",html:"<p>Light-colored finish (elastomeric/masonry paint over the cement board) so you can see into them.</p>",detailsHtml:null,plain:"Light-colored finish (elastomeric/masonry paint over the cement board) so you can see into them."},{id:"p5.bb3e114f",html:"<p>Shelves on the blocking you set in Phase 1: stainless wire or marine HDPE are the picks — they drain.</p>",detailsHtml:null,plain:"Shelves on the blocking you set in Phase 1: stainless wire or marine HDPE are the picks — they drain."}]},{type:"html",html:"<hr>"}]}]},{num:6,id:"phase-6",title:"Countertop (your step 8)",heading:"Phase 6 — Countertop (your step 8)",sections:[{kind:"intro",stepNo:null,title:null,slug:"phase-6-intro",blocks:[{type:"html",html:"<p><strong>Locked: light-colored granite, 3cm (1¼&quot; nominal), leathered finish.</strong> The color rule is non-negotiable outdoors — Alaska White / Kashmir White / Colonial White / Bianco Antico class stones stay usable in the sun; anything dark (Black Pearl, Absolute Black) hits 150–170°F and is off the table. Remnant-shop it: budget remnants run $10–18/sq ft material + $600–1,000 fabrication for your ~40 sq ft, landing $1,000–1,800 all-in. The L needs <strong>two pieces with a seam at the corner</strong> — keep the seam away from the sink, and match thickness across both pieces. Sealing habit: twice a year outdoors, $25 bottle, 20 minutes.</p>"}]},{kind:"section",stepNo:null,title:"Steps",slug:"steps",blocks:[{type:"checklist",ordered:!0,items:[{id:"p6.f6488ce9",html:"<p>Template <strong>after</strong> cladding (the finished face is the reference), 31&quot; deep, front overhang over the plank face, rear overhang carrying the backsplash.</p>",detailsHtml:null,plain:"Template after cladding (the finished face is the reference), 31&quot; deep, front overhang over the plank face, rear overhang carrying the backsplash."},{id:"p6.f9633952",html:"<p>Give the fabricator: sink model + template, grill cutout (SL30: 25½ × 20½ / SL36: 32½ × 20½ — locked by then), kamado opening per the Big Joe bui
