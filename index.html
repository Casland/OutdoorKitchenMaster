lt-in chart, seam location. Cutouts need meat around them — this constrains which remnants work; match 3cm across both pieces.</p>",detailsHtml:null,plain:"Give the fabricator: sink model + template, grill cutout (SL30: 25½ × 20½ / SL36: 32½ × 20½ — locked by then), kamado opening per the Big Joe built-in chart, seam location. Cutouts need meat around them — this constrains which remnants work; match 3cm across both pieces."},{id:"p6.4a55a21d",html:"<p>Before install: confirm the deck is level and waterproofed, blocking is flush, and the kamado throat band has its reinforced continuous bearing (the &quot;little shelf&quot; of blocking we detailed — flush to deck, clip-angled into flanking studs, stone fully mortar-bedded over it so it never spans air).</p>",detailsHtml:null,plain:"Before install: confirm the deck is level and waterproofed, blocking is flush, and the kamado throat band has its reinforced continuous bearing (the &quot;little shelf&quot; of blocking we detailed — flush to deck, clip-angled into flanking studs, stone fully mortar-bedded over it so it never spans air)."},{id:"p6.f9077ac2",html:"<p>Set in silicone beds; seam epoxied and color-matched by the fabricator.</p>",detailsHtml:null,plain:"Set in silicone beds; seam epoxied and color-matched by the fabricator."},{id:"p6.c2b1fce0",html:"<p><strong>Counter-to-backsplash joint gets silicone, never grout</strong> — it&#39;s a movement joint.</p>",detailsHtml:null,plain:"Counter-to-backsplash joint gets silicone, never grout — it&#39;s a movement joint."}]},{type:"html",html:"<hr>"}]}]},{num:7,id:"phase-7",title:"Backsplash Tile (your step 9)",heading:"Phase 7 — Backsplash Tile (your step 9)",sections:[{kind:"intro",stepNo:null,title:null,slug:"phase-7-intro",blocks:[{type:"diagram",file:"diagram-08-backsplash-zones.svg",alt:"Backsplash zones at 18 inches"},{type:"html",html:"<p>The framing, board, flashing, and waterproofing are already done — this phase is tile only, <strong>after</strong> the counter so the tile sits on/over the finished surface with a silicone joint.</p>"},{type:"html",html:"<p><strong>Locked: 18&quot; band height, no stainless panel.</strong> The grill heat zone gets <strong>smooth, large-format porcelain</strong> (24&quot;+ faces, minimal grout lines — grout directly behind a grill is a grease trap, so big smooth tile is the wipeable substitute for the stainless we ruled out). <strong>Tile pattern/color stays late-binding</strong> — nothing upstream depends on it; just have it chosen before the counter is templated so the fabricator knows the splash sits on the rear overhang.</p>"}]},{kind:"section",stepNo:null,title:'The zone split at 18" (~18 LF of back wall)',slug:"the-zone-split-at-18-18-lf-of-back-wall",blocks:[{type:"table",html:`<table>
<thead>
<tr>

er</strong> (the sewer-connection rain rule).</p>",detailsHtml:null,plain:"Set the sink in silicone per template; faucet (cold-only), supply hookup to the PEX run, trap + drain connection to the stub, AAV under the counter if that&#39;s your vent plan. Final inspection if applicable. Install/verify the sink cover (the sewer-connection rain rule)."}]}]},{kind:"section",stepNo:null,title:"Fridge",slug:"fridge",blocks:[{type:"checklist",ordered:!1,items:[{id:"p8.370238ce",html:"<p>Slide into its lined cavity onto the level shelf; <strong>front grille completely unobstructed</strong> — no counter lip, face-frame, or trim creeping over it. Cord through the grommeted pass-through to the outlet in the adjacent bay; seal the pass-through.</p>",detailsHtml:null,plain:"Slide into its lined cavity onto the level shelf; front grille completely unobstructed — no counter lip, face-frame, or trim creeping over it. Cord through the grommeted pass-through to the outlet in the adjacent bay; seal the pass-through."}]}]},{kind:"section",stepNo:null,title:"Grill",slug:"grill",blocks:[{type:"checklist",ordered:!1,items:[{id:"p8.6d13fe3b",html:"<p>Drop into the cutout per the Coyote manual — flange bears on the counter, sealed per instructions. Connect propane (tank on the pavers in the open bay), <strong>leak-test every fitting with soapy water</strong>. Plug in the 120V. Confirm the manual&#39;s clearances and (if specified) the insulated jacket.</p>",detailsHtml:null,plain:"Drop into the cutout per the Coyote manual — flange bears on the counter, sealed per instructions. Connect propane (tank on the pavers in the open bay), leak-test every fitting with soapy water. Plug in the 120V. Confirm the manual&#39;s clearances and (if specified) the insulated jacket."}]}]},{kind:"section",stepNo:null,title:"Kamado (Big Joe)",slug:"kamado-big-joe",blocks:[{type:"checklist",ordered:!1,items:[{id:"p8.53668a5e",html:"<p>Assemble in place — it does not fit through openings after the fact, and the ceramic body is a two-strong-people lift minimum (rent/borrow a shoulder dolly or appliance dolly and extra hands).</p>",detailsHtml:null,plain:"Assemble in place — it does not fit through openings after the fact, and the ceramic body is a two-strong-people lift minimum (rent/borrow a shoulder dolly or appliance dolly and extra hands)."},{id:"p8.d2c44cd3",html:"<p>Set it on the <strong>4 ceramic feet</strong> (2 front, 2 back, spaced so it can&#39;t rock when the dome swings) on the cradle deck — the feet create the required under-grill airflow; never flat on the deck.</p>",detailsHtml:null,plain:"Set it on the 4 ceramic feet (2 front, 2 back, spaced so it can&#39;t rock when the dome swings) on the cradle deck — the feet create the required under-grill airflow; never flat on the deck."},{id:"p8.9c44f068",html:"<p>Verify dome swing clears the curved wall/backsplash and the front latch is reachable below counter level.</p>",detailsHtml:null,plain:"Verify dome swing clears the curved wall/backsplash and the front latch is reachable below counter level."},{id:"p8.70c0f982",html:"<p>Swap the Kontrol Tower damper hardware for the <strong>SMOBOT Kamado Joe kit</strong> per its instructions, route its micro-USB to the cradle outlet, and stage the Looftlighter there too.</p>",detailsHtml:null,plain:"Swap the Kontrol Tower damper hardware for the SMOBOT Kamado Joe kit per its instructions, route its micro-USB to the cradle outlet, and stage the Looftlighter there too."}]}]},{kind:"section",stepNo:null,title:"Final punch list",slug:"final-punch-list",blocks:[{type:"checklist",ordered:!1,items:[{id:"p8.3109dfb1",html:"<p>Silicone every change-of-plane joint (counter↔splash, counter↔grill flange, cladding↔trim, tile↔stainless)</p>",detailsHtml:null,plain:"Silicone every change-of-plane joint (counter↔splash, counter↔grill flange, cladding↔trim, tile↔stainless)"},{id:"p8.e7feb523",html:"<p>Weep holes clear in every cabinet floor</p>",detailsHtml:null,plain:"Weep holes clear in every cabinet floor"},{id:"p8.aeeebcb5",html:"<p>Vents unobstructed; LP detector powered/tested</p>",detailsHtml:null,plain:"Vents unobstructed; LP detector powered/tested"},{id:"p8.2637f01d",html:"<p>Seal granite (if granite) — and calendar it twice a year</p>",detailsHtml:null,plain:"Seal granite (if granite) — and calendar it twice a year"},{id:"p8.7de1cdfe",html:"<p><strong>Re-level check after a few weeks loaded + one good rain</strong> — early settlement happens once; catch it, shim/adjust, done for the long haul</p>",detailsHtml:null,plain:"Re-level check after a few weeks loaded + one good rain — early settlement happens once; catch it, shim/adjust, done for the long haul"}]},{type:"html",html:"<hr>"}]}]}],materials:{groups:[{title:"Shell (Phases −1 through 4)",slug:"shell-phases-1-through-4",header:["Category","Items","Est."],rows:[{cells:["Plumbing rough-in","2&quot; ABS drain stub + fittings, 2–3&quot; PVC gas sleeve, PEX + fittings","$70–$150 (tie-in + permit deferred)"],plain:["Plumbing rough-in","2&quot; ABS drain stub + fittings, 2–3&quot; PVC gas sleeve, PEX + fittings","$70–$150 (tie-in + permit deferred)"],isSubtotal:!1},{cells:["Base","PT 2×4 UC3A ×8–10, shims, PL Premium ×2, sill seal, Tapcons","$80–$120"],plain:["Base","PT 2×4 UC3A ×8–10, shims, PL Premium ×2, sill seal, Tapcons","$80–$120"],isSubtotal:!1},{cells:["Frame","~50× 20-ga EQ studs 10&#39; (~$10 ea), ~14× track, TEK screws (2 boxes)","$270–$400"],plain:["Frame","~50× 20-ga EQ studs 10&#39; (~$10 ea), ~14× track, TEK screws (2 boxes)","$270–$400"],isSubtotal:!1},{cells:["Corrosion protection","Cold-galv spray ×2","$30–$50"],plain:["Corrosion protection","Cold-galv spray ×2","$30–$50"],isSubtotal:!1},{cells:["Sheathing","~26 sheets ½&quot; cement board, Power Pro #9×1¼ (925 box), mesh tape, thinset","$400–$550"],plain:["Sheathing","~26 sheets ½&quot; cement board, Power Pro #9×1¼ (925 box), mesh tape, thinset","$400–$550"],isSubtotal:!1},{cells:["Waterproofing/flashing","RedGard/AquaDefense 2 gal, Z-flashing, weep screed, hardware cloth","$170–$250"],plain:["Waterproofing/flashing","RedGard/AquaDefense 2 gal, Z-flashing, weep screed, hardware cloth","$170–$250"],isSubtotal:!1},{cells:["Curved wall","¼&quot; cement board (2 sheets), galvanized expanded-metal lath, base-coat mortar","$60–$110"],plain:["Curved wall","¼&quot; cement board (2 sheets), galvanized expanded-metal lath, base-coat mortar","$60–$110"],isSubtotal:!1},{cells:["Electrical","PVC conduit + offsets + fittings, THWN-2, WP boxes + in-use covers, GFCI devices","$150–$300"],plain:["Electrical","PVC conduit + offsets + fittings, THWN-2, WP boxes + in-use covers, GFCI devices","$150–$300"],isSubtotal:!1},{cells:["Cladding","Wood-look porcelain plank (~135 sq ft faces + waste), thinset, epoxy grout, clips, Schluter trim","$700–$1,400"],plain:["Cladding","Wood-look porcelain plank (~135 sq ft faces + waste), thinset, epoxy grout, clips, Schluter trim","$700–$1,400"],isSubtotal:!1},{cells:["<strong>Shell subtotal</strong>","","<strong>$1,900–$3,450</strong>"],plain:["Shell subtotal","","$1,900–$3,450"],isSubtotal:!0}],extraHtml:""},{title:"Doors, drawers, counter, backsplash (Phases 5–7)",slug:"doors-drawers-counter-backsplash-phases-57",header:["Category","Items","Est."],rows:[{cells:["Doors (DIY)","Aluminum angle/tube, gussets, hardware, GoBoard, hinges, handles, plank tile","$250–$500"],plain:["Doors (DIY)","Aluminum angle/tube, gussets, hardware, GoBoard, hinges, handles, plank tile","$250–$500"],isSubtotal:!1},{cells:["Drawers","Stainless drawer units <em>or</em> aluminum/ACP + rivets + stainless slides, faces","$300–$700"],plain:["Drawers","Stainless drawer units or aluminum/ACP + rivets + stainless slides, faces","$300–$700"],isSubtotal:!1},{cells:["Countertop","Light granite remnant 3cm fabricated (<strong>or</strong> porcelain tile $160–$280 DIY)","$1,000–$1,800"],plain:["Countertop","Light granite remnant 3cm fabricated (or porcelain tile $160–$280 DIY)","$1,000–$1,800"],isSubtotal:!1},{cells:["Backsplash","Feature tile @18&quot; + smooth porcelain heat zone + epoxy grout + trim","$250–$550"],plain:["Backsplash","Feature tile @18&quot; + smooth porcelain heat zone + epoxy grout + trim","$250–$550"],isSubtotal:!1},{cells:["<strong>Subtotal</strong>","","<strong>$1,850–$3,700</strong>"],plain:["Subtotal","","$1,850–$3,700"],isSubtotal:!0}],extraHtml:""},{title:"Appliances (Phase 8)",slug:"appliances-phase-8",header:["Item","Pick","Est."],rows:[{cells:["Grill","Coyote SL LP — 30&quot; (C3SL30-LP ~$3,100) <em>or</em> 36&quot; (C3SL36-LP ~$3,500–3,700) ⚠️","$3,100–$3,700"],plain:["Grill","Coyote SL LP — 30&quot; (C3SL30-LP ~$3,100) or 36&quot; (C3SL36-LP ~$3,500–3,700) ⚠️","$3,100–$3,700"],isSubtotal:!1},{cells:["Kamado","Kamado Joe Big Joe III (standalone, no cart needed)","~$2,200–$2,700"],plain:["Kamado","Kamado Joe Big Joe III (standalone, no cart needed)","~$2,200–$2,700"],isSubtotal:!1},{cells:["Controller + lighter","SMOBOT <strong>Kamado Joe version</strong> ($349) + Looftlighter (~$80)","~$430"],plain:["Controller + lighter","SMOBOT Kamado Joe version ($349) + Looftlighter (~$80)","~$430"],isSubtotal:!1},{cells:["Fridge","Velieta 24&quot; front-vent built-in (or equivalent — frame to the actual cut sheet)","$300–$450"],plain:["Fridge","Velieta 24&quot; front-vent built-in (or equivalent — frame to the actual cut sheet)","$300–$450"],isSubtotal:!1},{cells:["Sink + faucet","Stainless bar sink + cold faucet + cover","$120–$250"],plain:["Sink + faucet","Stainless bar sink + cold faucet + cover","$120–$250"],isSubtotal:!1},{cells:["LP detector, vents, misc","","$80–$150"],plain:["LP detector, vents, misc","","$80–$150"],isSubtotal:!1},{cells:["<strong>Appliance subtotal</strong>","","<strong>$6,200–$7,700</strong>"],plain:["Appliance subtotal","","$6,200–$7,700"],isSubtotal:!0}],extraHtml:""}],totalHtml:"<strong>Project total: roughly $10,100–$15,000</strong> — consistent with the landing zone we set early on; the grill-size decision moves it ~$500, and the granite remnant hunt is the other big lever.<hr>"},toolsHtml:`<p><strong>Own / buy once:</strong> brushless impact driver (the project&#39;s #1 tool), drywall screw gun w/ adjustable nose (TEKs), self-leveling cross-line laser (the #1 factor in a level kitchen — rent or ~$120), 4&#39; box level, aviation snips (L/R/straight set), 4–6 locking C-clamp sheet-metal pliers, speed + framing square, chalk line, silver Sharpie, cut-resistant gloves, safety glasses, deburring tool, caulk gun.</p>
<p><strong>Buy for this project:</strong> carbide metal-cutting miter blade (Diablo Steel Demon class), non-ferrous (aluminum) blade, margin + notched trowels, tile leveling clip system, grout float + epoxy-grout sponges, N95/respirator, step bit, rivet gun (if building drawer boxes), diamond hole saws (handle holes).</p>
<p><strong>Rent:</strong> wet tile saw — get a <strong>rail/bridge saw</strong> for the 48&quot; planks (~$60–90/day), not a tabletop unit.</p>
<hr>`,visualLibraryHtml:`<p><strong>Build diagrams (in this folder — keep the .svg files next to this guide):</strong>
diagram-01 base + finish stack section · diagram-02 conduit offset · diagram-03 track splice + corner · diagram-04 curved wall buildup · diagram-05 kamado cradle · diagram-06 drain stub · diagram-07 door layers · diagram-08 backsplash zones</p>
<p><strong>Manufacturer illustrated guides (print these for the build binder — they cover the generic techniques with legally-reviewed accuracy):</strong></p>
<ul>
<li>Steeler — <a href="https://www.steeler.com/uploads/pdf/sfa_framing_guide_final-2.compressed.pdf" target="_blank" rel="noopener">A Builder&#39;s Guide to Steel Frame Construction</a> — the single best illustrated primer for Phase 1: layout, plumbing walls, corners, fastening</li>
<li>ClarkDietrich — <a href="https://www.clarkdietrich.com/sites/default/files/media/documents/CD_IntroToFraming.pdf" target="_blank" rel="noopener">An Introduction to Cold-Formed Steel Framing</a> — member types, track vs stud, connection basics</li>
<li>CGC/USG — <a href="https://www.usg.com/content/dam/USG_Marketing_Communications/canada/product_promotional_materials/finished_assets/cgc-durock-brand-cement-board-installation-guide-en-CB237.pdf" target="_blank" rel="noopener">Durock Cement Board Installation Guide (illustrated)</a> — score-and-snap, cutouts, fastener spacing (8&quot; o.c., 1¼&quot; screws for 20-ga steel), seam taping, all drawn step-by-step; a condensed version ships with the boards (<a href="http://pdf.lowes.com/howtoguides/081099032585_how.pdf" target="_blank" rel="noopener">Lowe&#39;s copy</a>)</li>
<li>Johns Manville — <a href="https://www.jm.com/content/dam/jm/global/en/tile-backer-boards/GB-001-GoBoard-Installation-Instructions-and-Technical-Data.pdf" target="_blank" rel="noopener">GoBoard Installation Instructions &amp; Technical Data</a> + <a href="https://www.jm.com/en/building-insulation/document-library/goboard/" target="_blank" rel="noopener">GoBoard video library</a> — for the door backers, incl. fastening and edge sealing</li>
<li>Ceramic Grill Store — <a href="https://ceramicgrillstore.com/products/kamado-joe-built-in-dimensions-cutout-guide" target="_blank" rel="noopener">Kamado Joe Built-In Dimensions &amp; Cutout Guide</a> — the A–R dimensioned diagram the cradle gets framed from</li>
<li>Coyote — the SL install manual (packed with the grill / on the product page) contains the exact cutout drawings; frame from those, not from memory</li>
<li>Schluter — <a href="https://www.schluter.com" target="_blank" rel="noopener">profile installation guides + videos</a> for the edge trim details</li>
<li>SFIA — <a href="https://sfia.memberclicks.net/technical-publications" target="_blank" rel="noopener">Technical Guide for Cold-Formed Steel Framing Products</a> — deeper reference (member properties, span data) if you ever want to verify a member choice</li>
</ul>
<p><strong>AI-generated technique illustrations (optional, vibe-only):</strong> prompt pattern that works — &quot;Technical instructional illustration, clean line-art style like an IKEA manual, white background, no text labels. Show [one specific action]. Isometric view, single step, no background clutter.&quot; One step per image; never trust a generated dimension or fastener count.</p>
<hr>`,referenceLinksHtml:`<ul>
<li>Family Handyman — <a href="https://www.familyhandyman.com/project/how-to-plan-and-build-an-outdoor-kitchen/" target="_blank" rel="noopener">How to Build a DIY Outdoor Kitchen</a> (closest analog to this exact build: steel studs, SketchUp, cement board, stone top)</li>

<li>SMOBOT <strong>Kamado Joe version</strong> — <a href="https://smobot.com/products/kamado-joe" target="_blank" rel="noopener">smobot.com/products/kamado-joe</a> ($349 — the standard BGE daisy-wheel kit does NOT fit the Kontrol Tower) · Looftlighter — search &quot;Looftlighter&quot; at your grill retailer</li>
<li>Fridge — <a href="https://www.amazon.com/Refrigerator-Velieta-Stainless-Perfectly-Freestanding/dp/B09H4481MG" target="_blank" rel="noopener">Velieta 24&quot; front-vent built-in/freestanding (Amazon)</a></li>
<li>Schluter edge profiles — <a href="https://www.schluter.com" target="_blank" rel="noopener">schluter.com</a></li>
<li>GoBoard backer — <a href="https://www.jm.com" target="_blank" rel="noopener">Johns Manville GoBoard</a> · RedGard — <a href="https://www.custombuildingproducts.com" target="_blank" rel="noopener">Custom Building Products</a></li>

<li>YouTube searches that beat any single channel: &quot;metal stud framing corners,&quot; &quot;light gauge steel inside corner,&quot; &quot;DIY outdoor kitchen metal stud frame&quot;</li>
</ul>
<hr>`,openDecisionsDoc:{heading:"⚠️ Remaining Open Decisions",introHtml:"<p>Everything else is locked. Only four forks left, none of which block starting the build tomorrow:</p>",items:[{n:1,html:"<p><strong>Grill size — Coyote SL 30&quot; vs 36&quot;.</strong> <em>Deadline: before framing the grill bay</em> (Phase 1, Step 1.6). Everything else in the frame is identical; only that bay&#39;s width and its two flanking studs wait on it. If you&#39;re stuck: re-run the cardboard mockup at 25½&quot; vs 32½&quot; cutout widths on the actual sill once it&#39;s down — seeing it against the real base decides it in five minutes.</p>",plain:"Grill size — Coyote SL 30&quot; vs 36&quot;. Deadline: before framing the grill bay (Phase 1, Step 1.6). Everything else in the frame is identical; only that bay&#39;s width and its two flanking studs wait on it. If you&#39;re stuck: re-run the cardboard mockup at 25½&quot; vs 32½&quot; cutout widths on the actual sill once it&#39;s down — seeing it against the real base decides it in five minutes.",deadline:"before framing the grill bay (Phase 1, Step 1"},{n:2,html:"<p><strong>Backsplash tile.</strong> <em>Deadline: before the counter is templated</em> (Phase 6) so the rear-overhang detail is confirmed — and practically before you order Phase 4 tile if you want one combined tile order. Sea Glass Sage remains my argument next to the red Big Joe.</p>",plain:"Backsplash tile. Deadline: before the counter is templated (Phase 6) so the rear-overhang detail is confirmed — and practically before you order Phase 4 tile if you want one combined tile order. Sea Glass Sage remains my argument next to the red Big Joe.",deadline:"before the counter is templated (Phase 6) so the rear-overhang detail is confirmed — and practically before you order Phase 4 tile if you want one combined tile order"},{n:3,html:"<p><strong>Door hinges.</strong> <em>Deadline: Phase 5, before tiling the door faces.</em> You want the European-look opening → shortlist clamp-on concealed hinges for aluminum-frame doors; piano hinge stays the fallback. The Phase 1 hinge backing supports either, so nothing upstream waits.</p>",plain:"Door hinges. Deadline: Phase 5, before tiling the door faces. You want the European-look opening → shortlist clamp-on concealed hinges for aluminum-frame doors; piano hinge stays the fallback. The Phase 1 hinge backing supports either, so nothing upstream waits.",deadline:"Phase 5, before tiling the door faces"},{n:4,html:"<p><strong>Sewer tie-in timing + permit.</strong> No build deadline — the jug bridges it. The drain start is already laid under the island with a capped end waiting in the yard, so the future trench never touches the built kitchen. When you do it, permitted is cheap insurance relative to the trench labor you&#39;re paying for anyway.</p>",plain:"Sewer tie-in timing + permit. No build deadline — the jug bridges it. The drain start is already laid under the island with a capped end waiting in the yard, so the future trench never touches the built kitchen. When you do it, permitted is cheap insurance relative to the trench labor you&#39;re paying for anyway.",deadline:null}]}},ge=[{id:"D01",num:1,title:"Steel stud framing",status:"locked",alsoOpen:!1,html:`<p><strong>Beat:</strong> CMU/cinder block, brick, wood studs, hybrid CMU+steel.
<strong>Why:</strong> (1) CMU cannot sit on pavers — it needs a poured footing ($400–700 + paver demo), which alone flips the cost comparison: steel shell $650–1,250 vs CMU $1,400–2,500 vs brick $2,900–5,200 in DIY materials. (2) The layout has many precision appliance openings; steel lets you move a stud half an inch with a new screw, block does not. (3) Utilities thread through stud knockouts vs core-drilling masonry. (4) Wood was never seriously in it: combustible framing triggers the grill&#39;s insulated-jacket requirement and rots. Steel + cement board is a non-combustible assembly by definition.</p>`,plain:"Beat: CMU/cinder block, brick, wood studs, hybrid CMU+steel. Why: (1) CMU cannot sit on pavers — it needs a poured footing ($400–700 + paver demo), which alone flips the cost comparison: steel shell $650–1,250 vs CMU $1,400–2,500 vs brick $2,900–5,200 in DIY materials. (2) The layout has many precision appliance openings; steel lets you move a stud half an inch with a new screw, block does not. (3) Utilities thread through stud knockouts vs core-drilling masonry. (4) Wood was never seriously in it: combustible framing triggers the grill&#39;s insulated-jacket requirement and rots. Steel + cement board is a non-combustible assembly by definition.",phases:[1]},{id:"D02",num:2,title:`20-gauge EQ studs, 3-5/8", 10' sticks`,status:"locked",alsoOpen:!1,html:`<p><strong>Beat:</strong> 25-gauge interior studs.
<strong>Why:</strong> Coastal San Diego air + outdoor life; 25-ga is an interior drywall product. EQ label reads -18/-19/-20/-23 mil (avoid -14/-16). 10&#39; sticks yield three ~33&quot; studs each. Buy from supply yards (J&amp;B El Cajon / Westside Sorrento Valley), not big-box; TEK screws online/Fastenal.</p>`,plain:"Beat: 25-gauge interior studs. Why: Coastal San Diego air + outdoor life; 25-ga is an interior drywall product. EQ label reads -18/-19/-20/-23 mil (avoid -14/-16). 10&#39; sticks yield three ~33&quot; studs each. Buy from supply yards (J&amp;B El Cajon / Westside Sorrento Valley), not big-box; TEK screws online/Fastenal.",phases:[1]},{id:"D03",num:3,title:"PT 2×4 sill on shims, directly on pavers",status:"locked",alsoOpen:!1,html:`<p><strong>Beat:</strong> adjustable pedestals under a PT sleeper; pedestals alone.
<strong>Why:</strong> Simpler, cheaper, anchors directly to pavers (Tapcons = the shear connection to earth). Shims pack UP to a laser datum from the pavers&#39; high point — never grind down. Non-negotiables that ride with it: closed-cell sill seal between PT and steel (ACQ-treated lumber corrodes galvanized steel), G185/stainless for any fastener touching PT, PL Premium bedding.</p>`,plain:"Beat: adjustable pedestals under a PT sleeper; pedestals alone. Why: Simpler, cheaper, anchors directly to pavers (Tapcons = the shear connection to earth). Shims pack UP to a laser datum from the pavers&#39; high point — never grind down. Non-negotiables that ride with it: closed-cell sill seal between PT and steel (ACQ-treated lumber corrodes galvanized steel), G185/stainless for any fastener touching PT, PL Premium bedding.",phases:[0]},{id:"D04",num:4,title:'Stud length 32-13/16"',status:"locked",alsoOpen:!1,html:"<p><strong>Formula:</strong> 34&quot; − counter thickness. Counter locked at 3cm granite (1-3/16&quot; actual). Stack: paver → shims → PT (1.5&quot;) → sill seal → track → stud → track → ½&quot; deck board → granite = 36&quot; finished. Dry-stack one test sandwich before gang-cutting fifty.</p>",plain:"Formula: 34&quot; − counter thickness. Counter locked at 3cm granite (1-3/16&quot; actual). Stack: paver → shims → PT (1.5&quot;) → sill seal → track → stud → track → ½&quot; deck board → granite = 36&quot; finished. Dry-stack one test sandwich before gang-cutting fifty.",phases:[1]},{id:"D05",num:5,title:"Counter: light leathered 3cm granite remnant",status:"locked",alsoOpen:!1,html:`<p><strong>Beat:</strong> dark granite, quartz, porcelain tile top, Dekton, poured concrete.
<strong>Why:</strong> Surface temperature in San Diego sun was the deciding factor — dark stone hits 150–170°F (unusable, and the owner has kids); quartz resin fails under UV (hard no outdoors). Light granite (Alaska White / Kashmir White class) stays usable, is impact-tough, and remnant-shops to $1,000–1,800 fabricated for ~40 sq ft. Porcelain tile was the strong budget runner-up (&lt;$300 DIY, coolest surface, tile-level repairability). L needs two pieces, seam at the corner, away from the sink; seal twice a year.</p>`,plain:"Beat: dark granite, quartz, porcelain tile top, Dekton, poured concrete. Why: Surface temperature in San Diego sun was the deciding factor — dark stone hits 150–170°F (unusable, and the owner has kids); quartz resin fails under UV (hard no outdoors). Light granite (Alaska White / Kashmir White class) stays usable, is impact-tough, and remnant-shops to $1,000–1,800 fabricated for ~40 sq ft. Porcelain tile was the strong budget runner-up (&lt;$300 DIY, coolest surface, tile-level repairability). L needs two pieces, seam at the corner, away from the sink; seal twice a year.",phases:[6]},{id:"D06",num:6,title:"Cladding: wood-look porcelain plank, vertical",status:"locked",alsoOpen:!1,html:`<p><strong>Beat (in order of elimination):</strong> faux stone panels ($~2,000, $12.50/sq ft, bad 1.5-row cut math at 36&quot; height), cultured stone, natural stone veneer, stucco (cheapest and SoCal-native — eliminated only by aesthetics), real wood (teak/ipe/thermo-ash).
<strong>Why:</strong> The owner&#39;s renders converged on a weathered-driftwood wood aesthetic. Real wood silvering naturally was considered eyes-open, but coastal UV/salt maintenance lost to porcelain physics: the plank gives the exact look with tile durability. Install law: rectified tile, leveling clips (non-negotiable on planks), offset ≤33% — NEVER 50% brick pattern (plank bow guarantees lippage; manufacturers warn against it), back-butter everything, epoxy grout dead-matched to plank so joints read as reveals, Schluter-type metal trim at outside corners (never miter porcelain). Bonus that sealed the deal: the whole project collapsed to ONE material discipline — plank faces + picket backsplash + stone top = one wet saw rental, one thinset system, one grout strategy.</p>`,plain:"Beat (in order of elimination): faux stone panels ($~2,000, $12.50/sq ft, bad 1.5-row cut math at 36&quot; height), cultured stone, natural stone veneer, stucco (cheapest and SoCal-native — eliminated only by aesthetics), real wood (teak/ipe/thermo-ash). Why: The owner&#39;s renders converged on a weathered-driftwood wood aesthetic. Real wood silvering naturally was considered eyes-open, but coastal UV/salt maintenance lost to porcelain physics: the plank gives the exact look with tile durability. Install law: rectified tile, leveling clips (non-negotiable on planks), offset ≤33% — NEVER 50% brick pattern (plank bow guarantees lippage; manufacturers warn against it), back-butter everything, epoxy grout dead-matched to plank so joints read as reveals, Schluter-type metal trim at outside corners (never miter porcelain). Bonus that sealed the deal: the whole project collapsed to ONE material discipline — plank faces + picket backsplash + stone top = one wet saw rental, one thinset system, one grout strategy.",phases:[4]},{id:"D07",num:7,title:"Doors: aluminum frame + GoBoard + plank face (hinge type )",status:"locked",alsoOpen:!0,html:`<p><strong>Beat:</strong> stainless doors (abandons the seamless look), minimizing doors in favor of drawers, cement-board-backed doors.
<strong>Why:</strong> Preserves &quot;handles emerging from a continuous wood face.&quot; Bolt-and-bond frames (1×1 tube/angle, gussets, SS machine screws + DP420 structural adhesive — no welding). GoBoard over cement board because door WEIGHT kills hinges and foam board bonds porcelain equally well. Door edges land on grout joints so the reveal hides in a reveal. <strong>Open:</strong> owner wants Euro-style opening → clamp-on concealed hinges for aluminum frames preferred; stainless piano hinge is the sag-proof fallback. Decide at Phase 5; the Phase 1 hinge backing supports either.</p>`,plain:"Beat: stainless doors (abandons the seamless look), minimizing doors in favor of drawers, cement-board-backed doors. Why: Preserves &quot;handles emerging from a continuous wood face.&quot; Bolt-and-bond frames (1×1 tube/angle, gussets, SS machine screws + DP420 structural adhesive — no welding). GoBoard over cement board because door WEIGHT kills hinges and foam board bonds porcelain equally well. Door edges land on grout joints so the reveal hides in a reveal. Open: owner wants Euro-style opening → clamp-on concealed hinges for aluminum frames preferred; stainless piano hinge is the sag-proof fallback. Decide at Phase 5; the Phase 1 hinge backing supports either.",phases:[5]},{id:"D08",num:8,title:"Drawers: DIY riveted aluminum boxes",status:"locked",alsoOpen:!1,html:`<p><strong>Beat:</strong> pre-made stainless drawer units.
<strong>Why:</strong> Custom sizes required. .050–.063&quot; sheet or 3–4mm ACP, 1×1 angle corners + stainless pop rivets, flat-bar rails at slide height, perforated bottoms (drainage), U-channel rim. Under 10 lb empty → standard stainless full-extension slides. Faces: tiled cement-board panels through-bolted with slotted holes for alignment.</p>`,plain:"Beat: pre-made stainless drawer units. Why: Custom sizes required. .050–.063&quot; sheet or 3–4mm ACP, 1×1 angle corners + stainless pop rivets, flat-bar rails at slide height, perforated bottoms (drainage), U-channel rim. Under 10 lb empty → standard stainless full-extension slides. Faces: tiled cement-board panels through-bolted with slotted holes for alignment.",phases:[5]},{id:"D09",num:9,title:"Kamado: Big Joe + SMOBOT (KJ version) + Looftlighter",status:"locked",alsoOpen:!1,html:`<p><strong>Beat:</strong> Konnected Joe (built-in ignition/app), BGE XL + SMOBOT, BGE XL + Flame Boss 500, built-in pellet grills.
<strong>Why:</strong> &quot;Architecture over app.&quot; SMOBOT is the only controller with no blower fan — a motorized top damper that preserves the kamado&#39;s natural draft and tested ~30% better charcoal life vs forced-air. Looftlighter covers the manual-ignition gap in ~10 minutes of active work. Big Joe won the body decision for cooking area. <strong>Critical purchase note:</strong> order the SMOBOT Kamado Joe version (~$349) — the standard BGE daisy-wheel kit does NOT fit the Kontrol Tower. Built-in requires 4 ceramic feet (airflow); dimension the cradle from the Ceramic Grill Store A–R chart; shelf sits below counter so band/latch stay reachable; assemble in place (never fits later).</p>`,plain:"Beat: Konnected Joe (built-in ignition/app), BGE XL + SMOBOT, BGE XL + Flame Boss 500, built-in pellet grills. Why: &quot;Architecture over app.&quot; SMOBOT is the only controller with no blower fan — a motorized top damper that preserves the kamado&#39;s natural draft and tested ~30% better charcoal life vs forced-air. Looftlighter covers the manual-ignition gap in ~10 minutes of active work. Big Joe won the body decision for cooking area. Critical purchase note: order the SMOBOT Kamado Joe version (~$349) — the standard BGE daisy-wheel kit does NOT fit the Kontrol Tower. Built-in requires 4 ceramic feet (airflow); dimension the cradle from the Ceramic Grill Store A–R chart; shelf sits below counter so band/latch stay reachable; assemble in place (never fits later).",phases:[1,8]},{id:"D10",num:10,title:"Pellet smoker: rejected from the island; extension-friendly end wall instead",status:"locked",alsoOpen:!1,html:"<p><strong>Why:</strong> Built-in pellet market is thin and a smoke-flavor downgrade vs the owner&#39;s Woodwind Pro (dedicated smoke box); freestanding integration creates an ugly counter-height mismatch. The lasting design consequence: the island&#39;s end wall is a CLEAN BUTT-JOINT TERMINATION — no wrapped finish requiring demolition — so a future extension bay is a 15-minute planning decision that already happened.</p>",plain:"Why: Built-in pellet market is thin and a smoke-flavor downgrade vs the owner&#39;s Woodwind Pro (dedicated smoke box); freestanding integration creates an ugly counter-height mismatch. The lasting design consequence: the island&#39;s end wall is a CLEAN BUTT-JOINT TERMINATION — no wrapped finish requiring demolition — so a future extension bay is a 15-minute planning decision that already happened.",phases:[1]},{id:"D11",num:11,title:'Grill: Coyote SL series (30" vs 36", LP vs NG)',status:"open",alsoOpen:!1,html:"<p><strong>Cutouts:</strong> SL30 25½&quot;W / SL36 32½&quot;W, both × 20½&quot;D × 10¼&quot;H, +~1&quot; swap margin. <strong>Deadline:</strong> before framing the grill bay; everything else in the frame is identical. Method: cardboard mockup on the real sill. <strong>Fuel:</strong> ships fuel-specific. Gas tie-in a year+ out → order LP, budget the LP→NG conversion kit (~$60–100 + an hour of installer time). Tie-in imminent → order NG outright. Detection flips at conversion: propane sinks (detector low), NG rises (add high).</p>",plain:"Cutouts: SL30 25½&quot;W / SL36 32½&quot;W, both × 20½&quot;D × 10¼&quot;H, +~1&quot; swap margin. Deadline: before framing the grill bay; everything else in the frame is identical. Method: cardboard mockup on the real sill. Fuel: ships fuel-specific. Gas tie-in a year+ out → order LP, budget the LP→NG conversion kit (~$60–100 + an hour of installer time). Tie-in imminent → order NG outright. Detection flips at conversion: propane sinks (detector low), NG rises (add high).",phases:[1,8]},{id:"D12",num:12,title:'Fridge: Velieta 24" front-vent built-in-capable',status:"locked",alsoOpen:!1,html:"<p><strong>Why:</strong> Verified front-venting, compressor-based, adjustable feet — the three requirements for a built-in cavity. Honest framing: ~$350 is not Blaze-tier; the lined cavity gives it a sheltered life, and the standard 24&quot; bay means any future replacement drops in. Frame the cavity to the actual cut sheet on arrival. Outlet in the ADJACENT bay (never behind the fridge), grommeted cord pass-through, sealed.</p>",plain:"Why: Verified front-venting, compressor-based, adjustable feet — the three requirements for a built-in cavity. Honest framing: ~$350 is not Blaze-tier; the lined cavity gives it a sheltered life, and the standard 24&quot; bay means any future replacement drops in. Frame the cavity to the actual cut sheet on arrival. Outlet in the ADJACENT bay (never behind the fridge), grommeted cord pass-through, sealed.",phases:[1,8]},{id:"D13",num:13,title:'Backsplash: 18" band, heat-zoned, no stainless (tile choice )',status:"locked",alsoOpen:!0,html:"<p><strong>Why:</strong> Grout behind a grill is a grease trap → the ~4&#39; grill zone gets smooth 24&quot;+ light porcelain (the wipeable substitute for the stainless panel the owner ruled out). ~3&#39; kamado corner smooth; ~11&#39; feature tile. Epoxy grout one shade darker than instinct; silicone (never grout) at the counter joint and every material change; porcelain/glass only behind cook surfaces. <strong>Open:</strong> which of four rendered comps — Sea Glass Sage is the standing recommendation next to the red kamado; the SketchUp currently wears Coastal Slate Blue. Deadline: before counter templating.</p>",plain:"Why: Grout behind a grill is a grease trap → the ~4&#39; grill zone gets smooth 24&quot;+ light porcelain (the wipeable substitute for the stainless panel the owner ruled out). ~3&#39; kamado corner smooth; ~11&#39; feature tile. Epoxy grout one shade darker than instinct; silicone (never grout) at the counter joint and every material change; porcelain/glass only behind cook surfaces. Open: which of four rendered comps — Sea Glass Sage is the standing recommendation next to the red kamado; the SketchUp currently wears Coastal Slate Blue. Deadline: before counter templating.",phases:[7]},{id:"D14",num:14,title:"Back wall: hardware cloth everywhere EXCEPT the boarded grill bay",status:"locked",alsoOpen:!1,html:`<p><strong>History:</strong> started as &quot;cement board everywhere&quot;; became &quot;cloth everywhere&quot; (ventilation + no rear access against the fence); finalized as zoned after two owner challenges.
<strong>Why cloth wins generally:</strong> open mesh cannot trap water; the back becomes the cavity&#39;s permanent drying lung; pest exclusion; installs from the front. Corrosion logic: TIME-OF-WETNESS kills galvanizing, not wetting frequency — vertical studs in a ventilated cavity dry in an hour; a sealed cavity that ever leaks stays humid for days. <strong>Why the grill bay is the exception:</strong> the under-grill zone must not have radiant line-of-sight through mesh to the already-scorched vinyl fence; back board pre-attached at tilt-up (a flat panel has a reachable back; a standing one never does again). <strong>Why the kamado corner stays cloth (owner&#39;s call, correct):</strong> ceramic kamados are thermoses — low exterior radiation — and the boarded, porcelain-faced backsplash wall already stands between body and fence.</p>`,plain:"History: started as &quot;cement board everywhere&quot;; became &quot;cloth everywhere&quot; (ventilation + no rear access against the fence); finalized as zoned after two owner challenges. Why cloth wins generally: open mesh cannot trap water; the back becomes the cavity&#39;s permanent drying lung; pest exclusion; installs from the front. Corrosion logic: TIME-OF-WETNESS kills galvanizing, not wetting frequency — vertical studs in a ventilated cavity dry in an hour; a sealed cavity that ever leaks stays humid for days. Why the grill bay is the exception: the under-grill zone must not have radiant line-of-sight through mesh to the already-scorched vinyl fence; back board pre-attached at tilt-up (a flat panel has a reachable back; a standing one never does again). Why the kamado corner stays cloth (owner&#39;s call, correct): ceramic kamados are thermoses — low exterior radiation — and the boarded, porcelain-faced backsplash wall already stands between body and fence.",phases:[3]},{id:"D15",num:15,title:"Grill bay: fully boarded compartment, SINGLE layer",status:"locked",alsoOpen:!1,html:`<p><strong>Superseded:</strong> double ½&quot; board + Rockwool (owner challenged: &quot;who actually recommends this?&quot; — nobody; deleted).
<strong>Why single is correct:</strong> steel + cement board is a non-combustible assembly (ASTM E136) — the entire requirement. Double layers and the &quot;insulated jacket&quot; solve combustible-island problems this build doesn&#39;t have. <strong>Why boarded sides (both flanking partitions):</strong> stops firebox heat + grease vapor migrating into adjacent storage (door backers are polyiso foam), defines the compartment so the manual&#39;s ventilation-area math means something (LP compartments have explicit vent rules — low openings, propane sinks), and stiffens the partitions carrying counter at the cutout. Bare board, taped, no membrane, no tile. Rockwool demoted to a 10-minute retrofit IF an adjacent bay ever runs warm.</p>`,plain:"Superseded: double ½&quot; board + Rockwool (owner challenged: &quot;who actually recommends this?&quot; — nobody; deleted). Why single is correct: steel + cement board is a non-combustible assembly (ASTM E136) — the entire requirement. Double layers and the &quot;insulated jacket&quot; solve combustible-island problems this build doesn&#39;t have. Why boarded sides (both flanking partitions): stops firebox heat + grease vapor migrating into adjacent storage (door backers are polyiso foam), defines the compartment so the manual&#39;s ventilation-area math means something (LP compartments have explicit vent rules — low openings, propane sinks), and stiffens the partitions carrying counter at the cutout. Bare board, taped, no membrane, no tile. Rockwool demoted to a 10-minute retrofit IF an adjacent bay ever runs warm.",phases:[3]},{id:"D16",num:16,title:"Track weep holes (owner-originated)",status:"locked",alsoOpen:!1,html:"<p><strong>Why:</strong> The bottom track is a U-channel gutter with no outlet — cavity water pools and standing water eats galvanizing. Fix: ¼&quot; holes at the bottom of the BACK flange at the web corner, 1–2 per stud bay, every run, drilled on sawhorses. Works because the track&#39;s back flange slightly overhangs the PT (the FRONT flange is the flush one) → water exits sideways into the fence air gap onto open paver. Deburr + cold-galv every hole. Third instance of the &quot;never give water a place to sit&quot; principle.</p>",plain:"Why: The bottom track is a U-channel gutter with no outlet — cavity water pools and standing water eats galvanizing. Fix: ¼&quot; holes at the bottom of the BACK flange at the web corner, 1–2 per stud bay, every run, drilled on sawhorses. Works because the track&#39;s back flange slightly overhangs the PT (the FRONT flange is the flush one) → water exits sideways into the fence air gap onto open paver. Deburr + cold-galv every hole. Third instance of the &quot;never give water a place to sit&quot; principle.",phases:[1]},{id:"D17",num:17,title:"Base/finish geometry (owner-corrected)",status:"locked",alsoOpen:!1,html:"<p>Track front flange flush with the PT FRONT face; stud web spans the full track interior. The finish stack (½&quot; board + ~3/16&quot; thinset + ~3/8&quot; plank ≈ 1&quot; proud of the stud face) drops PAST track and sill to a weep screed ~½&quot; above the pavers — no wood visible at grade. Counter overhang, door reveals, and corner trim all reference the FINISHED face. See diagram-01.</p>",plain:"Track front flange flush with the PT FRONT face; stud web spans the full track interior. The finish stack (½&quot; board + ~3/16&quot; thinset + ~3/8&quot; plank ≈ 1&quot; proud of the stud face) drops PAST track and sill to a weep screed ~½&quot; above the pavers — no wood visible at grade. Counter overhang, door reveals, and corner trim all reference the FINISHED face. See diagram-01.",phases:[0,4]},{id:"D18",num:18,title:"Drain: Option C, real pipe now, seated HIGH",status:"locked",alsoOpen:!1,html:`<p><strong>History:</strong> full trench-to-sewer now → exposed fence run → stub-out (Option C) → matured into laying the actual first feet of drain.
<strong>Why:</strong> Plumbers assessed the house cleanout as shallow for the distance — the fall budget is TIGHT — so elevation is banked everywhere: 2&quot; pipe (not 3&quot;: smaller pipe = higher invert = more fall to spend) seated directly beneath the pavers, trap arm exiting high (~18–20&quot;). 2&quot; ABS DWV, long-sweep 90 (never a vent elbow — the riser doubles as rodding access once the trap is pulled), riser capped 6–8&quot; proud until trim-out, yard end capped at grade + photographed. Interim: sealed 5–7 gal jug with bulkhead fitting under the sink. Fallback ladder if the math fails: fence-run route (+~1 ft elevation) → utility drain pump (~$150–300, pressurized discharge runs uphill, problem ceases to exist). Tie-in math: fall available = trap height + cleanout invert depth; needed = run × ¼&quot;/ft. Sewer tie-in should be permitted when it happens ⚠️.</p>`,plain:"History: full trench-to-sewer now → exposed fence run → stub-out (Option C) → matured into laying the actual first feet of drain. Why: Plumbers assessed the house cleanout as shallow for the distance — the fall budget is TIGHT — so elevation is banked everywhere: 2&quot; pipe (not 3&quot;: smaller pipe = higher invert = more fall to spend) seated directly beneath the pavers, trap arm exiting high (~18–20&quot;). 2&quot; ABS DWV, long-sweep 90 (never a vent elbow — the riser doubles as rodding access once the trap is pulled), riser capped 6–8&quot; proud until trim-out, yard end capped at grade + photographed. Interim: sealed 5–7 gal jug with bulkhead fitting under the sink. Fallback ladder if the math fails: fence-run route (+~1 ft elevation) → utility drain pump (~$150–300, pressurized discharge runs uphill, problem ceases to exist). Tie-in math: fall available = trap height + cleanout invert depth; needed = run × ¼&quot;/ft. Sewer tie-in should be permitted when it happens ⚠️.",phases:[-1,8]},{id:"D19",num:19,title:"Gas: straight sleeve crossing + interior CSST routing",status:"locked",alsoOpen:!1,html:"<p><strong>Why a sleeve (not real pipe like the drain):</strong> pressurized fuel gets installed, pressure-tested, and inspected as ONE operation by the installer; gravity wastewater doesn&#39;t. <strong>Why straight is fine:</strong> the future line is CSST, which bends by hand at the sleeve exit — rigid pipe needed the glued sweep, flexible pipe IS the bend. 18–24&quot; of 2&quot; PVC crossing only the seam, emerging beside the drain riser with vertical headroom. <strong>Interior routing:</strong> through the back wall&#39;s CENTERED stud-web knockouts — inside the wall plane, behind drawer travel by definition; centered in a 3-5/8&quot; web = 1.5&quot;+ from either face, beyond 1¼&quot; screw reach → no strike plates on the knockout run (plates only where the line leaves center: the rise and the grill-bay turn). Grommets at every knockout regardless (abrasion ≠ strike). CSST gets bonded per manufacturer. <strong>Corner chase:</strong> 1¼–1½&quot; PVC pre-installed through the kamado corner&#39;s knockouts during framing — once the cradle carries 400 lb of ceramic against the fence, that corner is blind forever. <strong>Pre-run declined by default:</strong> the island&#39;s interior stays accessible for life, so pre-running buys little and risks construction damage to untested line; if done anyway, Home-Flex (DIY-sold CSST), installer buy-in confirmed first, gauge-tee pressure test before and after.</p>",plain:"Why a sleeve (not real pipe like the drain): pressurized fuel gets installed, pressure-tested, and inspected as ONE operation by the installer; gravity wastewater doesn&#39;t. Why straight is fine: the future line is CSST, which bends by hand at the sleeve exit — rigid pipe needed the glued sweep, flexible pipe IS the bend. 18–24&quot; of 2&quot; PVC crossing only the seam, emerging beside the drain riser with vertical headroom. Interior routing: through the back wall&#39;s CENTERED stud-web knockouts — inside the wall plane, behind drawer travel by definition; centered in a 3-5/8&quot; web = 1.5&quot;+ from either face, beyond 1¼&quot; screw reach → no strike plates on the knockout run (plates only where the line leaves center: the rise and the grill-bay turn). Grommets at every knockout regardless (abrasion ≠ strike). CSST gets bonded per manufacturer. Corner chase: 1¼–1½&quot; PVC pre-installed through the kamado corner&#39;s knockouts during framing — once the cradle carries 400 lb of ceramic against the fence, that corner is blind forever. Pre-run declined by default: the island&#39;s interior stays accessible for life, so pre-running buys little and risks construction damage to untested line; if done anyway, Home-Flex (DIY-sold CSST), installer buy-in confirmed first, gauge-tee pressure test before and after.",phases:[-1,1]},{id:"D20",num:20,title:"Third pipe: universal spare chase",status:"locked",alsoOpen:!1,html:"<p><strong>Why:</strong> Empty conduit under a permanent structure is never wasted (future lighting, circuit, irrigation, water). The stated goal (hot water) has a better answer: a point-of-use heater at the sink (2.5-gal mini-tank, ~1440W/12A on the existing cold line + sink circuit, hot in seconds, zero trenching) — remember this probable appliance when weighing Phase 2 circuit loading. <strong>Trench order across the seam: drain, spare, gas</strong> — inches of sand between, nothing touching, gas OUTERMOST so no future dig at a water line crosses it.</p>",plain:"Why: Empty conduit under a permanent structure is never wasted (future lighting, circuit, irrigation, water). The stated goal (hot water) has a better answer: a point-of-use heater at the sink (2.5-gal mini-tank, ~1440W/12A on the existing cold line + sink circuit, hot in seconds, zero trenching) — remember this probable appliance when weighing Phase 2 circuit loading. Trench order across the seam: drain, spare, gas — inches of sand between, nothing touching, gas OUTERMOST so no future dig at a water line crosses it.",phases:[-1,2]},{id:"D21",num:21,title:"Electrical: two 20A circuits, conduit + THWN-2",status:"locked",alsoOpen:!1,html:"<p>Fridge dedicated (refrigeration hates sharing with a tripping GFCI); grill + kamado + sink convenience on the second. GFCI everything; weatherproof in-use covers. Conduit throughout (island interior = damp/wet location; no Romex/UF). Existing stubs relocated with PVC offset fittings BELOW track level, rising inside stud bays — never notch the cement board at grade. Rough-in happens DURING framing (before board closes faces); only device trim is late. Splices in an accessible j-box (fridge cavity hub).</p>",plain:"Fridge dedicated (refrigeration hates sharing with a tripping GFCI); grill + kamado + sink convenience on the second. GFCI everything; weatherproof in-use covers. Conduit throughout (island interior = damp/wet location; no Romex/UF). Existing stubs relocated with PVC offset fittings BELOW track level, rising inside stud bays — never notch the cement board at grade. Rough-in happens DURING framing (before board closes faces); only device trim is late. Splices in an accessible j-box (fridge cavity hub).",phases:[0,2,8]},{id:"D22",num:22,title:"Curved kamado corner: alive",status:"locked",alsoOpen:!1,html:"<p><strong>System:</strong> curved track (snip flanges every 1–2&quot;, bend web), studs ~6&quot; o.c. on the arc, ¼&quot; cement board in VERTICAL STRIPS one per bay (flat facets, zero bending stress — you cannot meaningfully bend cement board), galvanized expanded-metal lath wrapped continuously (the actual bendable non-combustible material; this is how pros curve masonry), mortar base coat screeded to true radius with a plywood template cut from the SketchUp arc. Finish: smooth stucco band as a deliberate accent framing the red kamado — planks stop at a trim line (they won&#39;t wrap the radius). Everything in the stack is non-combustible.</p>",plain:"System: curved track (snip flanges every 1–2&quot;, bend web), studs ~6&quot; o.c. on the arc, ¼&quot; cement board in VERTICAL STRIPS one per bay (flat facets, zero bending stress — you cannot meaningfully bend cement board), galvanized expanded-metal lath wrapped continuously (the actual bendable non-combustible material; this is how pros curve masonry), mortar base coat screeded to true radius with a plywood template cut from the SketchUp arc. Finish: smooth stucco band as a deliberate accent framing the red kamado — planks stop at a trim line (they won&#39;t wrap the radius). Everything in the stack is non-combustible.",phases:[1,3]},{id:"D23",num:23,title:"Footprint & ergonomics",status:"locked",alsoOpen:!1,html:"<p>36&quot; finished counter height; 31&quot; counter depth (30&quot; usable + rear overhang carrying the backsplash so it doesn&#39;t eat usable depth); island held 1.5–2&quot; off the vinyl fence (heat + conduit + functional back vents); propane tank on pavers in the open under-grill bay with toe-kick venting and LP detector LOW.</p>",plain:"36&quot; finished counter height; 31&quot; counter depth (30&quot; usable + rear overhang carrying the backsplash so it doesn&#39;t eat usable depth); island held 1.5–2&quot; off the vinyl fence (heat + conduit + functional back vents); propane tank on pavers in the open under-grill bay with toe-kick venting and LP detector LOW.",phases:[0,6]},{id:"D24",num:24,title:"Waterproofing philosophy",status:"locked",alsoOpen:!1,html:"<p>Membrane (RedGard/AquaDefense) only where it earns its keep: counter deck + clad faces. Boarded back sections get NO membrane (they&#39;re the drying side). Z-flashing across the backsplash top, weep screed at cladding base, sloped cabinet floors to weep holes, sealed penetrations. UV clock: clad within 2–4 months of membrane application (UV degrades it; rain doesn&#39;t).</p>",plain:"Membrane (RedGard/AquaDefense) only where it earns its keep: counter deck + clad faces. Boarded back sections get NO membrane (they&#39;re the drying side). Z-flashing across the backsplash top, weep screed at cladding base, sloped cabinet floors to weep holes, sealed penetrations. UV clock: clad within 2–4 months of membrane application (UV degrades it; rain doesn&#39;t).",phases:[3]},{id:"D25",num:25,title:"Build order corrections",status:"locked",alsoOpen:!1,html:"<p>The owner&#39;s original 10-step order had two fixes: plumbing rough-in moved FIRST (can&#39;t trench under a built kitchen; underground work wants inspection before covering), and electrical rough-in moved from step 7 to DURING framing (boxes and conduit go through open studs; you can&#39;t fish a closed island). Countertop-before-backsplash was already correct (tile sits over the finished counter with a silicone joint).</p>",plain:"The owner&#39;s original 10-step order had two fixes: plumbing rough-in moved FIRST (can&#39;t trench under a built kitchen; underground work wants inspection before covering), and electrical rough-in moved from step 7 to DURING framing (boxes and conduit go through open studs; you can&#39;t fish a closed island). Countertop-before-backsplash was already correct (tile sits over the finished counter with a silicone joint).",phases:[-1,2]}],me={title:"Project Context — Read This First",sections:[{slug:"the-build-in-one-paragraph",title:"The build in one paragraph",html:"<p>An L-shaped DIY outdoor kitchen (~9&#39; × 11&#39; legs) on an existing paver patio in San Diego, backed against a vinyl fence, next to a hot tub. Galvanized steel stud framing on a shimmed pressure-treated sill, cement board sheathing, wood-look porcelain plank cladding run vertically (weathered driftwood aesthetic), 18&quot; tile backsplash, light leathered 3cm granite counter at 36&quot; finished height. Appliances: Coyote SL gas grill (size TBD), Kamado Joe Big Joe in a corner cradle with a SMOBOT damper controller, a 24&quot; front-venting fridge, and a cold-water bar sink. Budget landing zone: roughly $10,100–$15,000 all-in, appliances driving most of it.</p>",plain:"An L-shaped DIY outdoor kitchen (~9&#39; × 11&#39; legs) on an existing paver patio in San Diego, backed against a vinyl fence, next to a hot tub. Galvanized steel stud framing on a shimmed pressure-treated sill, cement board sheathing, wood-look porcelain plank cladding run vertically (weathered driftwood aesthetic), 18&quot; tile backsplash, light leathered 3cm granite counter at 36&quot; finished height. Appliances: Coyote SL gas grill (size TBD), Kamado Joe Big Joe in a corner cradle with a SMOBOT damper controller, a 24&quot; front-venting fridge, and a cold-water bar sink. Budget landing zone: roughly $10,100–$15,000 all-in, appliances driving most of it."},{slug:"site-conditions-that-shaped-everything",title:"Site conditions that shaped everything",html:`<ul>
<li><strong>Existing paver patio</strong> — no slab, no footing. This killed the masonry option (CMU requires a poured footing below grade) and made steel-stud-on-PT-sill the structural answer.</li>
<li><strong>Vinyl fence directly behind</strong> — already has scorch marks from previous grilling. Drives the 1.5–2&quot; standoff air gap, the boarded back at the grill bay, and the &quot;fence is a combustible&quot; clearance checks.</li>
<li><strong>Coastal San Diego</strong> — salt air pushed the stud spec to 20-gauge with EQ coating; intense sun made countertop surface temperature the deciding material factor (dark stone hits 150–170°F); rare rain but the design still treats water seriously.</li>
<li><strong>Utilities on site</strong>: two electrical circuits already stubbed up near the fence (in the wrong spot — Phase 0 relocates them with offset fittings), and a cold water line already run. No sewer, no gas — both get deferred-tie-in provisions under the pavers.</li>
<li><strong>Sewer constraint</strong>: plumbers assessed the house cleanout as shallow relative to the run distance — the drain fall budget is TIGHT. This drove the &quot;seat the drain pipe as high as possible, directly beneath the pavers&quot; decision and the gravity → fence-run → pump fallback ladder.</li>
</ul>`,plain:'- **Existing paver patio** — no slab, no footing. This killed the masonry option (CMU requires a poured footing below grade) and made steel-stud-on-PT-sill the structural answer. - **Vinyl fence directly behind** — already has scorch marks from previous grilling. Drives the 1.5–2" standoff air gap, the boarded back at the grill bay, and the "fence is a combustible" clearance checks. - **Coastal San Diego** — salt air pushed the stud spec to 20-gauge with EQ coating; intense sun made countertop surface temperature the deciding material factor (dark stone hits 150–170°F); rare rain but the design still treats water seriously. - **Utilities on site**: two electrical circuits already stubbed up near the fence (in the wrong spot — Phase 0 relocates them with offset fittings), and a cold water line already run. No sewer, no gas — both get deferred-tie-in provisions under the pavers. - **Sewer constraint**: plumbers assessed the house cleanout as shallow relative to the run distance — the drain fall budget is TIGHT. This drove the "seat the drain pipe as high as possible, directly beneath the pavers" decision and the gravity → fence-run → pump fallback ladder.'},{slug:"owner-profile",title:"Owner profile",html:"<p>Capable, detail-obsessed DIYer. Built the full SketchUp model down to stud placement. Owns or will buy proper tools; rents the big stuff. Cost-conscious in the &quot;bang for buck&quot; sense, not the cheap sense — happily spends on durability, ruthlessly cuts specs that can&#39;t cite a source (personally caught and killed an over-spec&#39;d double-cement-board + Rockwool grill bay). Wants a contractor-grade result and thinks in decade timescales (&quot;what does this look like in year eight?&quot;). Caught multiple real technical errors during planning (stud/track geometry, track-as-water-gutter problem) — treat them as a peer reviewer, not a novice.</p>",plain:"Capable, detail-obsessed DIYer. Built the full SketchUp model down to stud placement. Owns or will buy proper tools; rents the big stuff. Cost-conscious in the &quot;bang for buck&quot; sense, not the cheap sense — happily spends on durability, ruthlessly cuts specs that can&#39;t cite a source (personally caught and killed an over-spec&#39;d double-cement-board + Rockwool grill bay). Wants a contractor-grade result and thinks in decade timescales (&quot;what does this look like in year eight?&quot;). Caught multiple real technical errors during planning (stud/track geometry, track-as-water-gutter problem) — treat them as a peer reviewer, not a novice."},{slug:"design-philosophy-recurring-principles-the-site-should-surface-these",title:"Design philosophy (recurring principles — the site should surface these)",html:`<ol>
<li><strong>Never give water a place to sit.</strong> Cabinet floors slope to weep holes; cladding terminates at a weep screed; bottom tracks get weep holes drilled in the back flange; the back of the island is open hardware cloth (a drying lung). Time-of-wetness, not wetting frequency, is what corrodes.</li>
<li><strong>One-way doors get checklists.</strong> Anything unreachable after a step completes (panel backs before tilt-up, chases before the cradle blocks the corner, sleeves before pavers relay) is identified and front-loaded.</li>
<li><strong>Access forever.</strong> Interior stays serviceable through door/drawer openings for life; the drain trap is above the cabinet floor; the fridge outlet is in the adjacent bay; a removable end panel serves the buried utilities; pre-installed chases cross the only zone that ever goes blind (the kamado corner).</li>
<li><strong>The manual is law.</strong> Manufacturer install manuals (Coyote especially) override the guide on cutouts, ventilation areas, and clearances.</li>
<li><strong>One material discipline.</strong> Wood-look porcelain planks (faces + doors), porcelain picket (backsplash), stone top: one wet saw rental, one thinset system, one grout strategy.</li>
<li><strong>Spend where physics demands, cut where nothing cites a source.</strong> 20-ga studs, sill-seal isolation, cold-galv on every cut: non-negotiable. Double board + insulation at the grill bay: deleted when challenged, because non-combustible assembly (ASTM E136) is the whole requirement.</li>
<li><strong>Bank elevation.</strong> With a tight drain fall budget, every design choice preserves height: pipe seated directly under pavers, 2&quot; pipe over 3&quot; (higher invert), trap arm exiting high (~18–20&quot;).</li>
</ol>`,plain:'1. **Never give water a place to sit.** Cabinet floors slope to weep holes; cladding terminates at a weep screed; bottom tracks get weep holes drilled in the back flange; the back of the island is open hardware cloth (a drying lung). Time-of-wetness, not wetting frequency, is what corrodes. 2. **One-way doors get checklists.** Anything unreachable after a step completes (panel backs before tilt-up, chases before the cradle blocks the corner, sleeves before pavers relay) is identified and front-loaded. 3. **Access forever.** Interior stays serviceable through door/drawer openings for life; the drain trap is above the cabinet floor; the fridge outlet is in the adjacent bay; a removable end panel serves the buried utilities; pre-installed chases cross the only zone that ever goes blind (the kamado corner). 4. **The manual is law.** Manufacturer install manuals (Coyote especially) override the guide on cutouts, ventilation areas, and clearances. 5. **One material discipline.** Wood-look porcelain planks (faces + doors), porcelain picket (backsplash), stone top: one wet saw rental, one thinset system, one grout strategy. 6. **Spend where physics demands, cut where nothing cites a source.** 20-ga studs, sill-seal isolation, cold-galv on every cut: non-negotiable. Double board + insulation at the grill bay: deleted when challenged, because non-combustible assembly (ASTM E136) is the whole requirement. 7. **Bank elevation.** With a tight drain fall budget, every design choice preserves height: pipe seated directly under pavers, 2" pipe over 3" (higher invert), trap arm exiting high (~18–20").'},{slug:"how-the-design-evolved-the-arc-for-the-decision-log-context",title:"How the design evolved (the arc, for the decision-log context)",html:`<ol>
<li><strong>Framing material</strong> (May): CMU/cinder block vs steel studs debated. Steel won on precision for appliance openings, utility routing through knockouts, and — decisively — cost: CMU needs a poured footing that pavers can&#39;t provide ($1,400–2,500 shell vs $650–1,250 steel; brick $2,900–5,200).</li>
<li><strong>Cooker lineup</strong> (May): a freestanding pellet smoker (Camp Chef Woodwind Pro) was considered for integration; rejected — built-in pellet options are a thin market and a smoke-flavor downgrade, and counter-height mismatch makes freestanding integration ugly. A kamado in the corner won. The end wall is deliberately built as a clean butt-joint termination so the island can be EXTENDED later if the pellet smoker ever earns a bay.</li>
<li><strong>Kamado + controller</strong> (May → June): Konnected Joe (built-in app/ignition) vs BGE XL + SMOBOT debated — &quot;architecture over app&quot;: SMOBOT&#39;s motorized top damper has no fan, preserves natural draft, ~30% better charcoal life. Final: <strong>Big Joe + SMOBOT (Kamado Joe version — the BGE daisy-wheel kit does NOT fit the Kontrol Tower) + Looftlighter</strong> for ignition.</li>
<li><strong>Cladding</strong> (June): costed stucco ($100–400, the SoCal-native choice), porcelain tile ($400–640), faux stone panels ($~2,000 — poor value at $12.50/sq ft with a bad 1.5-row cut problem at 36&quot; height), cultured stone ($2,100–4,200). Then the owner&#39;s AI renders shifted the aesthetic to weathered driftwood WOOD. Real teak/ipe (silvers naturally) was considered eyes-open re: coastal UV/salt; final call: <strong>wood-look porcelain plank, vertical</strong> — the driftwood look with tile physics. Consequences absorbed: leveling clips + ≤33% offset (never 50% brick pattern — plank bow guarantees lippage), rectified tile, epoxy grout color-matched so joints read as reveals, metal edge trim at corners (never miter porcelain), and doors became aluminum-frame + GoBoard + plank with edges landing on grout joints.</li>
<li><strong>Countertop</strong> (June): sun heat was the deciding factor. Dark granite and quartz (UV resin failure) rejected outright. Ranking: light leathered 3cm granite remnant ($1,000–1,800 fabricated) &gt; large-format light porcelain tile (&lt;$300 DIY) &gt; Dekton. <strong>Locked: light leathered 3cm granite.</strong></li>
<li><strong>The under-paver era</strong> (July, final sessions): drain plan matured from &quot;trench to sewer now&quot; → Option C stub-out with a jug interim → actual 2&quot; ABS laid under the seam with a long-sweep riser, seated high for the tight fall budget. Then a gas sleeve was added (straight 2&quot; PVC chase; future CSST bends by hand at the exit; interior routing through stud-web knockouts; a pre-installed chase through the blind kamado corner), then a third universal spare chase. Trench order across the seam: drain, spare, gas — gas outermost.</li>
<li><strong>Back wall + fire assembly</strong> (final sessions): hardware cloth across the entire back EXCEPT the grill bay, which is a fully boarded compartment (back pre-attached at tilt-up + both side partitions) — single layer, because the steel + cement assembly is already non-combustible and the double-board + Rockwool spec died under scrutiny. Kamado corner stays cloth (ceramic is a thermos; the boarded, porcelain-faced backsplash already shields the fence). Track weep holes added after the owner spotted the U-channel bathtub problem.</li>
</ol>`,plain:`1. **Framing material** (May): CMU/cinder block vs steel studs debated. Steel won on precision for appliance openings, utility routing through knockouts, and — decisively — cost: CMU needs a poured footing that pavers can't provide ($1,400–2,500 shell vs $650–1,250 steel; brick $2,900–5,200). 2. **Cooker lineup** (May): a freestanding pellet smoker (Camp Chef Woodwind Pro) was considered for integration; rejected — built-in pellet options are a thin market and a smoke-flavor downgrade, and counter-height mismatch makes freestanding integration ugly. A kamado in the corner won. The end wall is deliberately built as a clean butt-joint termination so the island can be EXTENDED later if the pellet smoker ever earns a bay. 3. **Kamado + controller** (May → June): Konnected Joe (built-in app/ignition) vs BGE XL + SMOBOT debated — "architecture over app": SMOBOT's motorized top damper has no fan, preserves natural draft, ~30% better charcoal life. Final: **Big Joe + SMOBOT (Kamado Joe version — the BGE daisy-wheel kit does NOT fit the Kontrol Tower) + Looftlighter** for ignition. 4. **Cladding** (June): costed stucco ($100–400, the SoCal-native choice), porcelain tile ($400–640), faux stone panels ($~2,000 — poor value at $12.50/sq ft with a bad 1.5-row cut problem at 36" height), cultured stone ($2,100–4,200). Then the owner's AI renders shifted the aesthetic to weathered driftwood WOOD. Real teak/ipe (silvers naturally) was considered eyes-open re: coastal UV/salt; final call: **wood-look porcelain plank, vertical** — the driftwood look with tile physics. Consequences absorbed: leveling clips + ≤33% offset (never 50% brick pattern — plank bow guarantees lippage), rectified tile, epoxy grout color-matched so joints read as reveals, metal edge trim at corners (never miter porcelain), and doors became aluminum-frame + GoBoard + plank with edges landing on grout joints. 5. **Countertop** (June): sun heat was the deciding factor. Dark granite and quartz (UV resin failure) rejected outright. Ranking: light leathered 3cm granite remnant ($1,000–1,800 fabricated) > large-format light porcelain tile (<$300 DIY) > Dekton. **Locked: light leathered 3cm granite.** 6. **The under-paver era** (July, final sessions): drain plan matured from "trench to sewer now" → Option C stub-out with a jug interim → actual 2" ABS laid under the seam with a long-sweep riser, seated high for the tight fall budget. Then a gas sleeve was added (straight 2" PVC chase; future CSST bends by hand at the exit; interior routing through stud-web knockouts; a pre-installed chase through the blind kamado corner), then a third universal spare chase. Trench order across the seam: drain, spare, gas — gas outermost. 7. **Back wall + fire assembly** (final sessions): hardware cloth across the entire back EXCEPT the grill bay, which is a fully boarded compartment (back pre-attached at tilt-up + both side partitions) — single layer, because the steel + cement assembly is already non-combustible and the double-board + Rockwool spec died under scrutiny. Kamado corner stays cloth (ceramic is a thermos; the boarded, porcelain-faced backsplash already shields the fence). Track weep holes added after the owner spotted the U-channel bathtub problem.`},{slug:"current-status-as-of-july-2026",title:"Current status (as of July 2026)",html:"<p>Nothing built yet. Plan is complete and converged. First physical work: pull pavers at the seam, lay three pipes (drain / spare / gas chase), shoot laser, set PT sill. The grill-size decision (30&quot; vs 36&quot;) gets made via cardboard mockup against the real sill, and it&#39;s the last thing gating the full stud cut list.</p>",plain:"Nothing built yet. Plan is complete and converged. First physical work: pull pavers at the seam, lay three pipes (drain / spare / gas chase), shoot laser, set PT sill. The grill-size decision (30&quot; vs 36&quot;) gets made via cardboard mockup against the real sill, and it&#39;s the last thing gating the full stud cut list."},{slug:"interim-states-the-site-should-represent-honestly",title:"Interim states the site should represent honestly",html:`<ul>
<li>Sink drains to a <strong>sealed catch jug</strong> until the sewer tie-in (a deliberate, legitimate bridge — with the honest note that the eventual tie-in should be permitted).</li>
<li>Grill runs on <strong>propane</strong> (tank in the open under-grill bay, LP detector mounted LOW) until the gas tie-in; conversion to NG flips detection HIGH.</li>
<li>Backsplash tile choice is late-binding by design; four AI-rendered comps exist (Coastal Slate Blue, Sea Glass Sage, Sand &amp; Smoke pattern, Deep Ocean Mix). Sea Glass Sage is the standing recommendation next to the red kamado.</li>
</ul>`,plain:"- Sink drains to a **sealed catch jug** until the sewer tie-in (a deliberate, legitimate bridge — with the honest note that the eventual tie-in should be permitted). - Grill runs on **propane** (tank in the open under-grill bay, LP detector mounted LOW) until the gas tie-in; conversion to NG flips detection HIGH. - Backsplash tile choice is late-binding by design; four AI-rendered comps exist (Coastal Slate Blue, Sea Glass Sage, Sand & Smoke pattern, Deep Ocean Mix). Sea Glass Sage is the standing recommendation next to the red kamado."}],principles:["<p><strong>Never give water a place to sit.</strong> Cabinet floors slope to weep holes; cladding terminates at a weep screed; bottom tracks get weep holes drilled in the back flange; the back of the island is open hardware cloth (a drying lung). Time-of-wetness, not wetting frequency, is what corrodes.</p>","<p><strong>One-way doors get checklists.</strong> Anything unreachable after a step completes (panel backs before tilt-up, chases before the cradle blocks the corner, sleeves before pavers relay) is identified and front-loaded.</p>","<p><strong>Access forever.</strong> Interior stays serviceable through door/drawer openings for life; the drain trap is above the cabinet floor; the fridge outlet is in the adjacent bay; a removable end panel serves the buried utilities; pre-installed chases cross the only zone that ever goes blind (the kamado corner).</p>","<p><strong>The manual is law.</strong> Manufacturer install manuals (Coyote especially) override the guide on cutouts, ventilation areas, and clearances.</p>","<p><strong>One material discipline.</strong> Wood-look porcelain planks (faces + doors), porcelain picket (backsplash), stone top: one wet saw rental, one thinset system, one grout strategy.</p>","<p><strong>Spend where physics demands, cut where nothing cites a source.</strong> 20-ga studs, sill-seal isolation, cold-galv on every cut: non-negotiable. Double board + insulation at the grill bay: deleted when challenged, because non-combustible assembly (ASTM E136) is the whole requirement.</p>","<p><strong>Bank elevation.</strong> With a tight drain fall budget, every design choice preserves height: pipe seated directly under pavers, 2&quot; pipe over 3&quot; (higher invert), trap arm exiting high (~18–20&quot;).</p>"],statusHtml:"<p>Nothing built yet. Plan is complete and converged. First physical work: pull pavers at the seam, lay three pipes (drain / spare / gas chase), shoot laser, set PT sill. The grill-size decision (30&quot; vs 36&quot;) gets made via cardboard mockup against the real sill, and it&#39;s the last thing gating the full stud cut list.</p>"},fe={"diagram-01-base-finish-stack.svg":{svg:`<svg preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 530" font-family="Arial, Helvetica, sans-serif">

<text x="526" y="440" font-size="11" fill="#5F5E5A">corner gets metal edge</text>
