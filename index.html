ine BEFORE buying, cap + tape both ends, and pressure-test with a gauge tee (10 psi, hold an hour) before and after construction. Default: don t. Chase note: the gas sleeve is a SEPARATE piece of the same 2 Sch 40 PVC, laid alongside the drain with a few inches of sand between — the drain itself is a live pipe, never a chase. 2 ID (~2.07 ) passes ¾ –1 CSST easily, fittings included. Grill fuel decision: the Coyote ships fuel-specific. Tie-in a year+ out or uncertain → order LP , cook on the tank, budget the Coyote LP→NG conversion kit + orifice/regulator swap (~$60–100 + an hour of installer time) for tie-in day. Tie-in imminent → order NG outright and skip the propane era. Detection flips at conversion: propane sinks (detector low now), natural gas rises (add detection high after). Lay a third pipe: the universal spare chase. Same spec as the gas sleeve — straight 2&quot; PVC, capped both ends, pull string, sharpied &quot;SPARE&quot; — in the same lift. Empty conduit under a permanent structure is never wasted: future low-voltage lighting, an added circuit, irrigation control, or a water line. (If the someday-goal is hot water at the sink, the better answer is a point-of-use heater under the counter — 2.5-gal mini-tank, ~1440W/12A on the existing cold line + sink-area circuit, hot water in seconds with zero trenching. Remember during Phase 2 that this appliance is probable when weighing circuit loading.) Trench arrangement across the seam: drain, spare, gas — a few inches of sand between each, nothing touching, gas outermost so no future dig at a water line ever crosses it.  Build the end bay removable anyway (cheap insurance): frame that end panel as a screwed-on, cladding-faced access panel rather than a permanently tiled face — same trick as the drawer faces: a tiled cement-board panel through-bolted from inside. Nobody will see the difference, and if the buried run ever needs attention, you have a service door instead of demolition.  Frame around the riser. The riser comes up through the sink-bay floor, so the cabinet floor&#39;s cement board (Phase 3) gets a hole cut around it, sealed with exterior silicone. No side exits, no external upstem — the trap-to-drain connection lives entirely inside the cabinet.  Interim jug setup: hard-pipe the sink tailpiece + P-trap now so the plumbing above the cabinet floor is done once, and let the trap discharge into a large sealed catch jug (a 5–7 gal carboy/jerry can with a bulkhead fitting is much nicer than an open bucket — no splash, no smell, no mosquitoes). Empty it to a proper drain, not the landscape, if there&#39;s anything besides rinse water in it.  Supply: the existing water line comes up in the wrong spot — route ½&quot; PEX low and around the fridge bay (never behind the fridge; built-ins fill the cavity nearly wall-to-wall and you don&#39;t want supply against the compressor/exhaust path).  Straight talk for later, so it s on the record: in San Diego, sink fixture waste is supposed to go to the sanitary sewer, the underground portion normally requires an inspection before it s covered , and a sewered outdoor sink needs a roof or a permanently attached cover. None of that blocks the build today — the jug is a legitimate bridge — but when you do the tie-in, doing it permitted protects you at resale and the homeowner no-plan permit is cheap relative to the trenching labor you re doing anyway. Confirm the path with San Diego DSD . "},{route:"#/phase/0",anchor:"step-01-verify-the-paver-base",title:"Phase 0 — Site Prep, Conduit Fix, and the Level Base · Step 0.1 — Verify the paver base",kind:"phase",text:"Walk the footprint. Look for rocking pavers or ponding low spots. A loaded island runs 1,500–2,500 lb; if pavers are on proper compacted road base + sand, you re fine. Fix any rockers now."},{route:"#/phase/0",anchor:"step-02-electrical-conduit-relocation-your-step-1",title:"Phase 0 — Site Prep, Conduit Fix, and the Level Base · Step 0.2 — Electrical conduit relocation (your step 1)",kind:"phase",text:"Conduit offset at the sill The existing stubs sit tight to the fence post and would collide with the back plane. Kill both circuits at the panel. Verify dead.  Demo the existing boxes; cut each PVC stub down, leaving a coupling&#39;s worth above the pavers.  Confirm what the second pipe in the double stub is (spare circuit? low voltage? gas?) before demo — it changes the plan if it&#39;s not a spare.  Glue on couplings and PVC offset fittings right at the base, below track level (~$2 each; or heat-gun-bend your own). The jog kicks the conduit off the fence line so it rises inside a stud bay. Never notch the back cement board at grade.  Lay out the run so each stub lands between studs, not under track. If one lands dead-on the track line, notch the track flange around it — not the pipe.  Cap the open conduit ends until Phase 2. "},{route:"#/phase/0",anchor:"step-03-lay-out-the-footprint",title:"Phase 0 — Site Prep, Conduit Fix, and the Level Base · Step 0.3 — Lay out the footprint",kind:"phase",text:"Snap chalk lines on the pavers for both legs of the L, holding the whole island 1.5–2&quot; off the vinyl fence (you already have scorch marks on that fence — vinyl deforms ~160°F; the gap also makes your back vents functional and gives the conduit room).  Mark the sink chase, conduit penetrations, and the grill/kamado/fridge bay centerlines on the ground. "},{route:"#/phase/0",anchor:"step-04-build-the-pt-base-your-step-2",title:"Phase 0 — Site Prep, Conduit Fix, and the Level Base · Step 0.4 — Build the PT base (your step 2)",kind:"phase",text:"Locked: PT 2×4 shimmed directly on the pavers. Base and finish stack cross-section Read the section above before cutting anything: the track s front flange sits flush with the PT front face, the stud web spans the full track interior, and the finish stack (½ board + thinset + plank ≈ 1 ) drops past the sill to a weep screed ~½ above the pavers — no raw wood visible at grade. If you d rather have a recessed toe-kick at any bay, hold that bay s board/cladding up at a horizontal trim line instead and paint the recess dark; the default here is the monolithic face to grade shown in your renders. Find the high point of the pavers inside the footprint with the laser. That&#39;s your datum — everywhere else you pack up; never grind down.  Lay the drain start (Phase −1): the 2&quot; pipe + riser goes in at the sink-bay crossing before any sill goes over it — and its marked line is a no-drill zone for every anchor in step 6.  Cut PT 2×4 (above-ground UC3A) sill runs for every wall line, including the backsplash wall and the kamado cradle.  Gap or drill the sill where the conduit stubs rise (drilling a hole ~¼&quot; oversize mid-board is stronger than an open notch; PVC needs the slack for thermal movement).  Set each run on the chalk lines. Shim to the laser at every bearing point (cedar shims were on the buy list; composite shims are the more rot-proof upgrade if you want it). Check level along and across every run, then leg-to-leg across the whole L.  Bed in PL Premium and anchor to the pavers with Tapcons/paver anchors every few feet. The sill is your shear connection to earth.  Isolation is non-negotiable: roll closed-cell sill seal foam over the top of every PT run before any steel touches it — modern ACQ/copper-azole PT corrodes galvanized steel. Any screw touching PT is hot-dip G185 or stainless, never plain zinc.  Check before moving on: laser across every run and diagonal — you want the whole sill plane within ~1/16 . Every error here telegraphs to the countertop. "},{route:"#/phase/1",anchor:"materials-from-the-phased-budget-chat",title:"Phase 1 — Steel Frame (your step 3) · Materials (from the phased-budget chat)",kind:"phase",text:"~ 50 sticks 3-5/8 × 10 20-ga EQ studs (label reads -18/-19/-20/-23 mil; avoid -14/-16). The 10-footers yield three ~33 studs per stick — that s why you chose them. ~ 14 sticks 3-5/8 track (U-channel — no return lips; don t mix up with studs). #8 × ½ wafer-head self-drilling TEK screws (500 box) — stud↔track. ~4 per stud. #10 × ¾ hex-head TEK screws (100 box) — track→PT sill (these bite the wood better). Cold-galvanizing spray, 2 cans — every cut edge gets sprayed. Non-negotiable outdoors. Sources: J B (El Cajon) or Westside (Sorrento Valley) supply yards beat HD on studs; buy TEK screws online/Fastenal, not HD."},{route:"#/phase/1",anchor:"step-11-cut-the-studs",title:"Phase 1 — Steel Frame (your step 3) · Step 1.1 — Cut the studs",kind:"phase",text:"Stud length is locked: 32-13/16&quot; (34&quot; − 1-3/16&quot; for the 3cm granite). Cut a test stud, dry-stack the full sandwich (PT + track + stud + track + ½&quot; deck board) and tape-measure to 34-13/16&quot; before you gang-cut fifty of them.  Score-and-snap: snip both flanges, nick the web, bend and snap. Or the miter saw with a carbide metal-cutting blade (Diablo Steel Demon type — cuts cold, no sparks, clean miters). Never an abrasive wheel.  Deburr every cut; spray every cut edge with cold-galv. Wear cut gloves — sheared steel is a razor. "},{route:"#/phase/1",anchor:"step-12-assemble-wall-panels-flat-tilt-up",title:"Phase 1 — Steel Frame (your step 3) · Step 1.2 — Assemble wall panels flat, tilt up",kind:"phase",text:"Track splice and outside corner Build each wall section flat on the patio, square it with a framing square, then tilt into place onto the sill track. Far easier than building vertically.  Sheath backs before tilt-up: a panel lying flat has an accessible back face; a standing panel against the fence never does again. The grill-bay section gets its back cement board attached NOW, on the ground (see Phase 3 zoning). Any storage bay you want dust-tight gets the same treatment — decide per panel before it stands. (The curved corner is framed in place, so staple its hardware cloth progressively as you frame, while your arm still fits.)  Studs at 16&quot; o.c. standard; ~6&quot; o.c. on the kamado arc/corner facets if you kept any curved/faceted geometry.  Clamp before you drive — locking C-clamp pliers (own 4–6) hold the layers so the metal can&#39;t walk. Drywall screw gun with adjustable nose &gt; impact for TEKs; a stripped hole is a dead joint.  Corners: two mitered pieces spliced with a nested track sleeve, screwed through both flanges + web — stronger than a single bent web. Splice long runs with an 8–12&quot; nested sleeve. "},{route:"#/phase/1",anchor:"step-13-fasten-to-the-base",title:"Phase 1 — Steel Frame (your step 3) · Step 1.3 — Fasten to the base",kind:"phase",text:"Weep the tracks first, on the sawhorses: drill ¼&quot; holes at the very bottom of the BACK flange, right at the web corner, 1–2 per stud bay, every track run. The U-channel is otherwise a gutter with no outlet — cavity water (wind-blown rain through the back cloth, or a someday plumbing mishap) pools in it and standing water is what eats galvanizing. Because the track&#39;s back flange slightly overhangs the PT&#39;s rear edge (front flange is the flush one), these weeps drain sideways past the PT face into the fence air gap and onto open paver. Deburr + cold-galv every hole. Same philosophy as the cabinet-floor weeps and the weep screed: never give water a place to sit.  Bottom track over the sill seal, onto the PT, with the #10 × ¾&quot; hex TEKs (G185/stainless where they touch PT).  Plumb every wall, brace temporarily, then tie the legs of the L together into one rigid unit. "},{route:"#/phase/1",anchor:"step-14-the-kamado-cradle-build-this-heavy-big-joe-locked",title:"Phase 1 — Steel Frame (your step 3) · Step 1.4 — The kamado cradle (build this heavy) — Big Joe, locked",kind:"phase",text:"Kamado cradle load path A Big Joe is the heaviest single object in the build — the standalone Series III grill head runs roughly 28.2 W and on the order of 400+ lb of ceramic concentrated on a small footprint. The load must travel straight down in compression: posts directly under where the ceramic base contacts (4 bearing points for a Big Joe), running uninterrupted to the base track. Never carry it on a horizontal stud spanning an open bay.  Use your doubled-rail grid here (you already modeled this — good). Web-vertical orientation or boxed track for any horizontal members, never flat track on its weak axis.  Deck the shelf so the base bears on a continuous surface, not thin flanges (cement board deck comes in Phase 3; mortar-bed the feet zone).  Kamado Joe requires ceramic feet in built-in installs — Big Joe takes 4 (2 front, 2 back), spaced so it doesn&#39;t rock when the dome opens. They create the under-grill airflow that dissipates heat; don&#39;t set the ceramic base flat on the deck. (kamadojoe.com parts)  Dimension the cutout from the A–R built-in chart: Ceramic Grill Store — Kamado Joe Built-In Dimensions &amp; Cutout Guide. Two rules from it worth engraving: don&#39;t build fixed counter in front of the grill (the front latch needs access), and the shelf surface sits a few inches below counter so the band/latch clears.  Verify the dome&#39;s rear swing clears the backsplash/curved wall before you commit the shelf depth.  Controller: order the SMOBOT Kamado Joe version (smobot.com/products/kamado-joe, ~$349) — the standard BGE daisy-wheel kit does not fit the cast-aluminum Kontrol Tower. It&#39;s micro-USB powered, so the outlet at the cradle serves it and the Looftlighter. "},{route:"#/phase/1",anchor:"step-14b-the-curved-corner-wall-curve-is-alive",title:"Phase 1 — Steel Frame (your step 3) · Step 1.4b — The curved corner wall (curve is alive)",kind:"phase",text:"Curved wall layer buildup The studs do the curving; everything above them just follows. Curved track: snip both flanges of a length of track every 1–2&quot; (tighter radius = tighter snips), leave the web intact, and bend it smoothly to your arc. Cut one for the base and a matching one for the top; trace the arc from your SketchUp template onto plywood/cardboard first so both tracks match exactly.  The PT sill under it: cut short PT segments to chord the arc (the sill doesn&#39;t need to be a perfect curve — it just needs bearing under the track&#39;s snipped web every few inches), or band-saw a curved sill from wider PT stock if you want it clean.  Studs at ~6&quot; on center around the arc. At that spacing the facets disappear under the finish. Plumb each one; the two tracks hold the geometry.  Pre-install the gas chase through the corner while the framing is bare: 1¼–1½&quot; PVC conduit routed through the corner&#39;s stud knockouts (gentle sweeps or straight chords), both ends emerging in the open bays flanking the corner. Cap, pull string, label &quot;GAS CHASE.&quot; Once the cradle carries the Big Joe against the fence, this corner is blind forever — this $8 of pipe is the only way a future line crosses it in twenty minutes instead of never. "},{route:"#/phase/1",anchor:"step-15-backsplash-wall",title:"Phase 1 — Steel Frame (your step 3) · Step 1.5 — Backsplash wall",kind:"phase",text:"Frame the thin backsplash wall per the stud-orientation plan we worked out (studs rotated for minimal thickness).  Remember it can&#39;t be anchored into pavers against wind load — its stability comes from being tied hard into the L and the mass of the island. Bolt it through into the counter framing with blocking at the bolt lines. "},{route:"#/phase/1",anchor:"step-16-openings-and-blocking-do-now-or-regret-it-list",title:"Phase 1 — Steel Frame (your step 3) · Step 1.6 — Openings and blocking (do-now-or-regret-it list)",kind:"phase",text:"Frame every negative to the manufacturer s cutout spec, not your framing instinct : Grill: ⚠️ decide SL30 vs SL36 before framing this bay. SL30: 25½&quot;W × 20½&quot;D × 10¼&quot;H · SL36: 32½&quot;W × 20½&quot;D × 10¼&quot;H — plus ~1&quot; margin on width/depth for cross-brand swap insurance. Depth is where brands vary most. (Everything else in the frame is identical either way; only this one bay and its flanking stud positions wait on the decision.)  Fridge: the Velieta 24&quot; class — pull the exact cutout from its manual once it arrives (frame that bay last if needed; these budget units share ~23.5&quot;W × ~23&quot;D × ~34&quot;H footprints but verify). Frame a solid, dead-level floor shelf for it. Honesty note: at ~$350 it&#39;s a verified front-vent built-in, but it&#39;s not a Blaze-tier outdoor unit — the lined cavity gives it a sheltered life, and if it dies in 6–8 years, the standard 24&quot; bay means any replacement drops in.  Sink cutout per sink template.  Horizontal blocking at counter height under the stone, grill flange, and sink.  Hinge backing at every door opening: bolt aluminum angle (or boxed heavier-gauge stud) across the hinge-side stud now — a thin stud web alone will not hold a piano hinge for 20 years, and this is a miserable retrofit.  Shelf blocking/ledgers at your chosen shelf heights in every cabinet bay — cement board is skin, not structure.  Route paths: confirm the conduit bays, the PEX route low around the fridge, the drain chase.  Check before moving on: laser across the entire top track — dead level, both legs, corner to corner. Rack-test every bay. This is the last cheap moment to fix anything. "},{route:"#/phase/2",anchor:null,title:"Phase 2 — Electrical Rough-In (your step 7, moved here)",kind:"phase",text:"You re doing this yourself and you ve got two circuits at the stubs."},{route:"#/phase/2",anchor:"the-plan-we-settled",title:"Phase 2 — Electrical Rough-In (your step 7, moved here) · The plan we settled",kind:"phase",text:"Circuit 1 (20A, dedicated): fridge. Refrigeration hates sharing with a tripping GFCI.  Circuit 2 (20A): grill outlet (the Coyote SL needs 120V for lights/ignition), kamado outlet (Looftlighter + fan controller — note some kamado electronics are GFCI-sensitive; a clean dedicated-ish path helps), sink-area convenience outlet.  GFCI protection on everything — at the head of each circuit or breaker-level. "},{route:"#/phase/2",anchor:"steps",title:"Phase 2 — Electrical Rough-In (your step 7, moved here) · Steps",kind:"phase",text:"From the offset fittings at the base, extend PVC conduit up the stud bays and laterally through the stud knockouts (bushings/grommets on any cut steel edge). Conduit runs the whole way — the island interior is a damp/wet location; THWN-2 in conduit, no Romex, no bare UF.  Set weatherproof boxes with in-use covers: Grill outlet: low (8–12 ) inside the adjacent cavity or on the back face under the counter — cords out of sight, covers stay closed. Fridge outlet: in the adjacent cabinet , not behind the fridge (you can t reach it and the cord gets pinched). Drill a grommeted cord pass-through, seal it (steel wool + sealant — pest highway otherwise). Sink convenience: high on the cabinet sidewall, away from trap drips. Kamado: near the cradle. Keep splices in an accessible j-box (the fridge cavity works as a hub — a removable panel counts as accessible; buried behind tile doesn&#39;t).  Pull THWN-2, land nothing yet — leave tails coiled in boxes. Devices and covers go in at Phase 8 (after tile, so nothing gets thinset in it).  Any electrical near the propane bay mounts high, not low where gas would pool.  "},{route:"#/phase/3",anchor:"materials",title:"Phase 3 — Cement Board, Waterproofing, Flashing (your step 4) · Materials",kind:"phase",text:"½ cement board (Durock/Hardie), ~ 26 sheets of 3×5 estimated for faces + counter deck + backsplash (recheck against final plan — the open back removed ~100 sq ft from earlier estimates, so re-count before buying; buy 2–3 extra). Power Pro #9 × 1¼ ceramic-coated wafer-head backer screws — the 925-count box covers the whole project. (Yes, 1¼ is right: ½ board + ¾ past it to thread the steel.) Alkali-resistant mesh tape + thinset for seams. RedGard or AquaDefense (~2 gal), Z-flashing, weep screed, ¼ galvanized hardware cloth. Rockwool ComfortBatt R-15 (1 pack does grill bay + fridge bay + sink back). Respirator for every cut. Non-negotiable. Score-and-snap where you can; diamond blade outside for the rest."},{route:"#/phase/3",anchor:"steps",title:"Phase 3 — Cement Board, Waterproofing, Flashing (your step 4) · Steps",kind:"phase",text:"Interior cavity liners first where access closes later: line the fridge cavity on all five faces (offcuts are fine), build its level floor shelf, and give every cabinet floor a slight pitch (~¼&quot;) to a weep hole at the low point — no bathtubs. Under-sink bay gets the waterproof-pan treatment on its floor.  Plan and cut every penetration before hanging — conduit, PEX, drain chase, vents. Sleeve and seal with exterior silicone. Retrofitting holes through finished board is miserable.  Hang the face sheets: screws every 8&quot; into studs, edges landing on framing, 1/8&quot; gaps between sheets.  Grill bay — a fully boarded compartment, single layer throughout: back (pre-attached at tilt-up) plus the bay-facing side of BOTH flanking partitions. Not a fire-rating issue (the steel assembly is already non-combustible, ASTM E136) — the side boards do three other jobs: they stop firebox heat and grease vapor migrating into adjacent storage (where the door backers are polyiso foam), they make the bay a defined compartment so the manual&#39;s ventilation-opening math means something (LP compartments have explicit vent requirements — low openings especially, propane sinks; size the toe-kick louvers to the manual&#39;s square-inch numbers), and they stiffen the partitions carrying the counter at the cutout. Finish level: bare board, seams taped, no membrane, no tile — nobody sees inside a grill bay. Bottom stays open to the pavers for the tank; front per the manual&#39;s access + vent layout. The manual is law: cutout dims, vent areas, clearance-to-combustibles (the vinyl fence counts — boarded back + 2&quot; gap covers it, verify against the manual&#39;s rear number; a cement-board standoff shield on the fence is the cheap fix if tight). Optional retrofit: Rockwool batt into the open stud cavity if the adjacent bay ever runs warm — buy it then, not now.  Counter deck: ½&quot; cement board screwed down across the top track — it&#39;s the counter&#39;s subfloor. Everything flush; any blocking sitting ¼&quot; low reintroduces voids under stone.  Back of the island: ¼&quot; galvanized hardware cloth across the entire back EXCEPT the grill bay. Cloth staples/screws on from the front through the bays — free ventilation, pest exclusion, a permanent drying lung for the cavity, and physically incapable of trapping water. The grill bay back gets solid board, pre-attached while its panel lies flat in Phase 1 (no radiant line-of-sight through mesh to the already-scorched vinyl fence). The kamado corner stays cloth: a kamado is a thermos — its ceramic keeps the exterior cool — and the boarded, porcelain-faced backsplash wall already stands between body and fence. The boarded back gets seams taped but NO membrane — it is the drying side by design.  Tape + thinset all seams and corners (alkali-resistant mesh).  Waterproofing where it earns its keep: roll RedGard/AquaDefense on the counter deck (top + back edge) and all faces getting cladding. Two coats, opposing directions.  Flashing: weep screed at the base perimeter; Z-flashing across the backsplash top plate, sloped toward the fence, front edge caulked.  Vents: louvered stainless vents low in the toe kick under the grill and at the island ends; back vents work because of the fence air gap. Add the LP leak detector low in the propane bay.  If the shell will sit before cladding: fine in rain, but the membrane doesn&#39;t love months of direct UV — aim to clad within 2–4 months, and tape/cap the open counter-deck edges in the meantime. "},{route:"#/phase/3",anchor:"step-35-the-curved-wall-faceted-board-true-radius",title:"Phase 3 — Cement Board, Waterproofing, Flashing (your step 4) · Step 3.5 — The curved wall: faceted board → true radius",kind:"phase",text:"You re right that you won t bend ½ board around that arc, and you don t need to. The system is: faceted cement board for the fireproofing, metal lath + mortar for the geometry. The board is the non-combustible substrate; the lath-and-mortar layer is what actually creates the smooth curve. Skin the arc in ¼&quot; cement board, cut into vertical strips — one strip per stud bay (your studs are at ~6&quot; o.c. on the arc, so strips run ~6&quot; wide). Each strip is dead flat, spans stud to stud, zero bending stress, impossible to crack. You&#39;re building a polygon that reads as a curve. Two screws per strip per stud with the same Power Pro backer screws. If you want fewer seams: two alternates from our earlier session — kerf the back of a wider piece every ~1 with a grinder + diamond blade and wrap it, or laminate two ¼ sheets (each bends easily; bonded together with thinset + screws they behave like ½ ). The vertical strips are still the most foolproof. Pack the facet joints with thinset and tape everything with alkali-resistant mesh.  Staple/screw galvanized expanded-metal lath over the whole arc, wrapping it continuously — the lath bends to any radius effortlessly, and it&#39;s your true curve former. Overlap laps by 2&quot;+, fasten into every stud. This is your &quot;bendable non-combustible material&quot; — it&#39;s exactly what pros use for curved masonry surfaces; a flexible cement board that does this doesn&#39;t really exist.  Trowel a mortar/stucco base coat over the lath (a polymer-modified base coat or sanded thinset works), screeding to the radius. Make a simple curved screed template — a piece of plywood band-sawed to the arc from your SketchUp profile — and drag it around the wall to shave the mortar to a perfect radius. Two thin passes beat one thick one.  Once cured, finish however the corner wants: a smooth stucco finish coat as a deliberate accent zone (my lean — a smooth curved band framing the red kamado looks intentional next to the planked flats), or narrow mosaic/picket tile which follows a radius happily. Full-width porcelain planks won&#39;t wrap it — plan the plank field to stop at the curve with a metal trim line, and let the curve be its own material.  Everything in this stack is non-combustible — cement board, steel lath, mortar — so the kamado s radiant heat is a non-issue. "},{route:"#/phase/4",anchor:null,title:"Phase 4 — Cladding (your step 5)",kind:"phase",text:"The decision: wood-look porcelain plank , run vertically for the reeded look in your renders. One material discipline across the whole build (plank faces + picket backsplash + stone/porcelain top = one wet saw, one thinset, one grout strategy)."},{route:"#/phase/4",anchor:"buying-specs",title:"Phase 4 — Cladding (your step 5) · Buying specs",kind:"phase",text:"Rectified plank (tight, wood-like joints), light driftwood tone per the renders. Leveling clip system (Tuscan/Raimondi/MLT) — non-negotiable on planks. Polymer-modified exterior thinset; epoxy grout color-matched dead-on to the plank so joints read as reveals. Schluter-type metal edge trim (Quadec/Rondec) for outside corners — never miter porcelain corners; trim is faster, tougher, forgiving. ( schluter.com ) Buy one extra box as attic stock — dye lots disappear. Saw check: 48 planks fight a small tabletop wet saw — plan on a rail/bridge saw rental or score-and-snap + grinder for notches."},{route:"#/phase/4",anchor:"steps",title:"Phase 4 — Cladding (your step 5) · Steps",kind:"phase",text:"Dry-lay the entire face on the ground first. Shuffle planks for grain/color variation, reject the ugly ones, decide where door openings land so door edges fall on grout joints. This is where the forgiveness lives — audition everything before anything is permanent.  Snap plumb/level layout lines. Vertical planks, offset ≤33% — never 50% brick pattern (plank bow guarantees lippage at 50%; manufacturers warn against it).  Back-butter every plank + combed thinset on the wall — full coverage.  Set with leveling clips; check plane constantly with a straightedge.  Edge trim bedded in the same thinset pass as the adjoining tile (the perforated leg embeds in the bed — trim and tile go on together, not sequentially).  Cure, then epoxy grout. Clean haze aggressively as you go — epoxy haze is forever.  Movement joints: color-matched silicone (not grout) at every change of plane and where cladding meets counter/appliances/trim.  "},{route:"#/phase/5",anchor:null,title:"Phase 5 — Doors & Drawers (your step 6)",kind:"phase",text:"This runs as a parallel bench-work track — build them any time after framing; hang them after cladding."},{route:"#/phase/5",anchor:"doors-no-welding",title:"Phase 5 — Doors & Drawers (your step 6) · Doors (no welding)",kind:"phase",text:"Door construction layers Frame: 1&quot;×1&quot; aluminum angle or thin-wall 1&quot; square tube, cut on the miter saw with a non-ferrous blade. Corners joined with aluminum gusset plates/corner brackets — stainless machine screws + nylock nuts plus structural adhesive (3M 5200 / DP420). Add a center rail on anything over ~24&quot;. Size = opening minus an even 1/8–3/16&quot; reveal.  Backer: GoBoard/Wedi foam board, not cement board — waterproof, bonds porcelain equally well, a fraction of the weight (door weight kills hinges). Bond with thinset/adhesive and screw with stainless self-tappers; the bond makes the torsion box.  Waterproof the backer edges/seams.  Hinge prep before tiling. You want the European-style opening — that points at concealed hinges made for aluminum-frame cabinet doors (clamp-on type, no 35mm cup bore, 3-way adjustable — search &quot;aluminum frame door concealed hinge&quot; / glass-cabinet hardware category). Piano hinge remains the sag-proof fallback if the clamp-on options don&#39;t suit your frame profile. Final pick happens here at Phase 5 — but either way the cabinet-side hinge backing was installed back in Phase 1, so nothing upstream waits on it. Whichever hinge: machine screws + lock nuts into the frame, never self-tappers, for the connection carrying the door&#39;s whole life.  Tile the face with the same planks — edges landing on grout joints so the reveal hides in a reveal; metal edge trim around the perimeter; epoxy grout.  Diamond-drill handle holes through the tile into the frame, sleeve with silicone, through-bolt stainless handles.  Hang, and dial the reveals even. Outdoor magnetic/roller catch. "},{route:"#/phase/5",anchor:"drawers-diy-riveted-aluminum-locked-custom-sizes",title:"Phase 5 — Doors & Drawers (your step 6) · Drawers — DIY riveted aluminum (locked, custom sizes)",kind:"phase",text:"Boxes: .050–.063&quot; aluminum sheet or 3–4mm ACP/Dibond panels, every corner joined with 1&quot;×1&quot; aluminum angle + stainless pop rivets ($25 rivet gun). The angle is the frame; the panel is the skin.  Run aluminum flat bar/angle along each side at slide height — solid bite for the slide screws and it stiffens the wall in one move.  Perforated aluminum bottom so any water drains instead of pooling; U-channel edge cap on the top rim (no razor edges, looks finished).  Boxes land under 10 lb empty → standard stainless full-extension slides carry them easily; mount slides to the flat-bar rails and to blocking/angle on the cabinet side.  Cut list tip: size each box to (opening − slide clearance per the slide spec, usually ½&quot; per side) and build the tallest drawer first as your pattern.  The face stays easy: tiled ½&quot; cement-board panel (weight is fine here — it rides the slides flat) through-bolted from inside the box with slotted holes so you can nudge alignment. No hinges, no frame needed.  Stainless (not aluminum) stays the rule for anything in the firebox surround zone. "},{route:"#/phase/5",anchor:"cabinet-interiors",title:"Phase 5 — Doors & Drawers (your step 6) · Cabinet interiors",kind:"phase",text:"Light-colored finish (elastomeric/masonry paint over the cement board) so you can see into them.  Shelves on the blocking you set in Phase 1: stainless wire or marine HDPE are the picks — they drain.  "},{route:"#/phase/6",anchor:null,title:"Phase 6 — Countertop (your step 8)",kind:"phase",text:"Locked: light-colored granite, 3cm (1¼ nominal), leathered finish. The color rule is non-negotiable outdoors — Alaska White / Kashmir White / Colonial White / Bianco Antico class stones stay usable in the sun; anything dark (Black Pearl, Absolute Black) hits 150–170°F and is off the table. Remnant-shop it: budget remnants run $10–18/sq ft material + $600–1,000 fabrication for your ~40 sq ft, landing $1,000–1,800 all-in. The L needs two pieces with a seam at the corner — keep the seam away from the sink, and match thickness across both pieces. Sealing habit: twice a year outdoors, $25 bottle, 20 minutes."},{route:"#/phase/6",anchor:"steps",title:"Phase 6 — Countertop (your step 8) · Steps",kind:"phase",text:"Template after cladding (the finished face is the reference), 31&quot; deep, front overhang over the plank face, rear overhang carrying the backsplash.  Give the fabricator: sink model + template, grill cutout (SL30: 25½ × 20½ / SL36: 32½ × 20½ — locked by then), kamado opening per the Big Joe built-in chart, seam location. Cutouts need meat around them — this constrains which remnants work; match 3cm across both pieces.  Before install: confirm the deck is level and waterproofed, blocking is flush, and the kamado throat band has its reinforced continuous bearing (the &quot;little shelf&quot; of blocking we detailed — flush to deck, clip-angled into flanking studs, stone fully mortar-bedded over it so it never spans air).  Set in silicone beds; seam epoxied and color-matched by the fabricator.  Counter-to-backsplash joint gets silicone, never grout — it&#39;s a movement joint.  "},{route:"#/phase/7",anchor:null,title:"Phase 7 — Backsplash Tile (your step 9)",kind:"phase",text:"Backsplash zones at 18 inches The framing, board, flashing, and waterproofing are already done — this phase is tile only, after the counter so the tile sits on/over the finished surface with a silicone joint. Locked: 18 band height, no stainless panel. The grill heat zone gets smooth, large-format porcelain (24 + faces, minimal grout lines — grout directly behind a grill is a grease trap, so big smooth tile is the wipeable substitute for the stainless we ruled out). Tile pattern/color stays late-binding — nothing upstream depends on it; just have it chosen before the counter is templated so the fabricator knows the splash sits on the rear overhang."},{route:"#/phase/7",anchor:"the-zone-split-at-18-18-lf-of-back-wall",title:'Phase 7 — Backsplash Tile (your step 9) · The zone split at 18" (~18 LF of back wall)',kind:"phase",text:"Zone Width Material Quantity Behind grill ~4 Smooth 24 + light porcelain ~12 sq ft Kamado corner ~3 Smooth porcelain — or bend the rule and frame the egg with the feature tile (soot on grout over time) ~5 sq ft Decorative (sink wall + runs) ~11 Feature tile (your pick of the four comps — Sea Glass Sage was my argument), +20% waste (picket shapes waste more) ~20 sq ft"},{route:"#/phase/7",anchor:"rules",title:"Phase 7 — Backsplash Tile (your step 9) · Rules",kind:"phase",text:"Porcelain or glass only — never natural stone behind a cook surface.  Epoxy grout, one shade darker than instinct (pale grout behind a grill grays in a season anyway).  Smooth-tile-to-feature-tile transitions: metal edge trim + silicone at any change of plane or material, not a grouted butt joint.  Buy one extra box of the picket as attic stock.  "},{route:"#/phase/8",anchor:"electrical-trim",title:"Phase 8 — Appliances, Trim-Out, Final Details (your step 10) · Electrical trim",kind:"phase",text:"Install GFCI devices/receptacles, in-use covers, label the circuits, test every GFCI. "},{route:"#/phase/8",anchor:"plumbing-trim",title:"Phase 8 — Appliances, Trim-Out, Final Details (your step 10) · Plumbing trim",kind:"phase",text:"Set the sink in silicone per template; faucet (cold-only), supply hookup to the PEX run, trap + drain connection to the stub, AAV under the counter if that&#39;s your vent plan. Final inspection if applicable. Install/verify the sink cover (the sewer-connection rain rule). "},{route:"#/phase/8",anchor:"fridge",title:"Phase 8 — Appliances, Trim-Out, Final Details (your step 10) · Fridge",kind:"phase",text:"Slide into its lined cavity onto the level shelf; front grille completely unobstructed — no counter lip, face-frame, or trim creeping over it. Cord through the grommeted pass-through to the outlet in the adjacent bay; seal the pass-through. "},{route:"#/phase/8",anchor:"grill",title:"Phase 8 — Appliances, Trim-Out, Final Details (your step 10) · Grill",kind:"phase",text:"Drop into the cutout per the Coyote manual — flange bears on the counter, sealed per instructions. Connect propane (tank on the pavers in the open bay), leak-test every fitting with soapy water. Plug in the 120V. Confirm the manual&#39;s clearances and (if specified) the insulated jacket. "},{route:"#/phase/8",anchor:"kamado-big-joe",title:"Phase 8 — Appliances, Trim-Out, Final Details (your step 10) · Kamado (Big Joe)",kind:"phase",text:"Assemble in place — it does not fit through openings after the fact, and the ceramic body is a two-strong-people lift minimum (rent/borrow a shoulder dolly or appliance dolly and extra hands).  Set it on the 4 ceramic feet (2 front, 2 back, spaced so it can&#39;t rock when the dome swings) on the cradle deck — the feet create the required under-grill airflow; never flat on the deck.  Verify dome swing clears the curved wall/backsplash and the front latch is reachable below counter level.  Swap the Kontrol Tower damper hardware for the SMOBOT Kamado Joe kit per its instructions, route its micro-USB to the cradle outlet, and stage the Looftlighter there too. "},{route:"#/phase/8",anchor:"final-punch-list",title:"Phase 8 — Appliances, Trim-Out, Final Details (your step 10) · Final punch list",kind:"phase",text:"Silicone every change-of-plane joint (counter↔splash, counter↔grill flange, cladding↔trim, tile↔stainless)  Weep holes clear in every cabinet floor  Vents unobstructed; LP detector powered/tested  Seal granite (if granite) — and calendar it twice a year  Re-level check after a few weeks loaded + one good rain — early settlement happens once; catch it, shim/adjust, done for the long haul  "},{route:"#/decisions",anchor:"D01",title:"D01 — Steel stud framing",kind:"decision",text:"Beat: CMU/cinder block, brick, wood studs, hybrid CMU+steel. Why: (1) CMU cannot sit on pavers — it needs a poured footing ($400–700 + paver demo), which alone flips the cost comparison: steel shell $650–1,250 vs CMU $1,400–2,500 vs brick $2,900–5,200 in DIY materials. (2) The layout has many precision appliance openings; steel lets you move a stud half an inch with a new screw, block does not. (3) Utilities thread through stud knockouts vs core-drilling masonry. (4) Wood was never seriously in it: combustible framing triggers the grill&#39;s insulated-jacket requirement and rots. Steel + cement board is a non-combustible assembly by definition."},{route:"#/decisions",anchor:"D02",title:`D02 — 20-gauge EQ studs, 3-5/8", 10' sticks`,kind:"decision",text:"Beat: 25-gauge interior studs. Why: Coastal San Diego air + outdoor life; 25-ga is an interior drywall product. EQ label reads -18/-19/-20/-23 mil (avoid -14/-16). 10&#39; sticks yield three ~33&quot; studs each. Buy from supply yards (J&amp;B El Cajon / Westside Sorrento Valley), not big-box; TEK screws online/Fastenal."},{route:"#/decisions",anchor:"D03",title:"D03 — PT 2×4 sill on shims, directly on pavers",kind:"decision",text:"Beat: adjustable pedestals under a PT sleeper; pedestals alone. Why: Simpler, cheaper, anchors directly to pavers (Tapcons = the shear connection to earth). Shims pack UP to a laser datum from the pavers&#39; high point — never grind down. Non-negotiables that ride with it: closed-cell sill seal between PT and steel (ACQ-treated lumber corrodes galvanized steel), G185/stainless for any fastener touching PT, PL Premium bedding."},{route:"#/decisions",anchor:"D04",title:'D04 — Stud length 32-13/16"',kind:"decision",text:"Formula: 34&quot; − counter thickness. Counter locked at 3cm granite (1-3/16&quot; actual). Stack: paver → shims → PT (1.5&quot;) → sill seal → track → stud → track → ½&quot; deck board → granite = 36&quot; finished. Dry-stack one test sandwich before gang-cutting fifty."},{route:"#/decisions",anchor:"D05",title:"D05 — Counter: light leathered 3cm granite remnant",kind:"decision",text:"Beat: dark granite, quartz, porcelain tile top, Dekton, poured concrete. Why: Surface temperature in San Diego sun was the deciding factor — dark stone hits 150–170°F (unusable, and the owner has kids); quartz resin fails under UV (hard no outdoors). Light granite (Alaska White / Kashmir White class) stays usable, is impact-tough, and remnant-shops to $1,000–1,800 fabricated for ~40 sq ft. Porcelain tile was the strong budget runner-up (&lt;$300 DIY, coolest surface, tile-level repairability). L needs two pieces, seam at the corner, away from the sink; seal twice a year."},{route:"#/decisions",anchor:"D06",title:"D06 — Cladding: wood-look porcelain plank, vertical",kind:"decision",text:"Beat (in order of elimination): faux stone panels ($~2,000, $12.50/sq ft, bad 1.5-row cut math at 36&quot; height), cultured stone, natural stone veneer, stucco (cheapest and SoCal-native — eliminated only by aesthetics), real wood (teak/ipe/thermo-ash). Why: The owner&#39;s renders converged on a weathered-driftwood wood aesthetic. Real wood silvering naturally was considered eyes-open, but coastal UV/salt maintenance lost to porcelain physics: the plank gives the exact look with tile durability. Install law: rectified tile, leveling clips (non-negotiable on planks), offset ≤33% — NEVER 50% brick pattern (plank bow guarantees lippage; manufacturers warn against it), back-butter everything, epoxy grout dead-matched to plank so joints read as reveals, Schluter-type metal trim at outside corners (never miter porcelain). Bonus that sealed the deal: the whole project collapsed to ONE material discipline — plank faces + picket backsplash + stone top = one wet saw rental, one thinset system, one grout strategy."},{route:"#/decisions",anchor:"D07",title:"D07 — Doors: aluminum frame + GoBoard + plank face (hinge type )",kind:"decision",text:"Beat: stainless doors (abandons the seamless look), minimizing doors in favor of drawers, cement-board-backed doors. Why: Preserves &quot;handles emerging from a continuous wood face.&quot; Bolt-and-bond frames (1×1 tube/angle, gussets, SS machine screws + DP420 structural adhesive — no welding). GoBoard over cement board because door WEIGHT kills hinges and foam board bonds porcelain equally well. Door edges land on grout joints so the reveal hides in a reveal. Open: owner wants Euro-style opening → clamp-on concealed hinges for aluminum frames preferred; stainless piano hinge is the sag-proof fallback. Decide at Phase 5; the Phase 1 hinge backing supports either."},{route:"#/decisions",anchor:"D08",title:"D08 — Drawers: DIY riveted aluminum boxes",kind:"decision",text:"Beat: pre-made stainless drawer units. Why: Custom sizes required. .050–.063&quot; sheet or 3–4mm ACP, 1×1 angle corners + stainless pop rivets, flat-bar rails at slide height, perforated bottoms (drainage), U-channel rim. Under 10 lb empty → standard stainless full-extension slides. Faces: tiled cement-board panels through-bolted with slotted holes for alignment."},{route:"#/decisions",anchor:"D09",title:"D09 — Kamado: Big Joe + SMOBOT (KJ version) + Looftlighter",kind:"decision",text:"Beat: Konnected Joe (built-in ignition/app), BGE XL + SMOBOT, BGE XL + Flame Boss 500, built-in pellet grills. Why: &quot;Architecture over app.&quot; SMOBOT is the only controller with no blower fan — a motorized top damper that preserves the kamado&#39;s natural draft and tested ~30% better charcoal life vs forced-air. Looftlighter covers the manual-ignition gap in ~10 minutes of active work. Big Joe won the body decision for cooking area. Critical purchase note: order the SMOBOT Kamado Joe version (~$349) — the standard BGE daisy-wheel kit does NOT fit the Kontrol Tower. Built-in requires 4 ceramic feet (airflow); dimension the cradle from the Ceramic Grill Store A–R chart; shelf sits below counter so band/latch stay reachable; assemble in place (never fits later)."},{route:"#/decisions",anchor:"D10",title:"D10 — Pellet smoker: rejected from the island; extension-friendly end wall instead",kind:"decision",text:"Why: Built-in pellet market is thin and a smoke-flavor downgrade vs the owner&#39;s Woodwind Pro (dedicated smoke box); freestanding integration creates an ugly counter-height mismatch. The lasting design consequence: the island&#39;s end wall is a CLEAN BUTT-JOINT TERMINATION — no wrapped finish requiring demolition — so a future extension bay is a 15-minute planning decision that already happened."},{route:"#/decisions",anchor:"D11",title:'D11 — Grill: Coyote SL series (30" vs 36", LP vs NG)',kind:"decision",text:"Cutouts: SL30 25½&quot;W / SL36 32½&quot;W, both × 20½&quot;D × 10¼&quot;H, +~1&quot; swap margin. Deadline: before framing the grill bay; everything else in the frame is identical. Method: cardboard mockup on the real sill. Fuel: ships fuel-specific. Gas tie-in a year+ out → order LP, budget the LP→NG conversion kit (~$60–100 + an hour of installer time). Tie-in imminent → order NG outright. Detection flips at conversion: propane sinks (detector low), NG rises (add high)."},{route:"#/decisions",anchor:"D12",title:'D12 — Fridge: Velieta 24" front-vent built-in-capable',kind:"decision",text:"Why: Verified front-venting, compressor-based, adjustable feet — the three requirements for a built-in cavity. Honest framing: ~$350 is not Blaze-tier; the lined cavity gives it a sheltered life, and the standard 24&quot; bay means any future replacement drops in. Frame the cavity to the actual cut sheet on arrival. Outlet in the ADJACENT bay (never behind the fridge), grommeted cord pass-through, sealed."},{route:"#/decisions",anchor:"D13",title:'D13 — Backsplash: 18" band, heat-zoned, no stainless (tile choice )',kind:"decision",text:"Why: Grout behind a grill is a grease trap → the ~4&#39; grill zone gets smooth 24&quot;+ light porcelain (the wipeable substitute for the stainless panel the owner ruled out). ~3&#39; kamado corner smooth; ~11&#39; feature tile. Epoxy grout one shade darker than instinct; silicone (never grout) at the counter joint and every material change; porcelain/glass only behind cook surfaces. Open: which of four rendered comps — Sea Glass Sage is the standing recommendation next to the red kamado; the SketchUp currently wears Coastal Slate Blue. Deadline: before counter templating."},{route:"#/decisions",anchor:"D14",title:"D14 — Back wall: hardware cloth everywhere EXCEPT the boarded grill bay",kind:"decision",text:"History: started as &quot;cement board everywhere&quot;; became &quot;cloth everywhere&quot; (ventilation + no rear access against the fence); finalized as zoned after two owner challenges. Why cloth wins generally: open mesh cannot trap water; the back becomes the cavity&#39;s permanent drying lung; pest exclusion; installs from the front. Corrosion logic: TIME-OF-WETNESS kills galvanizing, not wetting frequency — vertical studs in a ventilated cavity dry in an hour; a sealed cavity that ever leaks stays humid for days. Why the grill bay is the exception: the under-grill zone must not have radiant line-of-sight through mesh to the already-scorched vinyl fence; back board pre-attached at tilt-up (a flat panel has a reachable back; a standing one never does again). Why the kamado corner stays cloth (owner&#39;s call, correct): ceramic kamados are thermoses — low exterior radiation — and the boarded, porcelain-faced backsplash wall already stands between body and fence."},{route:"#/decisions",anchor:"D15",title:"D15 — Grill bay: fully boarded compartment, SINGLE layer",kind:"decision",text:"Superseded: double ½&quot; board + Rockwool (owner challenged: &quot;who actually recommends this?&quot; — nobody; deleted). Why single is correct: steel + cement board is a non-combustible assembly (ASTM E136) — the entire requirement. Double layers and the &quot;insulated jacket&quot; solve combustible-island problems this build doesn&#39;t have. Why boarded sides (both flanking partitions): stops firebox heat + grease vapor migrating into adjacent storage (door backers are polyiso foam), defines the compartment so the manual&#39;s ventilation-area math means something (LP compartments have explicit vent rules — low openings, propane sinks), and stiffens the partitions carrying counter at the cutout. Bare board, taped, no membrane, no tile. Rockwool demoted to a 10-minute retrofit IF an adjacent bay ever runs warm."},{route:"#/decisions",anchor:"D16",title:"D16 — Track weep holes (owner-originated)",kind:"decision",text:"Why: The bottom track is a U-channel gutter with no outlet — cavity water pools and standing water eats galvanizing. Fix: ¼&quot; holes at the bottom of the BACK flange at the web corner, 1–2 per stud bay, every run, drilled on sawhorses. Works because the track&#39;s back flange slightly overhangs the PT (the FRONT flange is the flush one) → water exits sideways into the fence air gap onto open paver. Deburr + cold-galv every hole. Third instance of the &quot;never give water a place to sit&quot; principle."},{route:"#/decisions",anchor:"D17",title:"D17 — Base/finish geometry (owner-corrected)",kind:"decision",text:"Track front flange flush with the PT FRONT face; stud web spans the full track interior. The finish stack (½&quot; board + ~3/16&quot; thinset + ~3/8&quot; plank ≈ 1&quot; proud of the stud face) drops PAST track and sill to a weep screed ~½&quot; above the pavers — no wood visible at grade. Counter overhang, door reveals, and corner trim all reference the FINISHED face. See diagram-01."},{route:"#/decisions",anchor:"D18",title:"D18 — Drain: Option C, real pipe now, seated HIGH",kind:"decision",text:"History: full trench-to-sewer now → exposed fence run → stub-out (Option C) → matured into laying the actual first feet of drain. Why: Plumbers assessed the house cleanout as shallow for the distance — the fall budget is TIGHT — so elevation is banked everywhere: 2&quot; pipe (not 3&quot;: smaller pipe = higher invert = more fall to spend) seated directly beneath the pavers, trap arm exiting high (~18–20&quot;). 2&quot; ABS DWV, long-sweep 90 (never a vent elbow — the riser doubles as rodding access once the trap is pulled), riser capped 6–8&quot; proud until trim-out, yard end capped at grade + photographed. Interim: sealed 5–7 gal jug with bulkhead fitting under the sink. Fallback ladder if the math fails: fence-run route (+~1 ft elevation) → utility drain pump (~$150–300, pressurized discharge runs uphill, problem ceases to exist). Tie-in math: fall available = trap height + cleanout invert depth; needed = run × ¼&quot;/ft. Sewer tie-in should be permitted when it happens ⚠️."},{route:"#/decisions",anchor:"D19",title:"D19 — Gas: straight sleeve crossing + interior CSST routing",kind:"decision",text:"Why a sleeve (not real pipe like the drain): pressurized fuel gets installed, pressure-tested, and inspected as ONE operation by the installer; gravity wastewater doesn&#39;t. Why straight is fine: the future line is CSST, which bends by hand at the sleeve exit — rigid pipe needed the glued sweep, flexible pipe IS the bend. 18–24&quot; of 2&quot; PVC crossing only the seam, emerging beside the drain riser with vertical headroom. Interior routing: through the back wall&#39;s CENTERED stud-web knockouts — inside the wall plane, behind drawer travel by definition; centered in a 3-5/8&quot; web = 1.5&quot;+ from either face, beyond 1¼&quot; screw reach → no strike plates on the knockout run (plates only where the line leaves center: the rise and the grill-bay turn). Grommets at every knockout regardless (abrasion ≠ strike). CSST gets bonded per manufacturer. Corner chase: 1¼–1½&quot; PVC pre-installed through the kamado corner&#39;s knockouts during framing — once the cradle carries 400 lb of ceramic against the fence, that corner is blind forever. Pre-run declined by default: the island&#39;s interior stays accessible for life, so pre-running buys little and risks construction damage to untested line; if done anyway, Home-Flex (DIY-sold CSST), installer buy-in confirmed first, gauge-tee pressure test before and after."},{route:"#/decisions",anchor:"D20",title:"D20 — Third pipe: universal spare chase",kind:"decision",text:"Why: Empty conduit under a permanent structure is never wasted (future lighting, circuit, irrigation, water). The stated goal (hot water) has a better answer: a point-of-use heater at the sink (2.5-gal mini-tank, ~1440W/12A on the existing cold line + sink circuit, hot in seconds, zero trenching) — remember this probable appliance when weighing Phase 2 circuit loading. Trench order across the seam: drain, spare, gas — inches of sand between, nothing touching, gas OUTERMOST so no future dig at a water line crosses it."},{route:"#/decisions",anchor:"D21",title:"D21 — Electrical: two 20A circuits, conduit + THWN-2",kind:"decision",text:"Fridge dedicated (refrigeration hates sharing with a tripping GFCI); grill + kamado + sink convenience on the second. GFCI everything; weatherproof in-use covers. Conduit throughout (island interior = damp/wet location; no Romex/UF). Existing stubs relocated with PVC offset fittings BELOW track level, rising inside stud bays — never notch the cement board at grade. Rough-in happens DURING framing (before board closes faces); only device trim is late. Splices in an accessible j-box (fridge cavity hub)."},{route:"#/decisions",anchor:"D22",title:"D22 — Curved kamado corner: alive",kind:"decision",text:"System: curved track (snip flanges every 1–2&quot;, bend web), studs ~6&quot; o.c. on the arc, ¼&quot; cement board in VERTICAL STRIPS one per bay (flat facets, zero bending stress — you cannot meaningfully bend cement board), galvanized expanded-metal lath wrapped continuously (the actual bendable non-combustible material; this is how pros curve masonry), mortar base coat screeded to true radius with a plywood template cut from the SketchUp arc. Finish: smooth stucco band as a deliberate accent framing the red kamado — planks stop at a trim line (they won&#39;t wrap the radius). Everything in the stack is non-combustible."},{route:"#/decisions",anchor:"D23",title:"D23 — Footprint & ergonomics",kind:"decision",text:"36&quot; finished counter height; 31&quot; counter depth (30&quot; usable + rear overhang carrying the backsplash so it doesn&#39;t eat usable depth); island held 1.5–2&quot; off the vinyl fence (heat + conduit + functional back vents); propane tank on pavers in the open under-grill bay with toe-kick venting and LP detector LOW."},{route:"#/decisions",anchor:"D24",title:"D24 — Waterproofing philosophy",kind:"decision",text:"Membrane (RedGard/AquaDefense) only where it earns its keep: counter deck + clad faces. Boarded back sections get NO membrane (they&#39;re the drying side). Z-flashing across the backsplash top, weep screed at cladding base, sloped cabinet floors to weep holes, sealed penetrations. UV clock: clad within 2–4 months of membrane application (UV degrades it; rain doesn&#39;t)."},{route:"#/decisions",anchor:"D25",title:"D25 — Build order corrections",kind:"decision",text:"The owner&#39;s original 10-step order had two fixes: plumbing rough-in moved FIRST (can&#39;t trench under a built kitchen; underground work wants inspection before covering), and electrical rough-in moved from step 7 to DURING framing (boxes and conduit go through open studs; you can&#39;t fish a closed island). Countertop-before-backsplash was already correct (tile sits over the finished counter with a silicone joint)."},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Plumbing rough-in",kind:"materials",text:"Plumbing rough-in 2&quot; ABS drain stub + fittings, 2–3&quot; PVC gas sleeve, PEX + fittings $70–$150 (tie-in + permit deferred)"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Base",kind:"materials",text:"Base PT 2×4 UC3A ×8–10, shims, PL Premium ×2, sill seal, Tapcons $80–$120"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Frame",kind:"materials",text:"Frame ~50× 20-ga EQ studs 10&#39; (~$10 ea), ~14× track, TEK screws (2 boxes) $270–$400"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Corrosion protection",kind:"materials",text:"Corrosion protection Cold-galv spray ×2 $30–$50"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Sheathing",kind:"materials",text:"Sheathing ~26 sheets ½&quot; cement board, Power Pro #9×1¼ (925 box), mesh tape, thinset $400–$550"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Waterproofing/flashing",kind:"materials",text:"Waterproofing/flashing RedGard/AquaDefense 2 gal, Z-flashing, weep screed, hardware cloth $170–$250"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Curved wall",kind:"materials",text:"Curved wall ¼&quot; cement board (2 sheets), galvanized expanded-metal lath, base-coat mortar $60–$110"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Electrical",kind:"materials",text:"Electrical PVC conduit + offsets + fittings, THWN-2, WP boxes + in-use covers, GFCI devices $150–$300"},{route:"#/materials",anchor:"shell-phases-1-through-4",title:"Materials · Cladding",kind:"materials",text:"Cladding Wood-look porcelain plank (~135 sq ft faces + waste), thinset, epoxy grout, clips, Schluter trim $700–$1,400"},{route:"#/materials",anchor:"doors-drawers-counter-backsplash-phases-57",title:"Materials · Doors (DIY)",kind:"materials",text:"Doors (DIY) Aluminum angle/tube, gussets, hardware, GoBoard, hinges, handles, plank tile $250–$500"},{route:"#/materials",anchor:"doors-drawers-counter-backsplash-phases-57",title:"Materials · Drawers",kind:"materials",text:"Drawers Stainless drawer units or aluminum/ACP + rivets + stainless slides, faces $300–$700"},{route:"#/materials",anchor:"doors-drawers-counter-backsplash-phases-57",title:"Materials · Countertop",kind:"materials",text:"Countertop Light granite remnant 3cm fabricated (or porcelain tile $160–$280 DIY) $1,000–$1,800"},{route:"#/materials",anchor:"doors-drawers-counter-backsplash-phases-57",title:"Materials · Backsplash",kind:"materials",text:"Backsplash Feature tile @18&quot; + smooth porcelain heat zone + epoxy grout + trim $250–$550"},{route:"#/materials",anchor:"appliances-phase-8",title:"Materials · Grill",kind:"materials",text:"Grill Coyote SL LP — 30&quot; (C3SL30-LP ~$3,100) or 36&quot; (C3SL36-LP ~$3,500–3,700) ⚠️ $3,100–$3,700"},{route:"#/materials",anchor:"appliances-phase-8",title:"Materials · Kamado",kind:"materials",text:"Kamado Kamado Joe Big Joe III (standalone, no cart needed) ~$2,200–$2,700"},{route:"#/materials",anchor:"appliances-phase-8",title:"Materials · Controller + lighter",kind:"materials",text:"Controller + lighter SMOBOT Kamado Joe version ($349) + Looftlighter (~$80) ~$430"},{route:"#/materials",anchor:"appliances-phase-8",title:"Materials · Fridge",kind:"materials",text:"Fridge Velieta 24&quot; front-vent built-in (or equivalent — frame to the actual cut sheet) $300–$450"},{route:"#/materials",anchor:"appliances-phase-8",title:"Materials · Sink + faucet",kind:"materials",text:"Sink + faucet Stainless bar sink + cold faucet + cover $120–$250"},{route:"#/materials",anchor:"appliances-phase-8",title:"Materials · LP detector, vents, misc",kind:"materials",text:"LP detector, vents, misc  $80–$150"},{route:"#/context",anchor:"the-build-in-one-paragraph",title:"Project context · The build in one paragraph",kind:"context",text:"An L-shaped DIY outdoor kitchen (~9&#39; × 11&#39; legs) on an existing paver patio in San Diego, backed against a vinyl fence, next to a hot tub. Galvanized steel stud framing on a shimmed pressure-treated sill, cement board sheathing, wood-look porcelain plank cladding run vertically (weathered driftwood aesthetic), 18&quot; tile backsplash, light leathered 3cm granite counter at 36&quot; finished height. Appliances: Coyote SL gas grill (size TBD), Kamado Joe Big Joe in a corner cradle with a SMOBOT damper controller, a 24&quot; front-venting fridge, and a cold-water bar sink. Budget landing zone: roughly $10,100–$15,000 all-in, appliances driving most of it."},{route:"#/context",anchor:"site-conditions-that-shaped-everything",title:"Project context · Site conditions that shaped everything",kind:"context",text:'- **Existing paver patio** — no slab, no footing. This killed the masonry option (CMU requires a poured footing below grade) and made steel-stud-on-PT-sill the structural answer. - **Vinyl fence directly behind** — already has scorch marks from previous grilling. Drives the 1.5–2" standoff air gap, the boarded back at the grill bay, and the "fence is a combustible" clearance checks. - **Coastal San Diego** — salt air pushed the stud spec to 20-gauge with EQ coating; intense sun made countertop surface temperature the deciding material factor (dark stone hits 150–170°F); rare rain but the design still treats water seriously. - **Utilities on site**: two electrical circuits already stubbed up near the fence (in the wrong spot — Phase 0 relocates them with offset fittings), and a cold water line already run. No sewer, no gas — both get deferred-tie-in provisions under the pavers. - **Sewer constraint**: plumbers assessed the house cleanout as shallow relative to the run distance — the drain fall budget is TIGHT. This drove the "seat the drain pipe as high as possible, directly beneath the pavers" decision and the gravity → fence-run → pump fallback ladder.'},{route:"#/context",anchor:"owner-profile",title:"Project context · Owner profile",kind:"context",text:"Capable, detail-obsessed DIYer. Built the full SketchUp model down to stud placement. Owns or will buy proper tools; rents the big stuff. Cost-conscious in the &quot;bang for buck&quot; sense, not the cheap sense — happily spends on durability, ruthlessly cuts specs that can&#39;t cite a source (personally caught and killed an over-spec&#39;d double-cement-board + Rockwool grill bay). Wants a contractor-grade result and thinks in decade timescales (&quot;what does this look like in year eight?&quot;). Caught multiple real technical errors during planning (stud/track geometry, track-as-water-gutter problem) — treat them as a peer reviewer, not a novice."},{route:"#/context",anchor:"design-philosophy-recurring-principles-the-site-should-surface-these",title:"Project context · Design philosophy (recurring principles — the site should surface these)",kind:"context",text:'1. **Never give water a place to sit.** Cabinet floors slope to weep holes; cladding terminates at a weep screed; bottom tracks get weep holes drilled in the back flange; the back of the island is open hardware cloth (a drying lung). Time-of-wetness, not wetting frequency, is what corrodes. 2. **One-way doors get checklists.** Anything unreachable after a step completes (panel backs before tilt-up, chases before the cradle blocks the corner, sleeves before pavers relay) is identified and front-loaded. 3. **Access forever.** Interior stays serviceable through door/drawer openings for life; the drain trap is above the cabinet floor; the fridge outlet is in the adjacent bay; a removable end panel serves the buried utilities; pre-installed chases cross the only zone that ever goes blind (the kamado corner). 4. **The manual is law.** Manufacturer install manuals (Coyote especially) override the guide on cutouts, ventilation areas, and clearances. 5. **One material discipline.** Wood-look porcelain planks (faces + doors), porcelain picket (backsplash), stone top: one wet saw rental, one thinset system, one grout strategy. 6. **Spend where physics demands, cut where nothing cites a source.** 20-ga studs, sill-seal isolation, cold-galv on every cut: non-negotiable. Double board + insulation at the grill bay: deleted when challenged, because non-combustible assembly (ASTM E136) is the whole requirement. 7. **Bank elevation.** With a tight drain fall budget, every design choice preserves height: pipe seated directly under pavers, 2" pipe over 3" (higher invert), trap arm exiting high (~18–20").'},{route:"#/context",anchor:"how-the-design-evolved-the-arc-for-the-decision-log-context",title:"Project context · How the design evolved (the arc, for the decision-log context)",kind:"context",text:`1. **Framing material** (May): CMU/cinder block vs steel studs debated. Steel won on precision for appliance openings, utility routing through knockouts, and — decisively — cost: CMU needs a poured footing that pavers can't provide ($1,400–2,500 shell vs $650–1,250 steel; brick $2,900–5,200). 2. **Cooker lineup** (May): a freestanding pellet smoker (Camp Chef Woodwind Pro) was considered for integration; rejected — built-in pellet options are a thin market and a smoke-flavor downgrade, and counter-height mismatch makes freestanding integration ugly. A kamado in the corner won. The end wall is deliberately built as a clean butt-joint termination so the island can be EXTENDED later if the pellet smoker ever earns a bay. 3. **Kamado + controller** (May → June): Konnected Joe (built-in app/ignition) vs BGE XL + SMOBOT debated — "architecture over app": SMOBOT's motorized top damper has no fan, preserves natural draft, ~30% better charcoal life. Final: **Big Joe + SMOBOT (Kamado Joe version — the BGE daisy-wheel kit does NOT fit the Kontrol Tower) + Looftlighter** for ignition. 4. **Cladding** (June): costed stucco ($100–400, the SoCal-native choice), porcelain tile ($400–640), faux stone panels ($~2,000 — poor value at $12.50/sq ft with a bad 1.5-row cut problem at 36" height), cultured stone ($2,100–4,200). Then the owner's AI renders shifted the aesthetic to weathered driftwood WOOD. Real teak/ipe (silvers naturally) was considered eyes-open re: coastal UV/salt; final call: **wood-look porcelain plank, vertical** — the driftwood look with tile physics. Consequences absorbed: leveling clips + ≤33% offset (never 50% brick pattern — plank bow guarantees lippage), rectified tile, epoxy grout color-matched so joints read as reveals, metal edge trim at corners (never miter porcelain), and doors became aluminum-frame + GoBoard + plank with edges landing on grout joints. 5. **Countertop** (June): sun heat was the deciding factor. Dark granite and quartz (UV resin failure) rejected outright. Ranking: light leathered 3cm granite remnant ($1,000–1,800 fabricated) > large-format light porcelain tile (<$300 DIY) > Dekton. **Locked: light leathered 3cm granite.** 6. **The under-paver era** (July, final sessions): drain plan matured from "trench to sewer now" → Option C stub-out with a jug interim → actual 2" ABS laid under the seam with a long-sweep riser, seated high for the tight fall budget. Then a gas sleeve was added (straight 2" PVC chase; future CSST bends by hand at the exit; interior routing through stud-web knockouts; a pre-installed chase through the blind kamado corner), then a third universal spare chase. Trench order across the seam: drain, spare, gas — gas outermost. 7. **Back wall + fire assembly** (final sessions): hardware cloth across the entire back EXCEPT the grill bay, which is a fully boarded compartment (back pre-attached at tilt-up + both side partitions) — single layer, because the steel + cement assembly is already non-combustible and the double-board + Rockwool spec died under scrutiny. Kamado corner stays cloth (ceramic is a thermos; the boarded, porcelain-faced backsplash already shields the fence). Track weep holes added after the owner spotted the U-channel bathtub problem.`},{route:"#/context",anchor:"current-status-as-of-july-2026",title:"Project context · Current status (as of July 2026)",kind:"context",text:"Nothing built yet. Plan is complete and converged. First physical work: pull pavers at the seam, lay three pipes (drain / spare / gas chase), shoot laser, set PT sill. The grill-size decision (30&quot; vs 36&quot;) gets made via cardboard mockup against the real sill, and it&#39;s the last thing gating the full stud cut list."},{route:"#/context",anchor:"interim-states-the-site-should-represent-honestly",title:"Project context · Interim states the site should represent honestly",kind:"context",text:"- Sink drains to a **sealed catch jug** until the sewer tie-in (a deliberate, legitimate bridge — with the honest note that the eventual tie-in should be permitted). - Grill runs on **propane** (tank in the open under-grill bay, LP detector mounted LOW) until the gas tie-in; conversion to NG flips detection HIGH. - Backsplash tile choice is late-binding by design; four AI-rendered comps exist (Coastal Slate Blue, Sea Glass Sage, Sand & Smoke pattern, Deep Ocean Mix). Sea Glass Sage is the standing recommendation next to the red kamado."},{route:"#/phase/0",anchor:"preflight",title:"Buy · PVC conduit offset fittings (Phase 0)",kind:"materials",text:`PVC conduit offset fittings Sch 40 PVC 'meter offset' fittings, trade size matched to existing stubs (likely ¾" — verify) 3–4 (measure) each ~$2 each per guide (or heat-gun-bend your own). Count = number of pipes in the stubs — confirm what the second pipe in the double stub is BEFORE demo; it changes the plan if it's not a spare.`},{route:"#/phase/0",anchor:"preflight",title:"Buy · PVC conduit couplings (Phase 0)",kind:"materials",text:"PVC conduit couplings Sch 40 PVC coupling, same trade size as stubs 4 each Glue onto each cut-down stub (leave a coupling's worth above the pavers) before the offset goes on. Step 0.2.4."},{route:"#/phase/0",anchor:"preflight",title:"Buy · PVC conduit caps (Phase 0)",kind:"materials",text:"PVC conduit caps Push-on caps or tape plugs, same trade size 4 each Cap the open conduit ends until Phase 2."},{route:"#/phase/0",anchor:"preflight",title:"Buy · PVC cement + primer (gray/conduit) (Phase 0)",kind:"materials",text:"PVC cement + primer (gray/conduit) Small can each, rated for electrical PVC 1 set Serves Phase 0 offsets and the Phase 2 conduit runs."},{route:"#/phase/0",anchor:"preflight",title:"Buy · PT 2×4 sill lumber (Phase 0)",kind:"materials",text:`PT 2×4 sill lumber Pressure-treated 2×4, above-ground UC3A tag, 8' (length assumed — take a cut list from the footprint) 8–10 boards Guide count is 8–10. Every wall line incl. backsplash wall and kamado cradle; short chorded segments (or band-sawn curve) under the arc. Drill ~¼"-oversize holes mid-board where conduit rises — stronger than a notch.`},{route:"#/phase/0",anchor:"preflight",title:"Buy · Shims (Phase 0)",kind:"materials",text:"Shims Cedar shim contractor pack (composite shims = the rot-proof upgrade the guide names) 2 packs Shim to the laser at every bearing point, packing UP from the pavers' high point — never grind down."},{route:"#/phase/0",anchor:"preflight",title:"Buy · PL Premium construction adhesive (Phase 0)",kind:"materials",text:"PL Premium construction adhesive Loctite PL Premium, 10 oz cartridge 2 cartridges Guide: 'PL Premium ×2'. Bed every sill run before anchoring."},{route:"#/phase/0",anchor:"preflight",title:"Buy · Tapcon anchors (Phase 0)",kind:"materials",text:`Tapcon anchors ¼" × 3¼" hex-head Tapcon, 25-count box w/ matched masonry bit (length derived: 1½" PT + ≥1" paver embedment) 1 box Guide says 'Tapcons/paver anchors every few feet' — ~25 covers ~60 LF of sill at ~3' spacing. NO anchor ever lands on the marked drain or gas-sleeve lines — they sit at exactly bedding depth (Phase −1 anchor-conflict warning).`},{route:"#/phase/0",anchor:"preflight",title:"Buy · Sill seal foam (Phase 0)",kind:"materials",text:`Sill seal foam Closed-cell polyethylene sill seal, 3½" × 50' roll 2 rolls Non-negotiable isolation over the TOP of every PT run before any steel touches it — ACQ/copper-azole PT corrodes galvanized steel. Buy 2 rolls to cover all runs; return one if the LF comes in under 50'.`},{route:"#/phase/1",anchor:"preflight",title:"Buy · Steel studs (Phase 1)",kind:"materials",text:`Steel studs 3-5/8" × 10' 20-gauge EQ galvanized studs — label reads -18/-19/-20/-23 mil; AVOID -14/-16 ~50 sticks 10-footers yield three ~33" studs per stick (locked cut length 32-13/16"). Buy from J&B (El Cajon) or Westside (Sorrento Valley) supply yards, not HD. Dry-stack one test sandwich to 34-13/16" before gang-cutting fifty.`},{route:"#/phase/1",anchor:"preflight",title:"Buy · Steel track (Phase 1)",kind:"materials",text:`Steel track 3-5/8" × 10' 20-gauge EQ track (U-channel, no return lips) ~14 sticks Don't mix up with studs. Curved corner track: snip both flanges every 1–2" and bend — comes out of this count. Blocking/ledgers/boxed members also cut from the stud+track sticks — no separate purchase.`},{route:"#/phase/1",anchor:"preflight",title:'Buy · #8 × ½" wafer-head self-drilling TEK screws (Phase 1)',kind:"materials",text:'#8 × ½" wafer-head self-drilling TEK screws 500-count box 1 box Stud↔track, ~4 per stud. Buy online/Fastenal, not HD. Heads-up (my math, flagged): 150 cut studs × 4 = 600 — grab a second box if you cut all 50 sticks.'},{route:"#/phase/1",anchor:"preflight",title:'Buy · #10 × ¾" hex-head TEK screws (Phase 1)',kind:"materials",text:'#10 × ¾" hex-head TEK screws 100-count box; G185 hot-dip or stainless coating — plain zinc never touches PT 1 box Track→PT sill; they bite the wood better. The G185/stainless rule at PT is law.'},{route:"#/phase/1",anchor:"preflight",title:"Buy · Cold-galvanizing spray (Phase 1)",kind:"materials",text:"Cold-galvanizing spray Cold-galv zinc spray, standard rattle can 2 cans EVERY cut edge gets sprayed — non-negotiable outdoors. Also every deburred track weep hole (Step 1.3)."},{route:"#/phase/1",anchor:"preflight",title:"Buy · PVC pipe for corner gas chase (Phase 1)",kind:"materials",text:`PVC pipe for corner gas chase 1¼"–1½" Sch 40 PVC × 10' (guide's stated size range) 1 stick Step 1.4b: route through the kamado corner's stud knockouts while framing is bare, both ends emerging in flanking bays. ~$8 of pipe; once the Big Joe loads the cradle this corner is blind forever.`},{route:"#/phase/1",anchor:"preflight",title:'Buy · 1½" PVC caps (Phase 1)',kind:"materials",text:`1½" PVC caps Cap to match chase pipe size 2 each Cap both chase ends, insert pull string (Phase −1 spool), label 'GAS CHASE'.`},{route:"#/phase/1",anchor:"preflight",title:"Buy · Aluminum angle for hinge backing (Phase 1)",kind:"materials",text:`Aluminum angle for hinge backing 1"×1" × 1/8" aluminum angle, 8' lengths 2 (measure) lengths Step 1.6: bolt across the hinge-side stud at EVERY door opening NOW — a thin stud web won't hold a hinge for 20 years, miserable retrofit. Count door openings for LF. Guide's alternative: boxed heavier-gauge stud from track offcuts.`},{route:"#/phase/2",anchor:"preflight",title:"Buy · PVC electrical conduit (Phase 2)",kind:"materials",text:`PVC electrical conduit ¾" Sch 40 gray electrical PVC × 10' (size assumed — must match the existing stubs; verify before buying) ~5 (measure) sticks Conduit runs the WHOLE way — island interior is a damp/wet location: THWN-2 in conduit, no Romex, no bare UF. Measure both circuit paths through stud bays and knockouts.`},{route:"#/phase/2",anchor:"preflight",title:"Buy · Conduit fittings assortment (Phase 2)",kind:"materials",text:`Conduit fittings assortment ¾": 4–6 sweep 90s, ~10 couplings, 8–10 male terminal adapters (2 per box entry), LB only if a run needs it 1 set Guide names offsets (bought Phase 0) and generic 'fittings'; this assortment is my derivation for two circuits and five boxes.`},{route:"#/phase/2",anchor:"preflight",title:"Buy · Snap-in bushings/grommets (Phase 2)",kind:"materials",text:`Snap-in bushings/grommets Plastic snap bushings sized to the 1½" stud knockouts + conduit KOs, bag of ~20 1 bag Guide: 'bushings/grommets on any cut steel edge.' Grommets at every knockout regardless — abrasion protection is a separate rule from strike protection (D19).`},{route:"#/phase/2",anchor:"preflight",title:"Buy · Weatherproof outlet boxes (Phase 2)",kind:"materials",text:`Weatherproof outlet boxes Single-gang PVC weatherproof ('Bell') boxes with ¾" hubs 4 each Grill: low 8–12" in adjacent cavity; fridge: in ADJACENT cabinet, never behind the fridge; sink: high on sidewall away from trap drips; kamado: near cradle. Anything near the propane bay mounts HIGH — gas pools low.`},{route:"#/phase/2",anchor:"preflight",title:"Buy · Weatherproof junction box (Phase 2)",kind:"materials",text:`Weatherproof junction box PVC WP j-box, 4" square class, ¾" hubs 1 each Accessible splice hub in the fridge cavity — a removable panel counts as accessible; buried behind tile doesn't.`},{route:"#/phase/2",anchor:"preflight",title:"Buy · THWN-2 wire (Phase 2)",kind:"materials",text:"THWN-2 wire 12 AWG stranded THWN-2 — black + red (hots), white ×2 or shared per fill (neutrals), green (ground) measure ft Measure each conduit path end-to-end, add 10% + box tails. Two 20A circuits: (1) fridge dedicated, (2) grill + kamado + sink convenience. Pull, coil tails, land NOTHING until Phase 8. Remember D20: a future point-of-use water heater (~12A) weighs on circuit loading."},{route:"#/phase/2",anchor:"preflight",title:"Buy · Cord pass-through grommet (Phase 2)",kind:"materials",text:'Cord pass-through grommet Rubber desk-type grommet, ~1" hole 1 each Fridge cord pass-through from cavity to adjacent-bay outlet; steel wool + sealant close it at Phase 8 — pest highway otherwise.'},{route:"#/phase/3",anchor:"preflight",title:'Buy · ½" cement board (Phase 3)',kind:"materials",text:`½" cement board ½" × 3'×5' sheets (Durock/Hardie) ~26 sheets Guide's own caveat: the open back removed ~100 sq ft from earlier estimates — RE-COUNT against the final plan before buying, then buy 2–3 extra. Grill-bay back sheet gets pre-attached to its panel at Phase 1 tilt-up. Respirator for every cut — non-negotiable.`},{route:"#/phase/3",anchor:"preflight",title:"Buy · Backer screws (Phase 3)",kind:"materials",text:'Backer screws Power Pro #9 × 1¼" ceramic-coated wafer-head backer screws, 925-count box 1 box Covers the whole project. 1¼" is right: ½" board + ¾" past it to thread the steel. Screws every 8" into studs.'},{route:"#/phase/3",anchor:"preflight",title:"Buy · Alkali-resistant mesh tape (Phase 3)",kind:"materials",text:`Alkali-resistant mesh tape 2" × 150' alkali-resistant fiberglass mesh 2 rolls All seams + corners, plus the curved wall's facet joints (Step 3.5.2).`},{route:"#/phase/3",anchor:"preflight",title:"Buy · Thinset for seams/facets (Phase 3)",kind:"materials",text:"Thinset for seams/facets Polymer-modified thinset, 50 lb bag 2 bags Seam taping, facet packing, and laminating alternate on the curve. Cladding thinset is a separate Phase 4 buy."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Waterproofing membrane (Phase 3)",kind:"materials",text:"Waterproofing membrane RedGard or AquaDefense, 1-gal pails 2 gal Counter deck (top + back edge) + clad faces ONLY — two coats, opposing directions. Boarded back gets NO membrane (drying side by design, D24). Clad within 2–4 months — UV degrades it, rain doesn't."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Z-flashing (Phase 3)",kind:"materials",text:"Z-flashing Galvanized or stainless Z-profile sized to the backsplash top plate width measure (~2 × 10') pieces Across the backsplash top plate, sloped toward the fence, front edge caulked. Measure top-plate length + lap allowance."},{route:"#/phase/3",anchor:"preflight",title:"Buy · Weep screed (Phase 3)",kind:"materials",text:`Weep screed Stucco weep screed for ~1" finish stack, 10' stic
